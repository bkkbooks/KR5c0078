front:
  text: 道德眞經指歸卷之十二能十
  hash: sha256:362a9595f6e612bbba19fd894a574b09fa7b70513176603518609a0eadc2fdb5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0078_HFL_006-001a, image: hfl/0378/0378-084.png}
body:
  text: 蜀郡嚴遵字君平撰谷神子註用兵有言陳紀綱也吾不敢爲主不爲唱也而爲客後民行也不敢進寸不忍喪也而退尺幸彼還也是謂行無行志反行也攘無臂亦不傷也執無兵敵無應也仍無敵前無人也禍莫大於輕敵自恃專也輕敵幾喪吾寳失自然也指歸道無不有有無不爲體和服弱括囊大威生育羣類莫有能違無有形象爲萬物師得之者安失之者危天地體之乆而不衰何以效之莊子曰夫陰而不陽萬物不生陽而不陰萬物不成由此觀之有威無德民不可治有德無威宗廟必傾無德無威謂之引殃遭運時變身死亡國故人主者國之腹心也兵者國之威神也夫天地之間萬國並興小大愚智皆願爲君智盡而服力屈乃窮非有餘力而屈膝樂爲人臣也是以明王聖主放道效天清靜爲首和順爲常因應爲始誠信爲元名實爲紀賞罰爲綱左德右威以應不祥天下仰制莫能毁傷故國可保而民可全也夫德之與兵若天之與地陰之與陽威德文武表裏相當隱之玄域不得已而後行故人君失道好戰自損正事不修邪事作起强大憍奢紀滅綱弛雕琢宫室盈飾狗馬高臺大囿聲色在後刳屠忠諫尊寵姣好簡傲宗廟欺侮諸父殘賊暴虐孤人稚子反逆天地刑戮陰陽黥劓道德破碎神眀和氣潰濁變化不通冬雷夏霜萬物夭傷縱横擊搏謀圖不祥大國驚怖小國奔亡老弱離散啼哭而行天下憤怨萬民思兵相率而起我爲後行夫何故哉惟彼先祖皆有神明之德通於天地聖智之勞加於萬民故剖符丹書受土賜姓列爲君王光顯祖考業流子孫是天地之心萬載之功而繼體者不務屈身厲節摩精鍊神修道行德以奉其先乃忽小善而易小惡日以消息月以陵遲宗廟崩弛國爲丘墟族類離散長無所依鬼神孤魂無所棲息乎嗟夫豈不衰哉是以喻我豪俊說我士卒用兵有言卷甲釋兵且令休息激役心移幸於反覆改過自新變容易則不敢爲主而爲客也遂往不反爲天下賊百姓窮極財殫力屈海内之憂日以長息蒼天降應禍集其國雖欲未誅自然不得天人同心我不能剋不敢進寸而退尺也故事爲而神否身往而志還形反我志事逆我身行無行也悲彼先聖傷彼萬民無罪於天遇此何辜雖曰忽然民命在兵發號申令效以信誠先服者賞後服者傷小下者利大下者昌壤邑者爵降城者封城邑不下未剋勿喪有罪者免有能者官老弱得養死者得葬攘無臂示不傷德澤洽潤恩愛流行慈惠和結衆情發揚默然爲之神氣相通執無兵也彼三軍與我同心姦爲我使盜爲我工教我以其計慮告我以其地形因彼所有奇變乃通法律不苛險阻虚空天人相得胜出若神前無留敵計謀不喪敵雖衆多與我搆因兩軍相距前若無人仍無敵也戰雖萬全敵不可易易敵生姦亡時失利福去禍來爲天所疾禍莫大於侮敵是故雖獲天祐得人之助猶守之以憂持之以畏出險乗虚宿舍有備休息處便必依水草填隙塞惡與敵相距若侮敵則亡故不得不爾變運無形奇出無眹錯勝無窮功戰無有深微窅窅變化無始自我親近不知我之所爲彼之知力何得於己故在家者晏然而樂在師者欣然而喜人懷至誠若爲其子去家越境若衆趣市疾耕力織暮休早起竒入模列不敢獨有以供師徒如奉父母懸權爭勝敵人不起未戰而海内正不攻而諸侯下天地覆載日月所照覩皇皇莫莫各安其土夫何故哉慈哀發動因天之心不敢由於我也兵相望哀者勝吾言甚易知明無明也甚易行行無行也而天下莫能知寡能通也莫能行鮮能從也言有宗祖不言也事有君歸自然也唯無我知與我殊也是以不吾知不我知也知我者希謂人民也則我貴矣我獨眞也是以聖人謂明君也被褐薄其身也而懷玉厚其神也指歸夫無形無聲而使物自然者道與神也有形有聲而使物自然者地與天也神道蕩蕩而化天地默默而告蕩而無所不化默而無所不告神氣相傳感動相報反淪虚無甚微以妙歸於自然無所不導故言言之言者自然之具也爲爲之爲者喪眞之數也無爲無言者成功之至而長存之要也是以聖人言不言之言爲不爲之爲言以絶言爲以止爲絶言之道去心與意止爲之術去人與智爲愚爲慤無知無欲無欲則靜靜則虚虚則實實則神動歸於太素靜歸自然保身存國富貴無患群生得志以至長存此言之易知而事之易行者也而天地莫能知莫能行也夫何故哉世主好知務順其心不覩大道不識自然以爲爲爲以言言言息知生事以趣所安寖以爲俗終世被患性變情易深惑遠迷精濁神擾外實内虚强獸生咎强靜生患故視之而不見告之而不聞非以自嫉以爲不然不聞忠告非嫉己身謂無此理故不行也夫聖人之言宗於自然祖於神明常處其反在默言之間甚微以妙歸於自然明若無見聽若無聞通而似塞達而似窮其事始於自然流於神明常處其和在爲否之間清靜柔弱動作纖微簡易退損歸於無爲此言有宗事有君也虚無以合道恬泊以處生時和以固國立教以畜民養以無欲導以自然贈以天地賜以山川富以年歲貴以有身虞以無憂寧以無患無欲之不得無樂之不存民若無主主若無民亡於知力依道倚天萬國和順并爲一君是事之盛而業以隆者也而天下謂之不然道使之然理無所惑智有昧者故不信之也夫世之莫我知者非我道小而不足以知也又非我之事薄而不足爲也又非世之好敗惡成喜禍樂患而故不我從也天性與我反情欲與我殊智陷於情欲終世弱於所聞神氣不我我而心意不我然是以不我知也故其明不我能見聰不我能聞是以深言反而受謗大行遠而得毁獨見之明不用於世獨聞之聰見羞於民事順神明者不合於俗功配天地者不悦於衆知我者希夫至論大言者總百變要萬方剖判毫釐之内明顯虚無恍惚之外周密無間歸於漭昧此乃小節之士所不能聞而隅曲之人所不能逮也夫鴻鵠高飛終日馳騖而不知宇宙之外制法之人拘教之士累年學問終身談論而不知道德之大也且神明有所不能領天地有所不能理況乎守衆世之論不覩大要之所由不亦宜乎是故衆俗之所薄賤而得道者之所獨遊也則我貴也是以聖人知而弗爲能而不任仁義而不以爲號通達而不以爲名堅强而不以爲顯高大而不以爲榮言不可聞動不可形心若江海志若蒼天廢爲以立道損善以益性寂然蕩蕩莫之能明皎然昭昭莫覩其情頽然默默魁然獨存薄外厚内賤己卑名去衆離俗與道爲常被褐懷玉知不知上反無意也不知知病識無識也夫唯病病無巧利也是以不病害不衆也聖人不病無憂思也以其病病道不知也是以不病患不比也指歸道德之教自然是也自然之驗影響是也凡事有形聲取舍有影響非獨萬物而已也夫形動不生形而生影聲動不生聲而生響無不生無而生有覆不生覆而生反故道者以無爲爲治而知者以多事爲擾嬰兒以不知益高年以多事損由此觀之愚爲智巧之形也智巧爲愚之影也無爲遂事之聲也遂事無爲之響也智巧擾亂之羅也有爲敗事之綱也愚以無爲若形與聲本也故能生智巧有爲若影與響末也故亂敗故萬物不可和也天地不可適也和之則失和適之則失適弗和也而後能和之弗適也而後能適之言有爲智用逐跡波生和適之理與時湮滅故爲則不可不爲則可也故安世不知危亂不知治若影隨形無所逃之也不動求影無所得之也故知而絶知不困於知自能亡也故不困也不知用知亦不困於知雖亡其用亦不知用之爲用所以俱不困也其所以不困則異矣而於爲不困則一也二俱不用則一也然絶知則爲己用知則爲人故異也是故聖人操通達之性遊於玄默之野處無能之鄉託不知之體寂若虚空奄忽如死心無所圖志無所治聰明運動光耀四海塗民耳目示以無有庖厨不形聲色不起知故不生禍亂息矣不言而宇内治無爲而天下已民俯而無放仰而無效敦慤忠正各守醇性惘惘洋洋皆終天命死者無謚生者無號若此相繼億萬無量以能知不知有此之益故稱上者也其次情無所樂性無所喜心無所安志無所利疾不知孝病不知弟旣不覩仁又不識義無有典禮守其貞幹一如麋鹿一如鴻鴈不在憂喜亦不離亂若盲若聾無所見聞主無官室民無城郭國無制令世無恥辱以體不足之知所以能爲似病之行故云不知知病識無識也病故不病與道相託不言不爲威德自作天地和順渾沌磅礴溷若濁流焕若儼客人物皆愚歸於寂寞動無形臠靜無坼堮主民俱昌天下啞啞亡於小利而享大福默而治者計不能計而度不能度聖人常似於病所以不病故能與道通同非所計度若異於此則知故生而邪僞作何以效之夫道德廢淳朴亡竒物並作知故流行禮節起分度明萬物有條貫百事有紀綱封疆畫界治邑屋州鄉里國有忠臣家有孝子録内略外雙身爲友損彼益此務以相厚彊大重壘小弱亡有郊祀天地名山大水封於太山襌於梁父流漸相承或然或否斷獄萬數黥人滿道臣殺其君子殺其父亡國破家不可勝數天下享其知故之利獲於死亡之咎不知之知而强知於不知即有此之眞知由此觀之絶知爲福好知爲賊亦明矣故使有德之君變志易心生息萬事以教其民禱祝請福以至大治者自然不聽也令有德之君暫背道興欲則福不成福禮之所以然者也使彼亡國之君廢智去欲絶爲止事修道行德棄其心意而欲死亡者形亦不從也今亡國之君暫回心向道則亡不成亡故形不從是故趨舍廢置王道之形聲也吉凶存亡趨舍之影響也夫聖人所以能動與天和靜與道合旣能保身又能全國翶翔乎有爲之外優游乎無事之内取福於纖妙之中而舒之於四海之外聖人體不知之知雖似於病而能無所不爲幾微莫失是以杜喪有爲之小而成無爲之大故云取福於纖妙而舒之於四海喪明者之目杜知者之口窒聰者之耳斬巧者之手與時相隨與和俯仰不爲而自成不教而民治恩加走獸澤及飛鳥者以其損聰棄智廢爲而任道也以其病病是以不病若不病病是以不爲是也是以順情從欲窮極心意動導天地靜陶萬事神靈在己不察不燎身不降席而萬國自備雖欲不亡自然不置也苟背道而從欲雖希全而必敗是强梁者不得其死理故使然故云自然不置置止也民不畏威易爲非也則大威至身分離也無挾其所居安卑弱也無厭其所生安困危也夫唯不厭甘之樂也是以不厭不乆爲也是以聖人謂人君也自知不自見不名賢也自愛不自貴下萬民也去彼取此求諸身也指歸道德之㫖神明之務太和之心天地之意禍莫甚乎亡福莫甚乎存非獨天道人物亦然故存身之道莫急乎養神養神之要莫甚乎素然常體憂畏慄慄震震失神之術本於縱恣喪神之數在於自專故太上畏道其次畏天其次畏地其次畏人其次畏身昌衰吉凶皆由己出不畏於微必畏於章不慮於小罪必成於大過患大禍深以至滅亡憂畏元始至於無形運翔戒愼未兆其道大光動得所欲靜得所安福禄深微淪於無方戒愼所未兆恐懼所未聞故云憂畏於元始致福禄深者也正言若反明而若昏遼遠潢洋莫之能聞伺命在我何求於天至福以禍大吉若凶天下醉飽莫之能明是以世俗見近聞淺不識窅冥之道蔽於微妙之常塞於神明之理察於毫毛之利不覩丘山之禍肆情行態無所畏忌言順所然行順所善力能而取心順妄與驕奢瓷睢自專損己忠信所愛欺殆父母侵凌天地簡傲其主將順情欲以違天道故起巧立名以代其身施惠流恩以獲大咎遁福天外追患四海福德求之不能得矣患奔禍馳無所逃矣以不畏威則大威至大威以至乃始爲善當此之時道德不能救天地不能解非天之罪也樂高喜大負威任勢忘憂失畏不求於己也故憂於身者不恐於人畏於己者不制於彼順於小者不懼於大誡於近者不悔於遠能自誡自勵日愼一日故不禍遠而至福近也是以不小其位而居之以敏不薄所處而厚修其禮不苦卑微而革其大始不厭困危而絶其所以樂窮如達安死如壽雖欲且留亦不得乆不嫌苦其位處卑小而更修理以革其大如此甘之不厭是以處之不乆何以明之莊子曰天地之道始必有終終必有始陽氣安於潜龍故能鑠金陰氣寧於履霜故能凝冰木善秋毫故能百尋水樂涓涓故能成海飛禽逸於卵鷇故能高翔群獸預於胎䍮故能遠走是以聖人智達無窮能與天連變化運動洞於大常猶以積德重厚釋心意隱聰明憂於溷輓畏於無形竄端匿迹遁貌逃情反於虚無歸於玄冥身重天地而不自高德大陰陽而不自彰是以聖人自知不自見也託微處寡後下萬民飲食無味衣服無文方於自飾志不敢淫自愛不自貴也秉道操德與物浮沉養民如子遇衆若君德歸之天功移於人天下辭讓恩厚固深故禍而患不能患福不能逃而德不能遁非道有和而天地偏也戒始愼微和弱忠信奉道順天與物相參憂畏得意安樂困窮成敗存亡求之於身去彼憍盈取此卑損勇於敢則殺安敗傷也勇於不敢則活樂長生也常知此兩者訓殺活也或利或害有利病也天之所惡易正名也孰知其故莫能明也天之道陰且陽也不爭而善勝因物形也不言而善應固物聲也不召而自來物自彰也坦然而善謀物自情也天網恢恢密若亡也䟽而不失留無喪也指歸天地之道生殺之理無去無就無奪無與無爲爲之自然而已正直若繩平易如水因應效象與物俱起損益取捨與事終始深淺輕重萬物自取殊形異類各反其所生爲殺元殺爲生首二者相形吉凶著矣故知生而不知殺者逆天之紀也知殺而不知生者反地之要也故喜怒有分生殺有節受天之殃得地之罰當怒不怒子爲豺狼弟爲兕虎當鬥不鬥妻爲敵國妾爲大寇當殺不殺受天之害爲物所制當喜不喜蒙天之灾獲地之咎當生不生人君失國庶人没命故君子殺民如殺身活人如活己執德體正不得已而後然存身寧國在於生殺之間生殺得理天地佑之喜怒之節萬物歸之故剛毅質直操擊深酷疾邪養正勇敢先失達於守戰明於開塞長忿美快安靜樂殺便國利民不避彊大威振百蠻權傾境外得善之半也勇於敢之故柔弱畏敬恐情損言深思達慮臨正討怨務長寡和博厚積恩利而不害以明其善與而不奪以顯其名賞而不罰以立其惠生而不殺以成其仁得善之半勇於不敢凡此二功勇敵敢均計策桀馳射身相非與天異意與地異心奮情舒志各肆所安或以千乗變爲亡虜或以匹夫化爲君王故物或生之而爲福或生之而爲禍或殺之而爲福或殺之而爲賊二者深微莫能窮測二者或利或害不能窮測者是未達窅冥之情不知禍福之分唯得道者洞曉未然方能制始非常所及故云二者深微莫能窮測者也故生之而爲福者天下之所祐生之而爲禍者天下之所惡也養天下之所惡者傷天下之所祐養天下之所祐者傷天下之所惡一反一覆或爲玄德一覆一反或爲玄賊父事天地子孫是得故長養而後世昌者生當生也生物而後亡者生當亡也殺戮而福至者殺當亡也喪物而禍來者殺當生也天之所惡不敢活也天之所祐不敢殺也天之所損不敢與也天之所益不敢奪也夫當與不當唯天乃定殺與不殺非人所知故勇於敢者多有傷敗勇於不敢與天同符者也是故敢於不敢者之敢動與天同符靜與地同極天心所惡莫之能辯天之所惡孰知其故夫天地之道一陰一陽分爲四時離爲五行流爲萬物精爲三光陽氣主德陰氣主刑覆載群類含吐異方玄默無私正直以公不以生爲巧不以殺爲工因應萬物不敢獨行吉之與吉凶之與凶損損益益殺殺生生爲善者自賞造惡者自刑故無爲而物自生無爲而物自亡影與之交響與之通不求而物自得不拘而物自從無察而物自顯無問而物自情此天之道者也故不爭而無所不胜不言而無所不應不召而無所不來寂然盪盪無所不圖所謂不爭而善勝不言而善應不召而自來不言而自謀者也惚恍之羅設而無狀之網施汎淫瀇漠遼遠留遲密察無間與物推移故在前而不可遠在後而不可先靜作而不可聞進退而不可見終始禍福吉凶自反非出天外莫之能遁也天網恢恢疏而不失民不畏死輕其身也奈何以死懼之不能禁也若使民常畏死得其安也而爲奇者作福人也吾得執而殺之誅巧淫也夫孰敢矣嚴刑信也常有司殺者殺謂大臣也而代司殺者殺謂人君也是代大匠斲事非宜也夫代大匠斲希不傷其手戒内民也指歸人之情性不知而忠信有知而誕謾得意而安寧失意而圖非窮困而輕死安寧而愛身何以明之莊子曰夫嬰見未知而忠信於仇讎及其壯大有識欺殆兄嫂三軍得意則下亡虜窮溪之獸不避兕虎其性非易事理然也由此觀之民心不得性命不全則號令不能動也憂愁𢡖怛樂非輕死則刑罰不能恐也是故好知之君憂世勞民祭燎天地除禍去患招善請福禱祝鬼神變化萬事動以悦民家知户辯里有仁賢違天之像專任人心以所見爲明以所論爲當廢名實背事情道理塞而非譽興天下大擾百姓遑遑勞若疲極困窮生姦敢敗者榮而有功輕死者肥而安寧積善者瘦而多憂畏法者飢而多患寡弱者苦而思死衆强者樂而君王是以天下趨名爭勢不計是非析毫剖芒視死如歸乃始告以峻法嚴刑則是禁以所易而制以所輕也以至於此則人不畏死奈何以死懼之言不可也故刑戮並作姦邪不止賞禄施行而大臣不使萬民不附諸侯不市國非其國身非其身也是以聖人之牧民也人主無爲而民無望民無獲而主無喪也其業易得而難失也其化難犯而易行也其衣易成而難弊也其食易足而難窮也故天下除嗜廢欲樂生惡死者皆重其神而愛其身故形可制而勢可禁也人畏死而重生所安者然也是以俊雄英豪達通之人不敢作福不敢起威故法立而不用賞設而不施夫何故哉身重天地物輕鴻毛法峻刑嚴知不敢淫也衆人共畏而獨不畏者有司孰德而殺之孰敢犯也是故帝王之道無事無爲目無所視耳無所聽心無所圖口無所言前後左右各有所任因應以督安其成功授以所懐歸以所行爵加明主禄施進賢作福者身死竊威者宗亡百官趨職主無與焉各有司存不可越代付物以能是君之道釋臣任主則疏遠隱匿親近尊顯君道隔塞政事亡矣威嚴兩立邪僞並起陪臣陞進君者得咎君之威勢滅而不揚姦雄豪特令行禁止百姓冤結萬方失理忠臣悲憂佞巧大喜名實失當賞罰妄舉是猶使屍起哭而代大匠斲也若不付物以能而主代臣任是代大匠斲而死屍起哭眞可怪者也夫死人無爲而子弟悲者以爲死而不爲哭也不與方圓而處大堂者任大匠面身無作也夫大匠運斤爲主人也子弟悲泣爲死尸也若無尸自哭則無人哭之矣人自斲則工人拱手矣工人拱手則大厦不成哭考旣無則喪禮廢矣使屍起哭則哭者亡主人代匠斲則功不成必然之理尚被傷手安得成功是以明王聖主正身以及天謀臣以及民法出於臣秉之在君令出於君飾之在臣臣之所名君之所覆也臣之所事君之所謀也臣名不正自喪大命故君道在陰臣道在陽君主專制臣主定名君臣隔塞萬事自明上下之分必不可監故君臣位定而萬事自明故人君有分羣臣有職審分明職不可相代各守其圓大道乃得萬事自明寂然無事無所不尅臣行君道則滅其身君行臣事必傷其國道德眞經指歸卷之十二
