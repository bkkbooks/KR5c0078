front:
  text: 道德真經指歸卷之十三能十一
  hash: sha256:0b85c917ae64339ff1f572af117fe69e718626751d804cce76479dc1fb32758f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0078_HFL_007-001a, image: hfl/0378/0378-124.png}
body:
  text: 蜀郡嚴遵字君平撰谷神子注人之飢也不充飽也上食稅之多為美好也是以飢衣食少也百姓難治盜賊起也以上有為動為己也是以不治國亂擾也民之輕死不自有也求生之厚欲不止也是以輕死易患咎也無以生為同生死也是賢於貴生安寧久也指歸道德之生人也有分天地之足人也有分王侯之守國也有分臣下之奉職也有分萬物之守身也有分禀受性命陶冶群形開導心意己得以生藏府相承血氣流行表裏相應上下相任屈申便利視聽聰明道德之所以分人也含吐覆載雲行雨施雷風動作日月更代春生夏長秋收冬藏陰陽和洽萬物豐盛民人動作皆足以生天地之所以分人也因道修德順天之則竭精盡神趣時不息抱信效素歸於無極纖微損儉為天下式各守其名皆修其德樂生安俗四海賔伏侯王之所以守任也大通和正直方不曲忠信順從奉其分職善善惡惡不變名實不小其位不賤其服臣下之所以守貞也小心敦朴節儉强力順天之時盡地之力適形而衣和腹而食日出而作日入而止不薄所處不厭所食萬民之所以守其身也動靜失和失道之分耕織不時失天之分去彼任己失君之分創作知僞失臣之分衣食不適失民之分失道之分性不可然失天之分家不可安失主之分國不可存失臣之分命不可全失民之分身不可生道德天地君臣吏民動靜所為各有分部得其分部上下俱全失其所為大小俱困守分如常與天地通損己餘分與道俱行祭祀不絶後世繁昌過分取大身受不祥重纍相繼後世有殃此古人之所以棄損形骸飢寒困窮者以其動靜不和耕織不時適情順性嗜欲不厭食窮五味衣重文綵麗靡奢淫不知畏天功勞德厚不尅其分衣食之費倍取兼人也夫人之所以飢者由上食稅之多更不安其分而相學奢侈故也是以身獲其患事及子孫故布衣弊而不周疏食乏而不厭百姓之所以偷利化惡公廢私行營家者富圖國者貧直者先死廉者困窮風流俗敗是僞非真豪亂豐擾君子深藏衆寡相暴强弱相凌貧者臣役富家如王以其淫主亂君不覩自然反情縱欲違道去天飾知創作以順其心也百姓之難化以上之有為以是淳消朴滅巧故孳生奇物日進不可勝形佞諂親幸邪僞者封臣術大勝君道浸壅弊欺之路飾滅危之患生忠正之士疏而日遠詐世之人群而並翔煞人不死奸禁不論權立勢行威動三軍目之所視意之所指應聲而至在所欲存俱過於世或如彼或如此恍惚悒悒存不如亡生不如死志勇膽橫瞋目相視君臣相謀父子相揆湯鑊不能畏鈇鉞不能止民之所以細其命而大財寶乘危狹觸重禁赴白刃冒流矢不顧其身得利為右者以其欲名之榮而求生之厚也所謂人之輕死以其求生之厚是以失財亡爵或傷腸折肝狂易絞頸損精棄神心常樂死擢刃自刑或赴深水是以輕死是以自然之道常與物反無身者生有身者死趨利者逢患求福者得禍不召自來不迎而遇我雖欲勿然世不得解故生生趨利為死之元也無身去利為生之根也雌下無名可以無患卑賤汙辱可以無咎蔬食藜羹可以長厭布衣鹿裘可以長好無以民為可以康寧無以生為可以長久是無以生為也是故能除分損己至於無取卧則如尸立則如表不異變化不殊生死不貴侯王不賤奴虜唯在所遇聽造化者煞之不憂生之不喜然後與道為人與天地友長生久視終而復始富貴無期為天下市是賢於貴生也人之生柔弱神在身也其死堅强神去身也草木之生柔脆陽氣在也其死枯槁陽氣遁也故堅强者死之徒亡之形也柔弱者生之徒存之容也故兵强不勝敵四應也木强則共生者衆也强大處下其道窮也小弱處上和得中也指歸有物俱生無有形聲既無色味又不臭香出入無户往來無門上無所蒂下無所根清靜不改以存其常和淖纖微變化無方與物糅合而生乎三為天地始陰陽祖宗在物物存去物物亡無以名之號曰神明生於太虛長於無物禀而不衰授而不屈動極無窮靜極恍惚大無不包小無不入周流無物之外經歷有有之內天奔地馳而不能及陰騁陽騖而不能逮響窮竭而不能應影糜散而不能類取而不能以息豫而不能以費去取有分無所憎愛留柔居弱歸於空虛進退屈伸常與德俱為道先倡物以疏瞿受多者聖智得少者癡愚故神明聖智者常生之主也柔弱虛靜者神明之府也所謂人之生柔弱即神明在身也夫神明之在人也得其所則不可去失其所則不可存威力所不能制而智惠所不能然苟能攝之富貴無患常在上位久而益安是以人始生也骨弱筋柔血氣流行心意專一神氣和平面有榮華身體潤光動作和悅百節堅精時日生息旬月聰明何則神居之也及其老也骨枯筋急髮白肌羸食飲無味聽視不聰氣力日消動作月衰思慮迷惑取舍相違及其死也形槁容枯舌縮體伸何則神去之也其死堅强也草木之始生也枝條潤澤華葉青青豐茂暢美柔弱以和何則陽氣存也其衰也華葉黃悴物色焦殃及其死也根莖枯槁枝條堅剛何則陽氣去之也草木之生柔脆其死枯槁也故神明所居危者可安死者可活也神明所去寧者可危而壯者可煞也陽氣之所居木可卷而草可結也陽氣之所去氣可凝而冰可折也故神明陽氣生物之根也而柔弱物之藥也柔弱和順長生之具而神明陽氣之所託也萬物隨陽以和弱也故堅强實滿死之形象也柔弱滑潤生之區宅也堅强者死之徒柔弱者生之徒凡人之性憎西鄰之父者以其强大也愛東鄰之兒者以其小弱也燔燒枯槁者以其剛强也簪珥榮華者以其和淖也人愛幼而憎老者由生氣所在多少是故上無天子諸侯相侵敵國爭權舉兵相臨柔弱者勝堅强者窮夫何故哉强大之兵非以順天地本和弱主慈愛誅驕暴救不足破貪叨也將恃國家之勢民人之衆好起功名效其態故利人壤土欲人財貨樂煞安傷夷人宗廟喪人社稷以顯其威重屈約而畏下乘人之利而申其志親之者死事之者禍咎責絶逆人心煞戮不合天意生而天下病死而天下利衆弱為一同憂共謀雖有强名實不得勝所謂兵强則不勝也夫何故哉毒流死結天道不祐也何以明之昔强秦大楚滅諸侯并郡邑富有國家貴為天子權傾天下威振四海尊寵窮極可謂强矣垂拱而諸侯憂蹻足而天下恐發號而天心悲舉事而神明擾亡國破家身分為數夫何故哉去和弱而為剛强也及至神漢將興遁逃龍隱萬民求之遂不得免父天母地愛民如子賞功養善師於天士當敵應變計如江海戰勝攻取降秦滅楚天下欣欣立為天子夫何故哉順天之心而為慈小也非獨人事萬物然矣夫巨木高百尋大連抱頭剖中門尾判中户不蒙華實常在於下千枝萬木舒條布葉青青葱葱共生其上者以其形大而勢强也所謂木强則共是故神明之道天地之理小不載大輕不載重故强人不得為王强木不得處上强大處下何則强人為王萬國愁憂强木處上則根本枯槁衆人為大故居下聖人為小故居上强大居下小弱居上者物自然也小弱處上理數必然天之道陰且陽也其猶張弓有煞生也高者案之劑大長也下者舉之輔始生也有餘者損之破滿盈也不足者補之豫虛空也天之道損有餘均為常也補不足資寡亡也人之道則不然所不行也損不足奪弱蒙也奉有餘與大衆也孰能損有餘明達通也而奉天下福並生也唯有道者為無名也是以聖人謂明王也為而不恃無所望也成功不居去顯榮也不欲見賢畏大殃也指歸天地未始陰陽未萌寒暑未兆明晦未形有物參立一濁一清清上濁下和在中央三者俱起天地以成陰陽以交而萬物以生失之者敗得之者榮夫和之於物也剛而不折柔而不卷在天為繩在地為準在陽為規在陰為矩不行不止不與不取物以柔弱氣以堅强動無不制靜無不與故和者道德之用神明之輔天地之制群生所處萬方之要自然之府百祥之門萬福之户也故智者見之謂之智仁者見之謂之仁天下以之日夜不釋莫之能覩夫何故哉以其生物微而成事妙也是以天地之道不利不害無為是守大通和正順物深厚不虛一物不主一所各正性命物自然矣故盛者自毁張者自弛隱者自彰微者自顯不足者益有餘者損存者自亡生者自死是非自反吉凶自取損不可逃益不可距禍無常留福無常處各受一分不得兼有故鱗者無毛毛者無羽𧣻者無牙角者無齒見於晝者滅於夜得於前者失於後再便重利未之嘗有事不並興利不兩來不大不小固一不變已中其惘不可得解是以日中而昃月滿而缺四時變化一消一息高山之下必有深谷大泉之流必有激波爍金湯石存于凝冰裂地之端陰陽所成此天之道陰極而陽陽極而陰百工所為靡不由然夫弓人之為弓也既煞既生既翕既張制以規矩督以準繩弦高急者寬而緩之弦弛下者攝而上之其有餘者削而損之其不足者補而益之弦質相任上下相權平正為主調和為常故弓可抨而矢可行也天道亦然故云其猶張弓夫按高舉下損大益小天地之道也反天以順民逆民以順道賢者為佐聖人為主務愛有餘以為左右智者居上癡者居下能大爵高伎小官卑功鮮賞微勞大祿重侯王之道人道之所然也欺敦慤侮忠信侵暴寡弱臣役愚民奪弛以與張損小以益强逆微順顯以容其身此衆人之道也所謂損不足以奉有餘以大居小以明居晦以强居弱以衆居寡以達居窮以高居下故高而不可劑盈而不可毁大而不可破滿而不可損剛而不可折柔而不可卷孤而不可制弱而不可取愚而不可賤無而不可有天地祐之若子人民助之若母與和常翔與道終始天人交順神明是守至人之道也至人常自不有而恆有餘同道洞物以奉天下所以為有道者也是以聖人之動無名為務和弱為主隱而不窮榮而不顯辭貴讓富餘力不取盈國不入盈人不友恆若有失惕若遭咎履道合和常與物友通天之經達地之理成功不居德流不有所謂為而不恃成功不居逃名遁勢玄冥是處滅端匿迹無形是守寂寞虛空莫能奪與魁然獨立與天同道夫何故哉憚道之殃不敢見賢也雖有蓋天之功而不欲見所謂不欲見賢聖哲之行也天下莫柔弱於水體和淖也而攻堅强者有磨鑿也莫之能先待水成也其無以易之矣無可若也夫水之勝强沉萬物也柔之勝剛既不弊也天下莫不知事明白也莫之能行寡能弱也聖人言云傳國式也受國之垢蒙醜辱也是謂社稷之主為侯伯也受國不祥蒙禍殃也是謂天下之王為帝王也正言若反與事舛也和大怨咎怨人也必有餘怨及善民也安可以為善失天心也是以聖人謂明君也執左契德符信也不以責於人道自然也有德司契求諸身也無德司轍求之人也天道無親正和鈞也常與善人德相通也指歸道德所包天地所載陰陽所化日月所照物類並興紛繆雜亂盛衰存亡與時變化積堅者敗體柔者勝萬物之理自然之稱也是故水之所以能觸石貫金崩山潰堤周流消息淪於無資廣大無窮修遠無涯明不可蔽强不可加濁而能清少能復多危能復寧疾能復遲與時變化死而復生浸濡萬物養育群形布施而不費贍物而不衰注四海而不有功配天地而無以為優游毫釐之內翶翔九野之外澤及蒼天之上槃積黃壤之下强扶天地弱沉毛羽微積集少以成江海上下無常終而復始進退屈伸近於道者也以其形體柔弱動靜待時不設首嚮和淖潤滑也故百工之治殊事異方漚爛金石破堅折剛平微正妙解緩群形和調五味蕩滌臭腥攻堅陷大非水不行所謂天下莫柔弱於水而攻堅强者莫之能先夫何故哉衆物態能莫之與雙也故水之滅火砥之利金角齒傷折舌耳無患卑損制驕暴雌辱勝大怨天下莫不知世俗莫不聞皆用私心不已莫有能行夫水之勝强柔之勝剛天下莫不知莫能行也故言為禍匠默為害工進為妖式退為孽容勞而無德苦而無功長去昭昭久陷冥冥大變為小存化為亡是故明王聖主將傳國家必有誓言受國之垢為社稷之主受國不祥為天下王所謂聖人有言何謂受國之垢曰食民所吐服民所醜居民所使樂民所苦務在順民不遑適己故民託之如父愛之如母願為臣妾與之俱死是以處寒繫之地沙石之壤僻迥之國厄狹之野因辱為榮存其宗祖變禍為福長為民主是謂受國之垢故為社稷之主何謂受國不祥曰忍民所醜受民所惡當民大禍不以為德計在喪國不失天心慮在殺身不失民福天地與之俯仰人物與之反側隨之東西附之南北所加者亡所圖者服天下蕩蕩并為一域向風仰化靡不蒙澤故能矯邪振亂無所不克變化淫敗以為敦朴功德至大名勢窮極是謂受國不祥故為天下王夫何故哉柔心弱志輕己重民安於醜辱也是故正言若反莫之能覆近而若遠莫之能測求之大遠莫之能得皆在於己何則奢侈在己素儉於人邪枉在躬求正於民患禍生我請福於天天地示之不能見神明告之不能聞釋是廢然好用和心身動於此事應於天去己怨彼天下大昏罔以明法誅以信刑名實有孚賞罰得中公平無私逾失天意正直不邪益失民心刑戮並用而姦益起賞深賜重而亂益生當此之時善人中罔賢者陷刑雖得名實何可善焉所謂和大怨必有餘怨安可以為善是以聖人執道之符操德之信合之於我不以責人故有德之主將欲有為必稽之天將欲有行必驗符信求過於我不尤於民歸禍於己不怨於人是以聖人執左契而不責於人者也故是非自定白黑自分未動而天下應未令而萬物然有德司契無德之人務適情意不顧萬民政失亂生不求於身專司民失督以嚴刑人有過咎家有罪名百姓怨恨天心不平其國亂擾後世有殃無德司轍是故天地之道與人俱行無適無莫無疏無親感動相應若響與聲靜作相隨若影與形不邪不佞正直若常造惡與之否行善與之通柔弱與之相得無為與之合同天道無親常與善人信不虛也小國寡民狹以少也使人有什伯之器殖財寶也而不用使遵儉也使民重死得其所也而不遠徙安鄉里也雖有舟輿家富厚也無所乘之民朴鄙也雖有甲兵充庫府也無所陳之大治起也使人結繩而用之反太古也甘其食無味美也美其服無色好也樂其俗便生道也安其居自保有也鄰國相望各自守也雞犬之聲相聞道理人也民至老死天年盡也不相往來友者鮮也指歸國有大小地有險易民有衆寡貨有多少形有高卑塗有遠近勢有强弱權有輕重大勝小易勝險富勝貧衆勝寡高勝卑近勝遠强勝弱輕勝重物之理也强弱在將安危在相得失在主存亡在道天無常與民無常處有德者歸之無德者見背自然之道也故地廣民衆將勇主嚴不足以為强甲堅士練城高池深不足以為安辨利聽察甘言浮說假借阿順不足以為親割地獻賔結縱連橫黨衆興盛不足以為全唯有道者無所不制德厚澤深無所不勝小變為大弱轉為强輕化為重寡易為衆故君子所處雖小必存小人所居雖大必亡是以小國之君地狹民少德薄權輕諸侯不市刑制不禁無有丘阜之阻江河之險鄰國之親孤特獨處存乎大國之間地寒而不足割寶幣輕而不足獻將相不附百姓輕往鄰人重求故無磐石之固山陵之安常處乎纍卵之危然則伐之不足以為暴德之不足以為多故小國者危亡之樞而安寧之機也小國寡人易為危敗則謙光以道日益其高故云危亡之樞安寧之機也是以聖人之治小國也轉禍為福因危為寧富以舟輿實以甲兵器械便利衣食有餘牛馬蕃息畜積充滿什伯鄰國以固民心能而不為知而不作滋味不治庖厨不飾絶身滅色身為之式飲而後食勞而後息暑服一單寒衣一復期於和適不厚其服務以便生不為口腹賦鮮徭寡民有餘力并兼之原絶而增加之流息風俗敦厚遵儉忠慤有而若亡能而若劣此有道之君能使小國寡人有什伯之器而不用也夫何故哉建之以道抱之以德勞佚危寧與民若一平心適和聽以督實敬順遜辭以褒其神聰明盛德以匡流失鄰國不動百姓和集樂生安壽惡為盜賊當此之時無鐘鼓而萬物足百姓和洽臣主相得安土樂生故死於巖穴遷徙去鄉利雖百倍不離其國是使人重死而不遠徙者家有舟輿無所運乘户有甲兵無所施力雖有舟輿無所乘之雖有甲兵無所陳之何則將相明知人君有道民務耕織多積為好鄙朴在上柔弱為右貴忠敬信下力賤巧法明俗定上下相保未令而民從不戰而敵恐求利者不議難勝趨名者不圖無罪塊然獨安百姓不擾捐知棄僞復歸太古結繩而識期素情而語事約物修文亡言寡志皆合自然各得其所所謂復結繩而用之者也蔬食藜羹無味為甘布衣鹿裘無文為好甘其食美其服危狹險阻栗栗為寧寒僻迥厲以為厚安樂謡俗便習水土樂其俗安其居道隆德盛和睦鰥寡接地鄰境各自保守鄰國相望精神不耗魂魄不毁性命全完意欲窮盡雞狗之音相聞民人薪菜登山相視澗溪共浴相去甚近君臣不相結男女不相聚各自止足自生至老老而至死非傳主命莫有來往人至老死不相往來者以至無為而人無欲故信言不美苦以直也美言不信甘以謾也知者不博歸本根也博者不知務多端也善者不辨質獸醇也辨者不善上飾言也是故聖人無積其道明也既以為人道施行也己愈有我益深也既以與人盡道傳也己愈多我益盈也天之道陰且陽也利而不害務以生也聖人之道逃顯榮也為而不爭辭功名也指歸虛實相歸有無相生寒暑相反明晦相隨陰消而陽息陽息而陰消本盛則末毁末毁則本衰天地之道變化之機也凡此數者聰明之門情僞之根嫌疑之尺寸眩耀之權衡也因其本修其無開以天心督以自然要而推之約而歸之察近知遠觀覆覩反聞名識實見始知卒聽聲見形以喻得失則是千歲之情同符而萬世之為共術天地之心可見而鬼神之意可畢況乎人事哉此天下之常然故衆人之所共體也人懷自然之道達人情之理秉造化之元明異同之紀故苦言中適淡淡和德謂之信者下之所仰於上彼之所取於此强大之元威令之始民人所助成功之首權勢所因名號所起也夫道淡淡無味故信言不美然事由之成理而顯故一人唱而千人和一人動而萬人隨破强敵陷大衆赴水火之危亡死不旋踵而民不恨者信也信雖不美有此之益甘言流說衆諾美大謂之不信何謂不信言而不然謂之不信人而不信德澤不立威勢不行權重不顯名號不明賞之不使罰之不禁故上下不附舉事無功雖貴而無位高而無民孤特獨處社稷不寧天下望幸盡遇罪刑者美言也甘言無實美而不信反本歸根離末去文元元始始寡以然衆一以應萬要以制詳約守真一謂之少聞少聞故能知知者不博何謂知達人之情以及神明之謂知知者保身之數全國之具也上之所依下之所附導天之經達道之路也故總安危之大範秉治亂之至要使海內之士盡忠竭能分職奉公以寧其上權勢流行威德隆盛者知也知者雖不博而有此之功所謂子能知一則萬事畢也心識萬端目窺人事無所窮極衆臣分散謂之博聞博聞故不知博者不知何謂不知嫌於天道疑於人事之謂不知不知之徒安樂萬事內多思慮外多喜欲既有所憎又多所惡易誘以生可脅以死故見竒而動臨危而畏眩耀物類詭誑時變違通背達歸於窮困動與患鄰靜與禍比宗廟危殆萬民散離者博聞也此博者不知之遇也四通博達容疏言訥謂之不辨挽挽而成默默而信故能成善善者不辨故成善何謂成善動合天心靜得地意言無不通默無不利謂之善夫善者君子所本百行所長吉祥所合萬福所往流而不竭用而不絶萬王不變異俗不易天地所與神眀所益故上以順天下以順人為治元始事之恆常成理萬物覆載群生天下懷慕繼之無窮者善也善者雖不辨而有此之功不識元首不覩根本誣天誣地誣人誣鬼屬辭變意故謂之辨抱嫌履疑順心妄動尚言美辭故生不善辨者不善何謂不善動與天逆靜與地反言傷人物默而害鬼之謂不善不善之人分道别德散朴澆醇變化文辭依義託仁設物符驗連以地天因主熊羆世俗所尊反指覆意逃實遁名耀人寂泊惑人無端廢直立僞務以諂君飾辭以愈其上朋黨以趨主心開知故之迹閉忠正之門操阿順之術以傾國家之權生息暴亂長育大姦天下上舌世濁主昏壅蔽閉塞以之危亡者辨也辨者之不善而有此之害是故聖人愼戒其始絶其未萌去辨去知去文去言虛靜柔弱玄默素真隱知藏善導以自然是非白黑昭如日月同異真僞如地如天空虛無積與物俱變是聖人無積也無為為之與物俱然畜之不盈散之未既包裹萬方博者深思不見其緒辨者遠慮不聞其端施而不屈變化不窮終而復始大明若昏既以為人己愈佚盡以治人己益眀既以生人己愈壽盡以教人己愈益所謂既以為人己愈有既以與人己愈多也既陽且陰陰而又陽天之道也利而不害與天地同生而不殺與神明通建德流澤常處顯榮辭巧讓福歸於無名為而不恃與道俱行天道既利而不害聖人則為而不爭天人雖異利益是同則天同道吾無間矣道德真經指歸卷之十三
