body:
  text: 蜀郡嚴遵字君平撰谷神子注道生一混窅冥也一生二謂神明也二生三和濁清也三生萬物天人形也萬物負陰而抱陽嚮柔生也沖氣以為和合弱成也人之所惡謂不樣也唯孤寡不穀卑微名也而王公以名稱禮以生也損之而益損生盈也益之而損益生亡也人之所教卑微弱也亦我教之聖知我也強梁者有勢力也不得其死為命賤也吾將以為教父凶禍極也指歸有虛之虛者開導稟受虛之虛者道也無然然者而然不能然也道能然成於萬物而萬物不能然成於道則道是物之所然之元故云然然者而然不能然也有虛者陶冶變化始生生者而生不能生也虛者謂一也一能為生生之始而非有形之生不能生於一故云始生生者而生不能生也有無之無者而神明不能改造存存者而存不能存也無之無者謂一也二從一生雖有夫形故能造存存而非存所能造也有無者纖微玄妙動成成者而成不能成也無者謂三也三從二生亦有夫形俱根於一受命於神兆成萬物而萬物不能成之故云動成者而成不能成也故虛之虛者生虛虛者無之無者生無無者無者生有形者故諸有形之徒皆屬於物類物有所宗類有所祖天地物之大者人次之矣夫天人之生也形因於氣氣因於和和因於神明神明因於道德道德因於自然萬物以存自然者無物所使之名也即道自然一變而生神神通而成和和散而成氣氣結而成形故云道生一一生二二生三三生萬物故使天為天者非天也使人為人者非人也元始生有有不能生有故云為人者非人也何以明之莊子曰夫人形腐何所取之聰明感應何所得之變化終始孰者為之明始於無由此觀之有生於無實生於虛亦以明矣是故無無無始不可存在無形無聲不可聽視稟無授有不可言道無無無之無始未始之始萬物所由性命所以無有所名者謂之道道為一之元道虛之虛故能生一元本寂寥是虛中之虛始生一者也有物混沌恍惚居起輕而不發重而不止陽而無表陰而無裏既無上下又無左右通達無境為道綱紀懷壤空虛包裹未有無形無名芒芒澒澒混混沌沌冥冥不可稽之亡於聲色莫之與比指之無嚮搏之無有浩洋無窮不可論諭潢然大同無終無始萬物之廬為太初首者故謂之一太初有無無有無名一之所起有一而未形即窅冥中能生之德名也是以無終無始無左無右似陰非陰似陽非陽故云陽無表陰無裏一以虛故能生二一是有中之虛變成二二物並興妙妙纖微生生存存因物變化滑淖無形生息不衰光耀玄冥無嚮無存包裹天地莫覩其元不可逐以聲不可逃以形謂之神明存物物存去物物亡智力不能接而威德不能運者謂之二二即神明也二以元之無故能生三神明是無中之無故能生三三物俱生渾渾茫茫視之不見其形聽之不聞其聲搏之不得其緒望之不覩其門不可揆度不可測量冥冥窅窅潢洋堂堂一清一濁與和俱行天人所始未有形朕圻堮根於一受命於神者謂之三三即太和也三以無故能生萬物太和是有中之無一變而成有故云三生萬物清濁以分高卑以陳陰陽始别和氣流行三光運群類生有形臠可因循者有聲色可見聞者謂之萬物萬物之生也皆元於虛始於無虛是無之本元是始之本背陰向陽萬物背陰而向陽歸柔去剛清靜不動心意不作而形容修廣性命通達者以含和柔弱而道無形也沖氣以為和是故虛無無形微寡柔弱者天地之所由興而萬物之所因生也衆人之所惡而侯王之所以自名也萬物之原泉成功之本根也夫虛無孤寡乃萬物之本根也故王公以自名而衆俗之所惡故賢君聖主以至尊之位強大之勢處孤寡居不穀逐所求逃所欲去大為小安卑樂損出無迹入無朕動於福先靜於禍始無為無事天下自已不視不聽抱和以靜神明生息形容自正進退有常不變其行德化凌風理於蒸庶天地是祐萬物是歸損者而益衆人則不然見聞知病見聞知病合於成事不覩未然之變故貴堅剛大權造勢衆務不制深度柔弱遠絶微寡動與道舛靜與天忤神明潰濁衆事並興思慮迷惑妄喜妄怒福禧出門妖孽入户天網以發不可解之也益者而損滂然禍生愴爾覺悟屈約而言卑將死而辭善雖欲改過為新反於微寡自然不釋與生路遠破國亡家禍及子孫故衆人之教變愚為智化弱為強去微歸顯背隱為彰暴寵爭逐死於榮名人之所教也聖人之教則反之愚以之智辱以之榮微以之顯隱以之彰寡以之衆弱以之強去心釋意務於無名無知無識歸於玄冥殊塗異指或存或亡聖人之教教以寡弱衆人之教教以衆強所謂人之所教我亦教之教不同也是以強秦大楚專制而滅神漢龍興和順而昌故強者離道梁者去神生主以退安得長存強梁者不得其死不求於己怨命尤天聖人悲之以為教先書之竹帛明示後人終世反之故罹其患吾將以為教父天下之至柔無形物也馳騁天下之至堅勝有質也無有入於無間無為室也吾是以知睹得失也無為之有益亂原絶也不言之教禍門閉也無為之益萬物存也天下希及之寡能及也指歸道德至靈而神明賔神明是道德之外用故稱賔神明至無而太和臣太和是神明用之捋成故稱臣清濁太和至柔無形包裹天地含囊陰陽經紀萬物無不維綱或在宇外或處天內人物借之而生莫有見聞從道三變始成萬物人借而生莫有能知毳不足以為號弱不足以為名聖人以意存之物也夫聖人所以得稱聖者皆以學道存神修生保真得真成道包裹天地是深要之物故不得以意存也故字曰至柔名曰無形是以無形之物不以堅堅不以壯壯故能弊天地銷銅鐵風馳電騁經極日月周流上下過飄歷忽安固翶翔淪于無物物類有形則有凝虛空無妙則無能道既非有亦非無故能持有而無礙也何以效其然也夫響以無聲不可窮影以無形不可極水以淖弱貫金石沈萬物地以柔順成大功勝草木舌耳無患角齒傷折由此觀之柔者弊堅虛者馳實非有為之自然之物也理數必爾不得不然斯事物之自然非道體之自然是以地狹民少兵寡食鮮意妙欲微神明是守與天相參視物如子德盛化隆恩深澤厚吏忠卒信主憂將恐纍柔積弱常在民後被羞蒙辱國為雌下諸侯信之比於赤子天下往之若歸父母人物同欲威勢自起強者不能凌大者不能取終始反覆強弱變化天地為助神明為輔時至不制為天下主夫何故哉以道柔弱而體微寡也故地廣民衆國富兵強吏勇卒悍主能將嚴賞重罰峻削直刻深百官戰栗若在君前勢便地利為海內雄輕敵樂戰易動師衆合變生奇凌天侮地諸侯執服靡不懸命威震境外常為梟俊人憂物恐威動天地道德不載神明是離衆弱同心萬民不附身死國亡族類流散夫何故哉體堅剛而積憍吝也夫道以無有之有通無間遊無理光耀有為之室澄清無為之府出入無外而無坼經歷珠玉而無朕謂天下之至柔騁天下之至堅也何以效其然也夫有形鎌利不入無理神明在身出無間入無孔俯仰之頃經數千里無有入無間也由此言之有為之為有廢無功無為之為成遂無窮天地是造人物是興有聲之聲聞於百里無聲之聲動於天外震於四海言之所言異類不通不言之言陰陽化天地感且道德無為而天地成天地不言而四時行凡此二者神明之符自然之驗也是以知無為有益是以聖人虛心以原道德靜氣以存神明損聰以聽無音棄明以視無形覽天地之變動勸萬物之自然以覩有為亂之首也既達無為之功自見有為之亂無為治之元也言者禍之户也不言者福之門也是故絶聖棄智除仁去義發道之心揚德之意順神養和任天事地陰陽奉職四時馳騖亂原以絶物安其處世主恬淡萬民無事教以不言之言化以不化之化示以無象之象而歸乎玄妙奄民情欲順其性命使民無知長生久視是不言之教也故我無言而天地無為天地無為而道德無為三者並興總進相乘和氣洋溢太平滋生人物集處宇內混同禍門以閉天下童蒙世無恥辱不覩吉凶知故窒塞自然大通家獲神明之福人有聖智之功無為之益也當此之時主如天地民如嬰兒飲主之德食主之和陽出陰入與道卷舒君父在上若有若無天下惘惘味味喁喁不知若鷇無為若雛生而不喜死而不憂閔閔挽挽性命有餘莫有求之萬福自來天下希及之也夫何故哉人王不言而道無為也無為之關不言之機在於精妙處於神微神微之始精妙之宗生無根蒂出入無門常於為否之間時和之元道既無體不可見聞能適時和則自知耳故可聞而不可顯也可見而不可闡也可得而不可傳也可用而不可言也柄而推之要而歸之易為智老陳難為淺聞者言也何則廣大深遠而衆人莫能及也上而若反而衆人莫能入也淡淡濫濫而世人莫能聞也窅窅冥冥而俗主莫能行也名與身孰親我身親也身與貨孰多我身多也得與亡孰病得我患也是故甚愛必大費損我神也多藏必厚亡退我身也故知足不辱榮己存也知止不殆身安寧也可以長久大命延也指歸我性之所稟而為我者道德也其所假而生者神明也其所因而成者太和也其所託而形者天地也凡此數者然我而我不能然也故法象莫崇乎道德稽式莫高乎神明表儀莫廣乎太和著明莫大乎天地道德神明常生不死清濁太和變化無窮天地之道存而難亡陰陽之事動而難終天地陰陽但見於難終非無終始也由此觀之禍極於死福極於生是以聖人上原道德之意下揆天地之心崇高顯榮吉祥盛德深閎浩大尊寵窮極莫大乎生萬物陳列奇怪珍寶金玉珠璧利深得巨莫大乎身禍世之匠亂國之工絶逆天地傷害我身莫大乎名生憍長溢困民貧國擾濁精神使心多欲叛天違道爭為盜賊天下不親世多兵革一人為之傷敗萬國主死民亡物蒙其毒莫大乎貨明貨與名可畏可驚多親之益於身遠矣故得之與亡或病或利得名得貨道德不居神明不留大命以絶天不能救失名失貨道德是祐神明是助名顯自然富配天地得名得貨失道亡身亡名亡貨利配天地也故細身大名未可與論至道也輕身重國未可與圖利也夫無名之名生我之宅也有名之名喪我之橐也無貨之貨養我之福也有貨之貨喪我之賊也是故甚愛其身至建榮名為之行之力之勞之強迫情性以損其神多積貨財日以憍盈憍亡之道貨名俱終甚愛必大費也故神明不能活天地不能全也夫何故哉道德之化天地之數一陰一陽分為四時離為五行綸為羅網設為無間萬物之性各有分度不得相干造化之心和正以公自然一槩正直平均無所愛惡與物通同劑長續短損盈益虛不足者養有餘者喪貪叨多積自遺禍殃不足不止利心常起智以詐愚強以大取自然均之名利歸主失之而憂得之而喜一喜一憂魂魄浮遊一憂一喜神明去矣身死名滅禍及子孫故名利與身若炭與冰形性相反勢不俱然名終體極身存世昌者天下無之虛者道之所歸實者物之所喪今積物喪之實欲同道歸虛若水火相違不可得也是故擾心猾意用情事神夙夜趨務飾容治辭憂懷衆庶創事立功勵身起節以顯榮名是損所以有身而益所以亡身也竭筋力忍飢渴犯寒暑踐危狹薄衣惡食不適口腹迎朝送夜被恥蒙辱精奔神馳汲汲不止逆道干榮多入為有危身以寧貨積神亡禍患自來憍亡俱至則是為福以亡福求利以去利多藏必厚亡也故成敗之事在為與否存亡之道在去與來是以知足之人體道同德絶名除利立我於無身養物而不自生與物而不自存信順之間足以存神室家之業足以終年常自然故不可殺處虛無故不可中細名輕物故不可汙欲不欲故能長榮所謂不辱也知止之人貴為天子不以枉志貧處巖穴不以幽神進而不以為顯退而不以為窮無禍無福無得無喪不為有罪不為有功不求不辭若海若江遊揚玄域神明是通動順天地故不可危殊利異害故能常然是以精深而不拔神固而不脫魁如天地照如日月既精且神以保其身知足而止故能長存知止不殆也此謂遁名而名我隨逃利而利我追者也是欲蓋而彰可以長久也大成若缺政無形也其用不弊化流行也大盈若沖主無名也其用不窮理萬方也大直若屈無所名也大巧若拙無所成也大辨若訥滿若空也躁勝寒動形容也靜勝熱安形神也能靜能清則天地也為天下正萬物經也指歸道德無為而神明然矣神明無為而太和自起無為而萬物自理或無根而生或無足而走或無耳而聽或無口而鳴殊類異倫皆與之市母憂其子子憂其母男女相兼物尊其主巢生而啄胎生而乳鳥驚而散獸驚而聚陰物穴居陽物巢處火動炎上水動潤下萬物青青春生夏長秋成冬熟皆歸於土非有政教物自然也是陰陽物理勢數之自然不得不爾由此觀之為不生為否不生否明不生明晦不生晦不為不否不明不晦乃得其紀也不為不否不明不晦者從容合道也故大道坦坦不出門户其出彌遠其知彌寡道在於身不在於野化自於我不由於彼萬物常治智慧不起是以聖人柄和履正治之無形遊於虛廓以鏡太清遺魂忘魄休精息神無為而然玄默而信窅然蕩蕩昭曠獨存髣佛挽逮其事素真其用不弊莫之見聞所謂大成若缺其用不弊也夫何故哉微妙周密清靜以真未有形聲變化其元開導如陽閉塞如陰堤如地運動如天文武玄作盛德自分是以盈而若沖實而若虛不顯仁義不見表儀不建法式不事有為上欲不欲天下自化敦厚朴素民如嬰兒蒙蒙不知所求茫茫不知所之其用不窮流而不衰大盈若沖其用不窮不耕自有食不織自有衣暑則靜於倮寒則躁於裘無有忌諱與糜鹿居被髮含哺相隨而遊主有餘德民有餘財化襲萬物無所不為光景不見獨玄有奇天地人物與之俱化乘空載虛與道徘徊厲度四海周流六虛浩洋無窮棲息至無夫何故哉直而若屈正而若枉大直者若屈也世主為聲天下為響世主為形人物為影故不郊祀而天心和不降席而正四海故曰大巧若拙天道自卑無律曆而陰陽和無正朔而四時節無法度而天下賔無賞罰而名實得隱武藏威無所不勝棄捐戰伐無所不克無號令而民自正無文章而海內自明無符璽而天下自信無度數而萬物自均大辨若訥者也是以羸而若絀得之若喪無鐘鼓而民娛樂無五味而民食甘無服色而民美好無畜積而民多盈夫何故哉因道任天不事知故使民自然也前五大雖若不肖而皆有所成明人至能以道化人使人自同於道也天地之道一進一退而萬物成遂變化不可閉塞屈伸不可障蔽故陰之至也地裂而冰凝清風飂冽霜雪嚴嚴魚鱉蟄伏萬物宛拳當此之時處溫室臨爐火重狐狢襲毳綿猶不能禦也及至定神安精動體勞形則是理泄汙流捐衣出室暖有餘身矣躁勝寒者也陽之至也煎砂爛石飛鳥絶水蟲疾萬物枯稿江河消竭當此之時入沉清泉出衣絺綌燕高臺服寒石猶不能任也及至解心釋意託神清靜形捐四海之外遊志無有之內心平氣和涼有餘矣靜勝熱者也夫知故之為術也治人事育群形德延天地功配陰陽及其生亂也發於無形起於無聲與政卷舒與化推移得人如濕逮人若陰猶響應言影不離形為之愈亂治之益煩明智不能領嚴刑不能禁是無為者有為之君而成功之主也政教之元而變化之母也其除禍亂猶躁之勝寒而靜之勝暑也是以聖人去知去慮虛心專氣清靜因應則天之心順地之意政舉化流如日之光禍亂消滅若雲之除天下象之無所不為萬物師之無所不事所謂能清能靜天下自正者也天下有道主無欲也却走馬以糞為穀食也天下無道主起事也戎馬生於郊法主戎也罪莫大於可欲常取求也禍莫大於不知足求無已也咎莫大於欲得利心起也知足之足無所取也常足矣無所不有指歸人之生也懸命於君君之立也懸命於民君得道也則萬民昌君失道也則萬民喪萬民昌則宗廟顯萬民喪則宗廟傾故君者民之源也民者君之根也根傷則華實不生源衰則流沫不盈上下相保故能長久是以世主得道宇內不擾諸侯賔服百蠻雍喜四海同風兵革不起徼捍之人無所效其言果壯之士無所施其功聰明辨智隨澤而耕騏驥驊騮嬰輿而作所謂天下有道却走馬以糞也天下宴間各樂其業世惇俗厚民人專一總織而衣總耕而食天心和洽萬物豐熟嘉祥屢臻吉符並集非天降福世主道德也天子失道諸侯不朝溪異谷别法制舛殊四方背叛力正相凌舉兵爭權弱者為虜強者為君是以天下選將簡士砥礪甲兵懸烽烈火四面相望深姦大詐謀於廟堂作變生奇結縱連橫輕車梟騎興敵相當士馬生郊歷年不還化高詐力政當首功當此之時飾養戎馬不遑親戚奔郊先至常食菽粟貪夫坐而為宰庸僕之徒畜而為賊百姓罷極財殫力倦長徭兵役久而不息此戎馬所以生於郊也時念歸家悽愴慷慨想親罷老泣涕於外慈父惠母憂愁傷心肝膽氣志摧折於內士卒雙頭結踵骸骨暴露流離於中野者不可勝計道路憧憧皆為孤子思慕號令踊泣而起何罪蒼天遭離此咎牝者無夫幼稚無父怨慟悲痛不期而聚大者為率中者為宰上下相護中外相保非有血脈親如兄弟總苗為旌穿地為鼓操兵便械趨行案伍常習戰鬥意議其主至精相感氣化相動是以天地鈐結陰陽隔閉星辰散亂日月鬥蝕詐逆萌生災變並發非天降禍世主無道無道之主非本無道皆先以道得天之命莫能以道守之而憍奢淫侈不知止足故還失所好而與奴虜同仵也夫遭天之鴻命繼先聖之後貴為天子富有四海爵尊寵極莫與比列布衣粗裘而天下以為好蔬食藜羹而天下謂之美變世化俗猶風之靡草民之從化猶魚之赴水不務崇道廣德修身正己憂勞元元以承祭祀光顯祖考業傳子孫德與神明爭流名與天地相保反以驕奢取名求勢不止逆天忤地無不凌侮是以不訾之士相矯而起輕舉深入先到為右敵人遠至莫與之交黨離朋絶中外不恃身死國亡宗廟崩弛可欲之故非天下之罪也所謂罪莫重於可欲是故威勢尊寵窮極民上名號顯榮覆蓋天下而不知足者獵禍之具而危亡之大數也禍莫大於不知足也夫道德神明陶冶變化已得為人保合精神而有大形動作便利耳目聰明遊於昭曠之域聽聄天地之間上觀自然之法式下察古將之得失鑿井而飲耕田而食長妻生子與命相極是足之足者也異性同得故足也何況乎萬乘之主千乘之君哉其可足亦明矣故不在於道也利心常起貪人壤土欲人財寶兼并不休增加不已者追患之大數而得咎之至要也咎莫甚於欲得者也自今及古飛鳥走獸含氣有類之屬未有不欲得而全其性命者也故居君者為虜居虎者為鼠名在青雲之上身處黃泉之下居牛馬之位者無牛馬之患託犬羊之列者無犬羊之咎是以得道之主建心於足遊志於止辭威讓勢孤特獨處捐棄萬物唯神是秉身存名榮久而不殆天下歸之無有不制是知足之足常足者也不出戶不遊庭也知天下家知人也不窺牖無所瞻也見天道身知天也其出彌遠去家身也其知彌少無見聞也是以聖人謂明君也不行而知謂萬民也不見而名謂天地也不為而成使自然也指歸道德變化陶冶元首稟授性命乎太虛之域玄冥之中而萬物混沌始焉神明交清濁分太和行乎蕩蕩之野纖妙之中而萬物生焉天圓地方人縱獸橫草木種根魚沉鳥翔物以族别類以群分尊卑定矣而吉凶生焉由此觀之天地人物皆同元始共一宗祖六合之內宇宙之表連屬一體氣化分離縱橫上下剖而為二判而為五二二儀也五五色五行五味五聲或為白黑或為水火或為酸鹹或為徵羽人物同類或為牝牡凡此數者親為兄弟殊形别鄉利害相背萬物不同不可勝道合於喜怒反於死生情性同生心意同理何以言之莊子曰一人之身俱生父母四支九竅其職不同五臟六腑各有所受上下不相知中外不相覩頭足為天地肘膝為四海肝膽為胡越眉目為齊楚若不同生異軀殊體動不相因靜不相待九天之上黃泉之下未足以喻之然而頭有疾則足不能行胸中有病則口不能言心得所安則耳目聰明屈伸調利百節輕便者以同形也人主動於邇則人物應於遠人物動於此則天地應於彼彼我相應出入無門往來無户天地之間虛廓之中遼遠廣大物類相應不失毫釐者同體故也人但知一身之相通不知一國常同體人知一國是同體不知萬物是一心萬物既是一心一心之中何所有隔哉故不出户而知天下也是以聖人不出於户上原父母下揆子孫危寧利害反於死生之説察於是非之理通於利害之元達於治亂之本以己知家以家知彼事得其綱物得其紀動知所之靜知所守道德為父神明為母清靜為師太和為友天下為家萬物為體視彼如己視己如彼心不敢生志不敢舉捐棄知故絶滅三五因而不作巖居穴處不殺群類不食生草未成不服未終不采天地人物各保其有天地萬物雖似異形終始本末同是一體一體之中自無怨惡受之道德豈敢毁傷故天地人物各保其有也夫原我未兆之時性命所以精神所由血氣所始身體所基以知實生於虛有生於無小無不入大無不包也本我之生在於道德孕而未育所以成形至於出冥以知深微纖妙和弱潤滑之大通也無知無識無為無事之有大功也視我之為嬰兒至於壯大有知以覩柔之生剛弱之生強小之生大短之生長愚之生智晦之生明也察我呼吸屈伸以知損為益首益為損元進為退本退為進根福為禍始禍為福先也上陵仰阪歷阻過險形疲喘悸勞而靜處則神平氣和中外相保明平夷者得道之和以知清靜虛無無為變化之大功也四支九竅趨務舛馳異能殊形皆元一心以知百方萬物利害之變皆生於主主是萬人之元如一身之心也稽之天地驗之古今動不相違以知天地之道畢於我也我不異天地也故家者知人之本根也身者知天之淵泉也以身觀身以家觀家以天下觀天下觀天不由身觀人不由家小近大遠小知大迷去家出户不見天下去身窺牖不知天道其出逾遠其知益少周流四海其迷益甚求之益大功名益小不視不聽求之於己天人之際大道畢矣得己而得天得天而得道得道而得人故不出户知天下不窺牖知天道其出彌遠其知彌少也故聖人不見一家之好惡而命萬家之事無有千里之行而命九州之變足不上天而知九天之心身不入地而知九地之意陰陽進退四時變化深微隱匿窅冥之事無所遁之何則審內以知外原小以知大因我以然彼明近以喻遠也故聖人之為君也猶心之於我我之於身也心在一身之中不立規矩於外但密勿資始而百節調和不知以因道不欲以應天無為以道世無事以養民玄玄獸默使化自得上與神明同意下與萬物同心動與之反靜與之存空虛寂泊使物自然聖人寂泊無為令物自然合道猶珠在水而川媚是神化之所傳故云聖人不言而信不為而成者也或謂聖人得道理固常存神化所傳亦應無歇我不修習自合道成何天下蠢動日遠於道耶斯不體聖人之化若雲行雨施草樹蒙潤悉獲芬芳而燋枯之屬自不芳茂豈以燋枯之性凝雲雨之恩是無目之徒不信日月之照也道德真經指歸卷之八
