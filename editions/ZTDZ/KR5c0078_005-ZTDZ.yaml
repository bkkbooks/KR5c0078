body:
  text: 蜀郡嚴遵字君平撰谷神子註道者萬物之奥開導物也善人之寳體以弱也不善人之所不保俟拘約也美言可以市得所欲也尊行可以加人比高爵也人之不善好爲逆也何棄之有爲寵削也故立天子置三公賢聖一也雖有拱璧謂輕貨也以先駟馬謂安居也不如坐進此道言行修也古之所以貴此道者人心和也何不曰求以得謂勢則也有罪以免無以爲也故爲天下貴尊寵奇也指歸木之生也末因於條條因於枝枝因於莖莖因於本本因於根根因於天地天地受之於無形華實生於有氣有氣生於四時四時生於陰陽陰陽生於天地天地受之於無形吾是以知道以無有之形無狀之容開虚無導神通天地和陰陽寧調四時决萬方殊形異類皆得以成變化終始以無爲爲常無所愛惡與物大同羣類應之各得所行所謂道者萬物之奥善人得之以翕以張清凈柔弱默默沌沌仁宛和淖潤澤虚平大小周密纖微無形玄達萬事以歸無名終始反覆萬福自生動得所欲靜失所患在人之上威德自明攻堅勝大莫與爲雙故善人之所寳者也凶人得之以發以張堅剛以疏實動以先驕溢以壯大盛滿以强極廣修大以無疆照察察以勞熒顯的的以彰彰彊大終小不禍自生動失所欲靜得所傷心憂志削乃反正常神氣煩促趨翕去張鬱約而辭卑拘制而體降迫險而賔伏𢡖怛而忠信改容而易節與君子同罪定而言善臨死而愛身一奉天數變性易情安貧樂困卑賤爲常尊天敬鬼視人如王上比牛馬下列犬羊天網以發自然不聽吁嗟痛哉爲戒甚明不善之人不以保身乃以累眞及累之成方悔不及所謂臨渴掘井不若理於未亂二者殊塗皆由道行在前在後或存或亡善人先道而存凶人後道而亡故言行者治身之獄也時和先後大命之所屬也是以君子之立身也如喑如聾若樸若質藏言於心常處玄默當言深思發聲若哭和順時適成人之福應對辭讓直而不飾故言滿天下而不多振動四海而不速連接萬物而不有辭動天下各得所欲美言可以市也其經世也氣志窅冥而形容隱匿居如驚恐貌似不足偆偆漻漻消如冰釋遇時而伸遭世而伏與天同憂中心惻惻計畫不行隨時反側謙虚止足卑損自牧樂下如水乆而不忒下之又下之至於元極天下應之故能有國尊行可以加人夫何故哉人之情性樂尊寵惡卑恥損之而怨益之而喜下之而悦止之而鄙古今之通道而人心之正理也賢者旣然小人尤甚是故尊美言行事無患矣古之將民何棄之有桀紂之吏可令順信秦楚之卒可令順善所謂人所不善何棄之有故能得其心天下可有不得其意妻妾不使何以效其然也夫爵尊天下富有四海威勢無量專權擅柄人之所畏也立天子也去徒步離卒伍鴻舉龍興起佐天子發道揚德施行所有恩流萬姓光顯祖考人之所利也置三公也以人之所畏求人之所利言不美行不敬雖執大璧操珍物而進之安車駟馬而載之則是賢者之心疑惑下否玄聖深隱君子不來以天子有可畏之威三公豐利人之禄下修言利之美但恃己以臨人執玉帛之惠人不爲之降故云不如坐進此道也言行修於内則神氣踰於外無有駟馬之勞寳璧之費海内之士響應風起俊雄英豪輻至峰止聖人下之朝多君子以坐進此道故古之所以貴此道者夫何故哉言順天地而不己行合人心而不恃名成而不顯功遂而不有情性自然不以爲取將以順道不以爲己萬物歸之爲天下宰所謂不求以得有罪以免故爲天下貴也爲無爲爲無形也事無事事無聲也味無味味無名也大小多少功德明也報怨以德報未生也圖難於易慮未成也爲大於細作窅冥也難事作於易毳生堅也大事作於細巨始緜也是以聖人謂明君也終不爲大事微纖也故能成其大功配人也輕諾者必寡信不可然也多易者必多難不可權也聖人猶難之常計患也故終無難始卒全也指歸神明之數自然之道無不生無有不生有不無不有乃生無有由此觀之憂不生憂喜不生喜不憂不喜乃生憂喜故居禍者得福居福者得禍禍福之主在於元首爲之無形聽之無聲無形聲則深遠故無功之功大而有功之功小有德之德薄而無德之德厚能體不無不有而生元有非禍非福能轉禍福鑒在機前爲於未有故深遠大厚也是以聖人不爲有不爲亡不爲死不爲生游於無有之際處於死生之間變化因應自然爲常故不視而明不聽而聰扶安天地飾道養神提挈萬物帝國治民解情釋意俱反始眞所謂爲无爲之爲應變化之宜而已未嘗有知故能无所不爲也不爲生業不爲起事不加以仁不施以利教以不能導以無識絶民所樂以順民情縱民所惡以得民意也出天傷之户入長生之路翶翔玄冥優游太素昧昧茫茫莫知其故敦若昏晦天下無事所謂事無事之事變已然之意而已未嘗生思故能至於無事味之於無味察之於無形故能分同異之類明是非之情爲之未有定之未傾勇功不見知名不稱福不得起禍不得生無福之福與於無聲無禍之禍息於無名主安民樂天下太平所謂味無味之味察未萌之類而已未嘗有意故能無所不遂故主患而憂之長福而救之戮君而死之辱父而讎之造難而折之作亂而滅之召寇而殺之招逆而伐之勇功見而與天違知名興而與道反動而民悦者勞而德小爲而民喜者爲而恩少若不能爲无爲事無事則夫前大多之利獲此小少之恩大小有殊咎患不免故云大小多少也是以忠信沮壞正事消亡自然伏竄知故翶翔竊功者顯偷權者彰暴亂者利邪僞者昌是非覆逆天下大傾物失其命家國以喪故善除患者不若無患之大也起事致治者不若默然者之貴也此即不言之益無爲之貴是以君子動未始之始靜無無之無布道施德變化於玄怒於不怒言於不言攻於不敢守於無端威於不武報怨未萌德是理之根怨是事之末欲息末歸本唯修德反眞則事物未成而冥化矣故云動於未始言於不言即報怨以德圖難於易治其本根絶之未兆使不得然事如秋毫功如太山爲大於細治之緜緜敬而愼之若始若新不爲所欲不求所便常與事反獨守其元與時俱益日進無疆雖欲不大事物自然是圖雖於易爲大於細矣是故大難之將生也猶風邪之中人未然之時愼之不來在於皮毛湯熨去之入於分理微箴取之在於藏府百藥除之入於骨髓天地不能憂而造化不能治所謂難事作於易也夫大事之將興也猶水之出於山也始於潤濕見於遊漣綿綿涓涓流爲溪谷汨汨湯湯濟舟漂石以成江海深大不測大事之作於細者也是以聖人之建功名也微故能顯幽故能明小故能大隱故能彰志在萬民之下故爲君王威振宇内四海盡匡懸命受制莫有能當德與天地相參明與日月同光聖人終不爲大故能成其大也故言多諾者事衆而信不可然也心多所易者難積而變不可推也輕諾必寡信多易必多難理所然也是以聖人心默而不動口默而不言目默而不視耳默而不聽動如天地靜如鬼神不爲而成不言而信進則無敵退則不窮身無纖介之憂國無毛髪之患聖人體道不事有爲與眞合德自然無患故終無難夫何故哉危於不危亡於不亡昭然獨見運於無形不危之時常以爲危不亡之時常以爲亡戰戰慄慄爲之未有故免危亡也其安易持國與身也其未兆易謀禍與患也其脆易破患始生也其微易散患未寧也爲之未有然未然也治之未亂化本原也合抱之木人手連也生於毫末如未萌也九重之臺積如山也起於累土生無根也百仞之高干雲霄也始於足下起無分也爲者敗之敗所成也執者失之所欲離也故聖人無爲則無敗知自來也無執則無失福自來也民之從事動有之也常於幾成而敗之敗所治也愼終如始反其初也則無敗事舉無尤也是以聖人謂明君也欲不欲思無思也不貴難得之貨珠玉財也學不學事虚無也復衆人之所過去末華也輔萬物之自然助天地也而不敢爲奉素眞也指歸未疾之人易爲醫也未危之國易爲謀也萌牙之患易事也小弱之禍易憂也何以效之莊子曰任車未虧僮子行之及其傾覆也顚高墮谷千人不能安卵之未剖也一指摩之及其爲飛鴻也奮翼凌雲罾繳不能連也胎之新乳也一繩制之及其爲牡也羅網不能禁也虎也執羣獸食牛馬劍戟不能難也故漣滴之流久久而成江海小蛇不死化爲神龍積微之善以至吉祥小惡不止乃至滅亡是故繼體之君無怨無惡將相和一百姓賔伏鄰國交市無有讒賊平易不動上下和集當此之時守之不用威持之不用力無爲無事莫之能克其安易持及至國家將危萬民將殆患害將興萌而未兆當此之時安危在已不在於彼謀之不必聖人憂之不必力士正之於枕席而患禍以亡矣其未兆易謀也及至人君失道大臣怨憝鄰國不市百官衰廢禍患已生小弱柔毳當此之時賢人深謀生事起勢未動而患危不加而禍碎其脆易破及至人君失正大臣謀誤鄰國怨恨百姓猶豫患禍已起根木末據姦雄將興未得人助或合而不結或結而不固當此之時尊賢下衆折肝膽聽微諫求過於己患心不怨謀士底兵未發而散其微易散然己難於未兆故禍福作於無名存亡生於微妙一者雲錯變動風號屈伸波渾進退殽亂聽之不可聞視之不可見機巧不能事智慧不能判存亡禍福之機微妙渾殽難見是故聖人化之以道教之以身爲之未有治之未然不置而物自安不養而物自全動與福同室靜與禍異天窅窅冥冥莫覩其元治之未亂正之未傾禁姦之本制僞之端閉邪之户塞枉之門萌牙未動形兆未生絶之未見滅之未存教以無教導以無名知以無知狀以無形治不得起亂不得生天下無爲性命自然此爲之於未有治之於未亂也夫太山之木本據於陰末託於陽垂枝布葉華實青青大而合抱高連百尋者生於無大成於不爲所謂合抱之木生於毫末者也九重之臺廣大擬於丘陵百仞之高昭昭冥冥干於青霄者以爲卑小不爲高大也九重之臺起於累土百仞之高生於足下是也故爲大者不大爲小者不小爲高者不高爲卑者不卑不大不小乃生大小不高不卑乃生高卑故爲之者不爲之跡也不爲者爲之塗也不大不小不高不卑即不爲者是爲之塗也而大小高卑即爲者是不爲之跡也是以爲成者敗爲利者害爲生者死爲興者廢執所欲者所欲亡執所思者所思逝執其身者其身殁執其神者其神退所得無爲之塗而執有無之跡所謂爲者敗之執者失之者也故聖人無爲爲之以生萬物無執執之以制所欲猶二匠之造高臺而天地之生巨木自然而已无爲无敗无執无失夫道德不嫉神明不賊和無不通大无不克存亡自從吉凶自得同道而道得之同失而失得之人窮事敗者釋自然而任知力去其反而處其覆夫何故哉以求所求而欲所欲人之從事常於幾成而敗者以有求欲而失根本故也夫誠能愼終如始爲所不欲守所不處動於未元反於未始爲若不爲有若不有雖若不成物自然也始背於道終不失之故无敗也夫使神擾精濁聰明不達動失所求靜喪所欲者貨與學也唯能鍊情易性變化心意安無欲之欲樂无事之事者道與德也貨則擾神學則生僞能欲不欲則不貴於貨學不學則日損歸眞斯乃合於道德何衆過之不復也是故想道如念親惡貨如失身思無思之思求無求之求明白四達以學不知巧雕萬物以學不能反衆人之所務而歸乎虚無欲不欲而造虚玄學不學而窮妙極達人之所不能通窮人之所不能測成人之所不能爲有人之所不能得心志玄玄形容睦睦卧如死尸立如槁木不思不慮若無所識使物自然令事自事空虚寂泊身無所與萬物紛紛各如其處魁如阜楬澹如巨表舉錯廢置常與物反萬物應之故能深遠天下大覆與神運轉輔天助地不敢生善以輔萬物之自然而不敢爲也古之善爲道者自治然也非以明民无所信也將以愚之塞其心也民之難治不可均也以其知之去忠信也以智治國益事文也國之賊傷害民也不以智治國守素眞也國之福民命全也知此兩者禍福門也亦楷式正之元也常知楷式施王身也是謂玄德莫見聞也玄德深矣不可見也遠矣不可存也與物反與神殊也至於大順天下淳也指歸道德神明清濁太和天地人物若末若根數者相隨氣化連通逆順昌衰同於吉凶道德之意天地之心安生樂息憎惡殺傷故命聖人爲萬物王利物受其福不利則獲其恐聖人大懼恐後有患深原所由莫善自然自然之路要在無形何以明之莊子曰夫天地不知道德之所爲故可爲然也萬物不覩天地之所以故不可存也萬民不識主之所務故可安也四肢九竅不諭心之所導故可全也夫萬物之有君猶形體之有心也心之於身何後何先流行血脉無所不存上下表裏無所不然動與異事虚以含神中和外否故能俱全是以昔之帝王經道德紀神明總清濁領太和者非以生知起事開世導俗務以明民也將以塗民耳目塞民之心使民不得知歸之自然也所謂古之善爲道者非以明民將以愚之是以立民於昭昭而身處乎混冥教以不知導以無形孝悌不顯仁義不彰君王無榮知者無名無教之教洽流四海無爲之爲通達八方動與天地同節靜與道德同容萬物並興各知其所名實俱起各知其當和氣流通宇内童蒙無知無欲無事無功心如木土志如死灰不覩同異不見吉凶故民易治而世可平也是故安者民之所利也生者民之所歸也民之所以離安去生而難治者以其知也民知則欲生欲生則事始事始則功名作功名作則忿爭起忿爭起則大姦生大姦生則難治矣所謂人之難治以其知多故也故以知爲國則天下智巧詐僞滋生奇物並起嗜欲無窮奢淫不止邪枉纖纖豪特爭起溪谷異名大禍興矣臣惑其主子亂其父以白爲黑以亡爲有名變實異劫殺生矣恍恍不可安易易不可全卷甲輕舉海内相攻死者無數血流成川悲痛怨恨氣感皇天星辰離散日月不光陰陽失序萬物盡傷山枯谷竭赤地數千天下窮困至於食人非天之辜上好智能而教萬民也好智之過遂至於此所謂以智治國國之賊信不虚也廢棄智巧玄德淳樸獨知獨慮不見所欲因民之心塞民耳目不食五味不服五色主如天地民如草木巖居安處安樂山谷飲水食草不求五穀知母識父不覩宗族沌沌偆偆不曉東西男女不相好父子不相戀不賤木石不貴金玉叢生雜處天下一心八極共㫖九州同風蠹蟲不作毒獸不生神龍與人處麟鳳遊於庭翔風𠺪𠺪醴泉涓涓甘露漠漠朱草榮榮嘉禾豐茂萬物長生非天之之福主知不知而名無名也不知之知不名之名同乎道矣豈不然也是以覩智識愚與道同符知愚知智與道同㫖政教由之或病或利明於病利大平自至明於利病萬物自正用智治國爲禍爲則不用智理國爲福爲德此兩者之行可爲楷式常知楷式是謂玄德是故愚智之識無所不克清凈寧地爲類陰福衆世莫見故曰玄德玄德深矣不可量測遠矣不可窮極與物反矣莫有能克所謂玄德深遠與物反矣玄德之淪罔蕩輓遁恍惚無形反物之務和道德導神明含萬國總無方六合之外毫釐之内靡不被德蒙仁以存性命命終天年保自然哉所謂至於大順者也江海所以能爲百谷王者所因然也以其下之下百川也故能爲百谷王無不臣也是以聖人謂明君也其欲上民處至尊也以言下之順民心也其欲先民无禍患也以身後之先安民也故在上爲人元也而民不重民以存也居民之前爲民倡也而民不害民以明也天下樂推而上之民以全也而不知猒民以安也非以爭去其身也故天下莫能與之爭無不勝也指歸道德不生萬物而萬物自生焉天地不舍羣類而羣類自託焉自然之物不求爲王而物自王焉故天地億萬而道王之衆陽赫赫而天王之陰氣漻漻而地王之倮者穴處而聖人王之羽者翔虚而神鳳王之毛者蹠實而麒麟王之鱗者水居而神龍王之介者澤處而靈龜王之百川並流而江海王之凡此九王不爲物主而物自歸焉無有法式而物自治焉不爲仁義而物自附焉不任知力而物自畏焉夫何故哉體道合和無以物爲而物自爲之化是故江海之王也非積德政累仁愛流神明加恩惠以懷之又非崇禮義廣辭讓飾知故設巧能以悦之也又非出奇行變起權立勢奮武揚威重生累息百事以制之也清靜處下虚以待之無爲無求而百川自爲來也百川非聞海之美被其德化歸慕之也又非拘禁束教有界道畫東西而趨之也然而水之所以貫金觸石鑽崖潰山馳騁丘阜以赴隨江海無有還者形偶性合事物自然也由此觀之卑損之爲道也大矣百害不能傷知力不能取不戰而强不威而武默然無爲與萬物市夫溪谷爲卑不爲東西故能達而不窮江海處下不爲廣大故能王而不休江海所以能爲百谷王者以其善下之故信矣夫是以明王聖主之欲尚民也以自然之性盛德之恩容卑辭敬比於庶人視身如地奉民若天昭然獨知而不可測卓爾獨能而不可原深察博達而不可塞聰明並流而不可壅不以役物反以後民聖人雖有如此之能不以上人以其言下之不以先人以其身後之故人樂推而人猒也故民履之如地託之若神常在民上王土配天其欲先人處窮寵秉至尊長生乆視樂以無患則去志無身以安萬民身勞而民佚身後而民先在上而民以生在前而民以安民以生故戴之而不以爲重民以安故後之而不以爲患人所以戴之而不爲重者以其於人有益故居人前而人不害是以天下推而上之引而先之喜而不倦樂而不猒故聖人之王也非求民也民求之也非利民也民利之也非尚民也民尚之也非先民也民先之也故能極弊通變救衰匡亂以至太平上配道德下及神明淪唐唐含冥冥馳天地騁陰陽夫何故哉以去心意而後其身也是故不爭之德因人之力與道變化與神窮極唯棄知者能順其則夫如是者豈有人與爭也故王事自然不得妄起得之全命持之有理聖知有性治之有道失其理則王事不成去其道則性情不則是以聖人信道不信身順道不順心動不爲己先以爲人無以天下爲故天下爭爲之臣誠哉是言爲國之寳千帝萬王不能行唯得少分即爲物主有始無終還復困窮能同其妙不遺身殃是謂襲常永無疆也天下謂我與我名也大似不肖象无形也夫唯大德隆盛也故似不肖反類病也若肖衆所榮也乆其小矣逆天行也我有三寳道之用也持而保之心所從也一曰慈悲初傷也二曰儉愼微己也三曰不敢爲天下先託後行也慈故能勇弱生强也儉故能廣儉生長也不敢爲天下先任自然也故能成器長後生先也今釋慈且勇爲堅剛也釋儉且廣爲大彰也釋後且先爲物唱也則死矣大命喪也夫慈以戰則勝民用情也以守則固得民誠也天將救之與敵殃也以慈衛之苞以生也善爲士者不武去强梁也善戰者不怒忠威暴也善勝敵者不與反爲常也善用人者得其心也爲之下言行尊也是謂不爭之德福自萌也用人之力獲其功也是謂配天與天同也古之極聖道窮也指歸物有同而異有異而同有非而是有是而非此君子之所以無患而衆世之所以憂悲也日月出入異而明同賢愚形容同而心異君子則能同塵而无患小人則欲出衆故有憂故云有同而異有是而非何以效之莊子曰夫日月之出入也同明人之死生也同形春秋之分也同利玄聖之與野人也同容通者之與閉塞也同事道士之與赤子也同功凡此數者中異而外同非有聖人莫之能明是以天下嫌疑眩燿結構紛繆是非是以聖人似不肖天下皆謂我大似不肖也夫何故哉得道之士外亡中存學以變情爲以治己實而若虚渾渾冥冥若無所以容疏言訥貌樸而鄙情達虚無性通無有寂泊無爲若無所止遁名逃勢與神卧起執道履和物無不理不合時俗與天地友衆人僣僞以直爲醜殃塗異指謂之病矣夫唯大故似不肖所以人謂之爲病夫小人則不然博學多識以釣智名異行顯功以疑仁賢詐世治俗飾辭盛容卑體阿順以揄愛恩先指承意以獲衆心朋黨相結多挾賊人勞鮮而禄重功寡而爵尊國貧而家富主微而身貴動權生變竊乗盛勢名號隆盛震動境外憍奢暴逆縱恣不制順心而卑情忤而奪動喪民命靜生物穢張目而物傷開口而民害此時俗之所榮而世之所謂肖者也若然者道德所離神明所去天地所憎陰陽所惡物類不比民人不附動無所不終靜無所不得生爲患害死爲福喜衆俗迷妄浸以相導所獲者微其日甚乆若肖乆其細也故得道之士則不然體虚積慈視物如已一曰慈檢形促容歸於微纖二曰儉玄默託後不爲物先合和順理以應自然三曰不敢爲天下先動靜與衆反出入異門户不以勇勇故不怒而天下恐慈故能勇不以廣廣故不施而天下往儉故能廣不以先先故不言而天下長不敢爲天下先故能成器長也是故岀慈入勇出儉入廣釋後且先反和逆神動違自然福與之遠禍與之鄰大命以絶神氣散分天地不能安道德不能存臨死不覺怨命尤天非命薄也非人賊也安憍樂勢廢道而上力也所謂釋慈且勇釋儉且廣釋後且先則死者也夫慈之爲行也甚和以眞動得人力靜合天心卑損弱小爲萬物君匡世救俗和順天人戰不可敗守不可攻夫慈以戰則勝以守則固者也夫何故哉天地並生變化無窮方戰之日地爲之動天爲之震天降變怪地出風盲鬼神並見爲敵起殃祐我將相助我萬民怒我士卒以至羣生牛絶其紖馬絶其糧飛禽拊翼獸下而行虎兕可戰攫鳥可將敵人驚恐伏甲受兵天將救之以慈衛也故賢佐勝將之立身也不强不大不堅不剛柔弱畏武敵即消亡善爲士者不武戰則損心外意崇體和平辭小託後動靜應天不以愠起怒不以武興兵善戰者不怒也其欲勝敵常以反行計運無形以收敵神動因彼之所有變因彼之所爲反之覆之以處其奇故使彼邪我正彼言我聽彼怒我喜彼動我靜開其所利以利其命善勝敵不爭也用人則下之以言示之以利陳之以誠使之自至善用人者爲下是以不爭不求以得民意以順民心秉其要忌是不爭之德也彼人離散而我順比敵欲不亡而不能我欲不存而不得是用人之力也當此之時道爲之無德爲之始神明爲經太和爲紀清濁爲家萬物爲子三光爲佐四時爲輔靜爲物根動爲化首物類託之無有患咎德與天齊乆而不殆自今及古聖智之道變化終始自天而王皆由此矣是謂配天古之極也道德眞經指歸卷之十一
