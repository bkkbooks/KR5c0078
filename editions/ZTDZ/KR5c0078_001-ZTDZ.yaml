front:
  text: 道德眞經指歸卷之七原缺卷一之六
  hash: sha256:b3f3a0bd6d7474c6ed2643e80007a664b444ce6b8068581fad4b3bee8d25483d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0078_SJB_001-120343a, image: sjb/12/120343a.png}
body:
  text: 蜀郡嚴遵字君平撰谷神子註上德不德其德玄也是以有德德不還也下德不失德德可聞也是以無德德反身也上德無爲物自然也而無不爲功歸天也下德爲之枉精神也而有以爲功歸人也上仁爲之加恩愛也而無以爲禪聖賢也上義爲之制有民也而有以爲傳子孫也上禮爲之節事原也而莫之應失人心也則攘臂而仍之强和親也故失道而後德名始萌也失德而後仁愛和形也失仁而後義分職明也失義而後禮玉帛行也禮者忠信之薄實衰亡也而亂之首巧僞門也前職者預設然也道之華化未聞也而愚之始惑亂根也是以大丈夫體道君也處其厚含忠信也不處其薄去禮云也處其實動有因也不處其華不前識也去彼取此求諸身也指歸天地所由物類所以道爲之元德爲之始神明爲宗太和爲祖道有深微德有厚薄神有清濁和有高下清者爲天濁者爲地陽者爲男陰者爲女人物禀假受有多少性有精粗命有長短情有美惡意有大小或爲小人或爲君子變化分離剖判爲數等故有道人有德人有仁人有義人有禮人敢問彼人何行而名號殊謬以至於斯莊子曰虚無無爲開導萬物謂之道人清靜因應無所不爲謂之德人兼愛萬物博施無窮謂之仁人理名正實處事之義謂之義人謙退辭讓敬以守和謂之禮人凡此五人皆樂長生尊厚德貴高名各愼其情性任其聰明道其所長歸其所安趨務舛馳或否或然變化殊方建號萬差德有優劣世有盛衰風離俗異民命不同故或有溟涬玄寥而無名或濛澒芒芒而稱皇或汪然漭汎而稱帝廓然昭昭而稱王或遠通叅差而稱伯此其可言者也然而伯非伯而王非王而帝非帝而皇非皇而有非有而無非無千變萬化不可爲計重累億萬不可爲名何以明之夫易姓而王封於太山襌於梁父者七十有二義其有形兆圻堮髣髴不可識者不可稱言此其性命不同功名不齊者耶非也是故上德之君體道而存神與化倫德動玄冥天下王之莫有見聞德歸萬物皆曰自然上德不德與道同也下德之君體德而行神與化遊德配皇天天下王之或見或聞德流萬物復反其君下德不失德德德之也夫何故哉上德之君性受道之纖妙命得一之精微性命同於自然情意體於神明動作倫於太和取舍合乎天心神無所思志無所慮聰眀玄遠寂泊空虚動若無形靜若未生功若天地事如嬰兒遺形藏志與道相得溟涬濛澒天下莫知潼溶方外翶翔至遠陰陽爲使鬼神爲謀身與道變上下無窮進退推移常與化俱故恬淡無爲而德盈于玄域玄默寂寥而化流於無極恩不可量厚不可測兼包大營澤及萬國知不足以倫其化言不足以導其俗天下咮咮喁喁皆蒙其化而被其和若此者元無絶而不知爲之者何誰也所謂上德無爲而無以爲下德之君性受道之正氣命得一之下中性命比於自然情意幾於神明動作近於太和取舍體於至德託神於太虚隱根於玄冥動反柔弱靜歸和平載規履矩鏡視太清變化惚恍因應無形希夷茫昧幾無號謚方地隨天與化爲常德盛澤流洋溢萬方美德未形天下童蒙四海爲一蕩蕩玄默與民俯仰與物相望當此之時大道未分醇德未剖六合之内一人獨處其務損而不益其事修而不作所爲者寡所守者約民敦厚而忠信世和愼而寂泊水草爲稸積裘褐爲盛服巨木爲廓廟巖穴爲室宅主如天地民如草木被道合德恬淡無欲陰陽和洽萬物蕃殖無有制令宇内賔伏嘉禾朱草勺藥而生神龍鳳凰與人相託甘露降而不霽祥風動而不息無義無仁六合之内和合天親無節無祀四海之内親爲兄弟親而不和敬而不恭天地人物混沌玄通下德爲之而有以爲上仁之君性醇粹而清明皓白而博通心意虚靜神氣和順管領天地無不包裹覩微得要以有知無養生處德愛民如子昭物遭變響應影隨經天之分明地之理别人物之宜開知故之門生事起福以益萬民録内略外導之以親積思重厚以招殊方法禁平和號令寬柔舉措得時天下歡喜雷霆不暴作風雨不卒起草木不枯瘁人民不夭死跂行喙息皆樂其生蜎飛蝡動盡得其所老弱羣遊壯者耕桑人有玄孫黃髪兒齒君如父母民如嬰兒德流四海有而不取上仁爲之而無以爲上義之君性和平正而達通情察究利害辯智聰明心如規矩志如尺衡平靜如水正直如繩好舉大功以建鴻號樂爲福始惡爲禍先秉權操變以度時世崇仁勵義以臨萬民因天地之理制萬物之宜事親如奉神履民如臨深兼聽萬國折之以中威而不暴和而不淫嚴而不酷察而不刻原始定終立勢御民進退與時流屈伸與化俱事與務變禮與俗化號令必信制分别明網要而不疏法正而不淫萬事决於臣下權勢獨斷於君廷正以愼道顯善以發姦作五刑刻肌膚敬元貴始常與名俱因節而折循理而割權起勢張威震海内去己因彼便民不苛纖芥之惡貶秋豪之美舉内施王室外及人物承弊通變存亡接絶扶微起幼仁德復發有土傳嗣子孫不絶上義爲之而有以爲上禮之君性和而情柔心疏而志欲舉事則陰陽發號順四時紀綱百變網羅人心尊寵君父卑損臣子正上下明差等序長幼别夫婦合人倫循交友歸奉條貫事有差品拘制者褒録不羈者削貶優游强梁包裹風俗導以中行順心從欲以和節之迫情禁性防隄未萌牽世繫俗使不得淫絶人所不能以强人所不能行勞神傷性事衆費煩亂得以治危得以寧知故通達醇殻消亡大道滅絶仁德不興天心不洽四位失常雷霆毁折萬物夭傷父子有喪而天下爲之和晝夜悽悽而世不爲之化鐘磬喤喤而俗不爲之變沈吟雅韻而風不爲之移謙退辭讓天下不信守柔伏雌天下不親懸爵設賞賢人不下攘臂執圭君子不來上禮爲之而莫之應夫何故哉辭豐貌美而誠心不施故也是故帝王根本道爲元始道失而德次之德失而仁次之仁失而義次之義失而禮次之禮失而亂次之凡此五者道之以一體而世主之所長短也故所爲非其所欲也所求非其所得也不務自然而務小薄夫禮之爲事也中外相違華盛而實毁末降而本衰禮薄於忠權輕於威信不及義德不逮仁爲治之末爲亂之元詐僞所起忿爭所因故制禮作樂改正易服進退威儀動有常節先識來事以明得失此道之華而德之末一時之法一隅之術也非所以當無窮之世通異方之俗者也是故禍亂之所由生愚惑之所由作也所謂前識者道之華而愚之始何以明之莊子曰夫天地之應因於事事應於變變無常時是以事不可預設而變不可先圖猶痛不可先摩而痒不可先折五味不可以升斗和琴瑟不可以尺寸調也夫禮制一時時移則禮别今以一時之禮制無窮之俗猶膠柱刻舟調琴執尺故不可經遠也故至微之微微不可言而至妙之妙妙不可傳忠信之至非禮之所能飾而時和先後非數之所能存也故聰明博達智慮四起覩陰之綱得陽之紀明鬼神之道通萬物之理仰則見天之裹俯則見地之裹教民不休事至不止以此致平非所聞也言有爲之知非致太平之術也比夫萬物之託君也猶神明之居身而井水之在庭也水不可以有爲清也神不可以思慮寧也夫天地之間萬物並興不可以有事平也是以大丈夫之爲化也體道抱德太虚通洞成而若缺有而若亡其靜無體動而無聲忠信敦殻不知爲首玄默暗昧朴素爲先居實處厚損心棄意不見威儀無務無爲若龍若蛇違禮廢義歸於無事因時應變不預設然秉微統要與時推移取舍屈伸與變俱存禍亂患咎求之於己百祥萬福無情於人去彼取此昔之得一者資以生也天得一以清健利正也地得一以寧順直方也神得一以靈變化通也谷得一以盈含洋洋也侯王得一以爲天下正化和平也其致之所以停也天無以清無陰陽也將恐裂不得清也地無以寧無剛柔也將恐發不得寧也神無以靈無弛張也將恐歇不得靈也谷無以盈無滿空也將恐竭不得盈也侯王無以爲正憍恡盈也而貴高無爲民也將恐蹷宗廟傾也故貴以賤爲本辱生榮也高以下爲基由卑成也侯王自謂戒其情也孤寡不穀卑微名也唯斯以賤爲本與體以藏也非耶事非一也故造輿於無輿與物亡也不欲碌碌如玉寡以藏也落落如石衆且章也經反者道之動變化方也弱者道之用和爲常也天地之物謂有形也生於有因和萌也有生於無始空冥也指歸一者道之子神眀之母太和之宗天地之祖於神爲無於道爲有於神爲大於道爲小故其爲物也虚而實無而有圓而不規方而不矩繩繩忽忽無端無緒不浮不沈不行不止爲於不爲施於不與合囊變化負包分理無無之無始始之始無外無内混混沌沌芒芒汎汎可左可右虚無爲常清靜爲主通達萬天流行億野萬物以然無有形兆窅然獨存玄妙獨處周密無間平易不改混冥皓天無所不有陶冶神明不與之同造化天地不與之處禀而不損收而不聚不曲不直不先不後高大無極深微不測上下不可隱議旁流不可揆度潢爾舒與皓然銲生銲生而不與之變化變化而不與之俱生不生也而物自生不爲也而物自成天地之外毫釐之内禀氣不同殊形異類皆得一之一以生盡得一之化以成故一者萬物之所導而變化之至要也萬方之準繩而百變之權量也一其名也德其號也無有其舍也無爲其事也無形其度也反其大數也和其歸也弱其用也故能知一千變不窮萬輪不失不能知一時凶時吉持國者亡守身者没是故昔之得一者天之性得一之清而天之所爲非清也無心無意無爲無事以順其性玄玄默默無容無式以保其命是以陰陽自起變化自正故能剛徤運動以致其高清明大通皓白和正純粹眞茂不與物糅礭然大易乾乾光耀萬物資始雲蒸雨施品物流形元首性命玄玄蒼蒼無不盡覆天得一以清地之性得一之寧而地所爲非寧也無知無識無爲無事以順其性無度無數無憂無利以保其命是以山川自起剛柔自正故能信順柔弱直方和正廣大無疆深厚清靜萬物資生無不成載地得一以寧神之性得一之靈而神之所爲非靈也不思不慮無爲無事以順其性無計無謀無響無首以保其命是以消息自起存亡自正故老能復壯死能復生困能復達廢能復榮變化不極反覆不窮物類託之不失其中神得一以靈谷之性得一以盈而谷之所爲非盈也不欲不求無爲無事以順其性不仁不義不與不施以保其命是以實虚自起盛衰自正故能蒸山流澤以爲通德涓涓不息綿綿不絶皓皓洋洋脩遠無極以盈江海深大不測谷得一以盈侯王之性得一之正而侯王之所爲非正也去心去志無爲無事以順其性去聰去眀虚無自應以保其命是以和平自起萬物自正故能體道合德與天同則抱神履和包裹萬物聲飛化物盈溢六合德導天地明照日月制世御俗宇内爲一王侯得一以爲天下正凡此五者得一行之興而不廢成而不缺流而不絶光而不滅夫何故哉性命自然動而由一也是故使天有爲動不順一爲高得卑爲清得裂陰陽謬戾綱弛紀絶和氣隔塞三光消滅雷霆妄作萬物皆失天無以清將恐裂使地有爲動不順一爲直得枉爲寧得發山川崩絶剛柔卷折氣化不通五行毁缺百穀枯槁羣生疾疫地無以寧將恐發使神有爲動不順一爲達得困爲靈得歇變化失序締滯消竭盛衰者亡弛張者殁神無以靈將恐歇使谷有爲動不順一爲有得亡爲盈得竭虚實反覆流澤不入谷無以盈將恐竭侯王有爲動不順一爲貴得賤爲正得蹶亂擾迷惑事由己出百官失中喪其名實萬民不歸天地是絶王侯無以貴將恐蹶凡此五者性命淳美變化窮極進退屈伸不離法式得一而存失一而没況乎非聖人而王萬民廢法式而任其心者哉夫矜法式而行事尚不免於咎患况廢法而任心故不日而亡是故天人之道物類化變爲寡者衆爲賤者貴爲高者卑爲成者敗益之者損利之者害處其反者得其覆爲所求者失所欲所謂貴以賤爲本高以下爲基是以賢君聖主勢在民上爵尊天下澤連萬物德懷四海道之所祐天地所助萬物所歸鬼神所與厲身起節自謂孤寡是謂侯王自謂孤寡不穀處卑守微躬涉勞苦損心挫志務設民下不爲貴故擅民之命不爲高故常在民上不欲也故無所不有不爲也故無所不宰萬物紛紜身無所與故能爲之本非獨王道萬事然矣夫工之造輿也爲圓爲方爲短爲長爲曲爲直爲縱爲横終身揳揳卒不爲輿故能成輿而令可行也所謂數輿無輿而成其輿夫玉之爲物也微以寡而石之爲物也巨以衆衆故賤寡故貴玉之與石俱生一類寡之與衆或求或棄故貴賤在於多少成敗在於爲否故不欲碌碌如玉亦不欲落落如石是以聖人爲之以反守之以和與時俯仰因物變化不爲石不爲玉常在玉石之間不多不少不貴不賤一爲綱紀道爲楨幹故能專制天下而威不可勝全活萬物而德不可量貴而無憂賤而無患高而無殆卑而愈安審於反覆歸於玄默明於有無反於太初無以身爲故神明不釋無以天下爲故天下與之俱所謂反者道之動弱者道之用夫何故哉因道而動循一而行道之至數一之大方變化由反和纖爲常起然於否爲存於亡天地生於太和太和生於虚冥虚冥至無也太和始之而生太和有之萌也天地資之而始所謂天地萬物生於有有生於無上士聞道謂玄善也勤而行之性與近也中士聞道狐疑淺也若存若亡性與遠也下士聞道習不善也大笑之性與反也不笑不足以爲道道符表也故建言有之陳自然也明道若昧動綿綿也進道若退反其先也夷道若纇治其根也上德若谷施與玄也大白若辱似不賢也盛德若不足無形容也建德若偷損民福也質眞若渝如淺薄也大方無隅無曲直也大器晚成不明白也大音希聲微言發也大象無形無所設也道隱無名號謚絶也夫唯道善貸且成應萬物也指歸道德天地各有所章物有高下氣有短長各樂其所樂患其所患見其所見聞其所聞取舍殊繆畏喜殊方故鶉鷃高飛終日馳騖而志在乎蒿苗鴻鵠高舉逕歷東西通千達萬而志在乎陂池鸞鳳翶翔萬仞之上優游太清之中而常以爲卑延頸舒翼凌蒼雲薄日月高翔遠逝曠時不食往來九州棲息八極乃得其宜三者殊便皆以爲娛故無窮之原萬尋之泉神龍之所歸小魚之所去高山大丘深林巨壑茂木暢枝鴻鳥虎豹之所喜而雞狗之所惡悲夫三代之遺風褐儒墨之流文誦詩書修禮節歌雅頌彈琴瑟崇仁義祖潔白追觀往古通明術數變是定非已經得失身寧名榮鄉人傳業中士之所道上士之所廢也閑居幽思强識萬物設僞飾非虚言名實趨翔進退升降跪集治閨門之禮偶時俗之際傾側偃仰務合當世阿富順貴下衆耳目獲尊蒙寵流俗是則此下士之所履而中士之所棄故規矩不相害殊性孰相安賢聖不爲匹愚智不爲羣大人樂恬淡小人欣於戚戚堂堂之業而不喻於衆庶棲棲之事不悦於大丈夫鳥獸並興各有所趣羣士經世各有所歸是以捐聰明棄智慮反歸眞朴遊於太素輕物傲世卓爾不污喜怒不嬰於心利害不接於意貴賤同域存亡一度動於不爲覽於玄妙精神平靜無所章載抱德含和帥然反化大聖之所尚而上士之所務中士之所昡爚而下士之所大笑也是故中士所聞非至美也下士所見非至善也中士所眩下士所笑乃美善之美善者也夫陳大言舒至論表自然窮微妙則中士眩而下士笑浮言遊說生息百變起福興利成功遂事則中士論而下士覺彼非喜凶而惡吉貴禍而賤福也性與之遠情與之反若處黃泉聽視九天遼遠絶滅不能見聞而已矣夫下士非樂笑於大道但道高難覩若對牛鼓簧所以笑也故聖人建言曰有之有之者言道之難知推柄自然之歸以統萬方之指者能有之非庸庸者之所能聞也旣明非常之道故非常人所及也夫何故哉聖人之道深微浩遠魁魁忽忽冥冥昭昭虚無寂泊萬物以往纖微高大無有形象窮而極之則知不能存也要而約之則口不能言也推移離散則書不能傳也明道若昧何則進道若退亡道若存欲治天下還反其身靜爲虚户虚爲道門泊爲神本寂爲和根嗇爲氣容微爲事工居無之後在有之前棄捐天下先有其身養神積和以治其心心爲身主身爲國心天下應之若性自然進道若退是故夷道若纇使正玄起除其法物去其分理從民之心聽其所有滅其文章平其險阻折關破鍵使姦自止城散獄使民自守休卒偃兵爲天下市萬方往之如川歸海夷道若纇德如溪谷不施不與不愛不利不處不去無爲而恩流不仁而澤厚長育群生爲天下母盛德若谷大白青青常如驚恐無制而勢隆無寄而權重德交造化與天下爲友出白入黑不爲美好逐功逃名乃長昭昭大白若辱盛德之人敦敦悾悾若似不足無形無容簡情易性化爲童蒙無爲無事若癡若聾身體居一神明千之變化不可見喜欲不可聞若閉若塞獨與道存盛德若不足建德若偷無所不成塗民耳目飾民神明絶民之欲以益民性滅民之樂以延民命損民服色使民無營塞民心意使得安寧建德若偷質眞若渝爲民玄則生之以道養之以德導之以精神和之以法式居以天地照以日月變以陰陽食以水穀制以無形繫以無極天下喁喁靡不賔服宇内康寧萬物蕃殖若非其功而非其德大而似小醇而似薄質眞若渝渝淺薄也大方不矩無所不包方於不方直於不直無圻無堮無法無式不方不直萬物自得不直不方天地自行在爲之陰居否之陽和爲中主分理自明與天爲一與地爲常大方無隅是故大器晚成無所不有變於無形化於無眹動而無聲爲而無體威德不可見功業不可視禍息於冥冥福生於窅窅寂泊而然是謂至巧萬物生之莫知所以勉勉而成故能長乆大器晚成是以大音希聲告以不言言於不言神明相傳默然不動天下大通無聲而萬物駭無音而萬物唱天地人物無期俱和若響應聲大音希聲大象無形大狀無容進而萬物存退而萬物喪天地與之俯仰陰陽與之屈伸效之象之若影隨形大象無形是知道盛無號德豐無謚功高無量而天下不以爲大德彌四海而天下不以爲貴光耀六合還反芒昧道隱無名夫何故哉道之爲化也始於無終於末存於不存貸於不貸動而萬物成靜而天下遂也善貸且成道德眞經指歸卷之七
