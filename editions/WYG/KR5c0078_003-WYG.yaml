body:
  text: 道德指歸論卷三漢嚴遵撰為學日益篇道徳之化變動虚𤣥蕩蕩黙黙汎汎無形潢慌忽渾沌無端視之不見聽之不聞開導禀授無所不存功成遂事無所不然無為之為萬物之根由此觀之不知之知知之祖也不教之教教之宗也無為之為為之始也無事之事事之元也凡此數者神明所因天地所歸𤣥聖所道處士所傳也逮仁義淺薄性命不真不覩大道動順其心陷溺知故漸漬愛恩情意多欲神與物連深謀逆耳大論迕心非道崇知上功貴名是以作術治數集辭著文載之篇籍以教萬民綱紀天下經緯隂陽剖判人事離㪚祖宗淳樸變化設偽萬方轉移風俗傾正敗常改正易服萬事盡彰鐘鼓琴瑟間以竽笙升降進退飾象趨翔禮儀三百威儀三千分舛並争興事儛文以辯相詘以巧相勝毫舉毛起益以無窮是以天下背夲去根嚮未歸文博學深問家知戸賢甚者擬聖以立君臣同意者無能而官異心者功大而亡是以天下騷騷不遑其親追習纎纎務順其君故和五味以養其口肥香甘脆不顧羣生變五色以養其目𤣥黄纖玅不計民貧調五音以養其耳極鍾律之功不憂世淫髙臺榭廣宫室以養其意不懼民窮馳騁田獵以養其志多獲其上不順天心凡此數者非以為善務也以悦其君也天下相放養偽飾姦消滅和睦長暴之原浸以為俗巧利為賢損民大命以增民勞傷人羙性以益民煩當此之時谿谷異君四海各主尊名貴勢强大為右忿争相踰力正任武强者拘弱衆者制寡以亂代治以非圖是臣弑其君子弑其父争之愈大莫之能守求者甚衆得之者寡道路悲憂盡言軍旅詾詾謷謷至相烹煮夫何故哉飾文益事務以相序也是以聖人釋仁去義歸於大道絶智廢教求之於巳所言日㣲所為日寡消而滅之日夜不止包以大冥使民無耻滅文䘮事天下自已損之損之使知不起遁名亡身保我精神秉道德之要固存亡之機不為事主不為智師寂若無人至於無為天地自作羣羙相隨萬物自象百蠻自和萬物疑不知所之隨明出入託於四時優游精神不外心志意中空虚如木之浮如壤之休不識仁義不逹禮儀心不知欲志不知為行歩蹎蹎瞻視顛顛語言黙黙意氣𤣥𤣥外似禽獸中獨異焉寂而不為若無君臣不為而治敦厚忠慤至於大安神休精息性命自全萬物相襲與道德隣夫何故哉主無教令而民無聞也是以將取天下常於無事不言為術無為無教無欲為寳不知為要能行以道無不開導釋虚反實以極為事上知天髙下知地厚明隂陽之分知萬物之數晝見星於天夜見魚於淵耳比八風之調目領羣獸之毛此思慮之極也無益於存力什烏獲勢百孟賁勇千夏育威執三軍進若光景退若浮雲擊如雷霆不動若隂此强之極無益於勝使日下之民皆執禮易通詩書明律比知詔令家一吏里一令鄉一倉亭一庫明察折中强武求盗天下重足而立側目而視父子不相𨼆兄弟不相容此事之極無益於治是故以知知與天相離以為為與天相竒以事事失天之意為國日益百錢盡備為而不成求而不得天下相驅歸之於亂聖人無常心篇道徳無形而王萬天者無心之心存也天地無為而萬𩔖順之者無慮之慮運也由此觀之無心之心心之主也不用之用用之母也何以明之荘子曰我之所以為我者豈我也哉我猶為身者非身身之所以為身者以我存也而我之所以為我者以有神也神之所以留我者道使然也託道之術留神之方清浄為夲虚無為常非心意之所能致非思慮之所能然也故知者之居也耳目視聴心意思慮飲食時節窮適志欲聰明並作不釋晝夜經歴百方籌策萬事定安危之始明去就之路將以全身體而延大命也若然則精神為之損血氣為之敗魂魄離㪚大命傷夭及其寐也心意不用聰明蔽塞不思不慮不飲不食精神和順血氣生息心得所安身無百疾遭離㐫害大瘡以瘳㫁骨以續百節九竅皆得所欲夫以一人之身去心則危者復寧用心則安者將亡而况乎奉道德順神明承天心養羣生者哉是以聖人建無身之身懐無心之心有無有之有託無存之存上含道徳之化下包萬民之心無惡無好無愛無憎不與㐫人為讐不與吉人為親不與誠人為媾不與詐人為怨載之如地覆之如天明之如日化之如神物無大小視之如身為之未有治之未然絶禍之首起福之元去我情欲取民所安去我智慮歸之自然動之以和導之以冲上含道德之意下得神明之心光動天地德連萬民民無賦役主無軄員俱得其性皆有其神視無所見聽無所聞遺精忘志以主為心與之俯仰與之浮沈隨之臥起放之屈伸不言而天下應不為而萬物存四海之内無有號令皆變其心善者至於大善日深以明惡者性變浸以平和信者大信至於無私偽者性變日以至誠殘賊反善邪偽反真善惡信否皆歸自然當此之時溷沈太虚霑溺至和民忘心意芒洋浮游失其所惡而獲其所求與天進退與道周流非迫禁而去惡非拘㪚而後遺也無為為之而變化不自知也夫何故哉世主之化虚無寂寞容如枯槁心如橐籥志如江海施如谿谷不别東西不異南北不辨甘苦不嫌黑白不正方圓不定曲直詳於𤣥玅務自隐匿與物無治浮游無極廢我之所欲為裏天之所欲得萬物紛紛皆注其耳目世主無為渙如儼客天地為爐太和為橐神明為風萬物為鐵德為大匠道為工作天下青青靡不潤澤故能陶冶民心變化時俗上無不包下無不克成遂萬物無不斟酌感動羣生振駭八極天下芒芒不識羙惡𤣥効昧象自成法式出生入死篇道德神明清濁太和渾淪而為體萬物以形形之所託英英榮榮不覩其字號之曰生生之為物不隂不陽不可揆度不可測量深㣲不足以為稱𤣥玅不足以為名光耀恍惚無有形聲無状無象動静無方游於虚寂之野處於無有之鄉得之者存失之者亡夫生之於形也神為之精為之根營爽為宮室九竅為戸門聰明為候使情意為乘輿魂魄為左右血氣為卒徒進與道推移退與德卷舒翺翔柔弱棲息虚無屈伸俯仰與時和俱輕死與之友欲生與之仇無以為利則不可去有以為用則不可留故無為生之宅有為死之家也夫立則遺其身坐則忘其心澹如赤子泊如無形不視不聼不為不言變化消息動静無常與道俯仰與德浮沈與神合體與和屈伸不賤為物不貴為人與王侯異利與萬姓殊患死生為一故不别存亡此治身之無為也春生夏長秋收冬藏奉主之法順天之命内慈父母外絶名利不思不慮不與不求獨往獨來體和襲順辭讓於人不與時争此治家之無為也尊天敬地不敢忘先修身正法去己任人審實定名順物和神參伍左右前後相連隨時循理曲因其當萬物並作歸之自然此治國之無為也冠無有被無形抱空虚履太清載道德浮神明秉太和驅天地馳隂陽騁五行從羣物渉𤣥冥游乎無功歸乎無名此治天下之無為也貪生利壽唯恐不得强藏心意閉塞耳目導引翔歩動握百節吐故納新吹煦呼吸被服五星飲食日月形神並作未嘗休息此治身之有為也廢釋天時獨任人事賤强求貴貧强求冨飢名渴勢心常載求衣食奢泰事過其務此治家之有為也冨國兼壤輕戰樂兵底威起節名顯勢隆刑嚴罰峻峭直刻深法察網周慘毒少恩諸侯畏忌常為俊雄公强求伯伯强求王此治國之有為也祖孝悌宗仁義修禮節飾名教修治色味以順民心鐘鼓琴瑟以和民志主言臣聽主動臣隨表功厲行開以恩厚號令聲華使民親附諸事任巳百方仰朝此治天下之有為也是故虚無清静微寡柔弱卑損時和嗇凡此十三生之徒實有濁擾顯衆剛强髙滿過泰費此十三者死之徒也夫何故哉聖人之道動有所因静有所應四肢九竅凡此十三死生之外具也虚實之事剛柔之變死生之内數也故以十三言諸夫虚生充實無生常存清則聰逹静則内明微生章顯寡則生衆柔生剛徤弱生堅强卑則生髙捐則生益時則通逹和則得中嗇則有餘是謂益生能行此道與天地同為身者乆為國者長雖欲不然造化不聽實生空虚有生消忘濁則聽塞擾則失明顯則生微衆則生寡剛生柔强生弱殃髙生卑賤滿生損空過則閉塞泰則困窮費則招禍是俱不祥有行此道動而之窮為身不乆為國不平雖欲不然天地不從而民皆有其生而益之不止皆有其身而愛之不已動歸有為智慮常起故去虚就實絶無依有出清入濁背静作擾變㣲為顯化寡為衆離柔及剛廢弱興强損卑歸髙棄損取盈縱時造過釋和作㤗將以有為除嗇施費夫何故哉大有其身而忘生之道也是故攝生之士超然大度卓爾逺逝不拘於俗不繫於世損形於無境游神於無内不以生為利不以死為害兼施無窮物無細大視之如身無所憎愛精神隆盛福德並㑹道為中主光見於外自然之變感而應之天地人物莫之能敗陸行則虎兕不能傷入軍則五兵不能害非加之而不能克投之而不能制也神氣相通傷害之心素自為廢夫何故哉聲響相應物從其𩔖兕虎不加無形而五兵不擊無質攝生之士賊害之心亡於中而死傷之形亦亡於外也道生篇聖智之術不自天下不由地出内在於身外在於物督以自然無所不通因循效象無所不竭故道虚徳無不失其心天尊地卑不違其節何則以有知無由人識物物𩔖之無者生有虚者生實見㣲知著觀始覩卒非有巧能自然之物聖人因之與天周宻是故知道以太虚之虚無所不禀知德以至無之無無所不授道以無為之為品於萬方而無首德以無設之設遂萬物之形而無事故能陶性命冶情意造志欲化萬事何謂性命情意志欲所禀於道而成形體萬物殊𩔖人物男女聖智勇怯小大脩短仁亷貪酷强弱輕重聲色状貌精粗高下謂之性所授於德冨貴貧賤夭夀苦樂有冝不冝謂之天命遭遇君父天地之動逆順昌衰存亡及我謂之遭命萬物陳列吾擇有事舉錯廢置取舍去就吉㓙來禍福至謂之隨命因性而動接物感寤愛惡好憎驚恐喜怒悲樂憂恚進退取與謂之情因命而動生思慮定計謀决安危通萬事明是非别同異謂之意因於情意動而之外與物相連常有所悦招麾禍福功名所遂謂之志順性命適情意牽於殊𩔖繫於萬事結而難解謂之欲凡此六者皆原道德千變萬化無有窮極唯聞道德者能順其則性精命高可變可易性麤命下可損可益若得根夲不滯有無是故天地人物含心包核有𩔖之屬得道以生而道不有其德得一而成而一不求其福萬物尊而貴之親而愛之而無報其德夫何故哉道高德大深不可言物不能富爵不能尊無為為物無以物為非有所迫而性常自然故道之為物窺之無戸察之無門指之無體象之無容意不能盡而言不能通萬物以生不為之損萬物歸之不為之盈上下不窮廣大無涯消息贏詘不可度訾遊於秋毫不以為少包裹萬天不以為多青紫光耀不為易志幽冥枯槁不為變化運行並施無所愛好稟受性命無所不為徳流萬物而不可復恩結澤締而不可歸贍足天下而不費成功遂事而不衰其於萬物也豈直生之而已哉生之形之設而成之品而流之停而就之終而始之先而後之既而託其後又在其前神明以處太和以存清以上積濁以下凝天以之圓地以之方隂得以隂陽得以陽日月以照星辰以行四時以變化五行以相勝火以之熱水以之寒草木以柔金石以剛味以甘苦色以𤣥黄音以高下變以縱横山陵以滯風雨以行鱗者以游羽者以翔獸以之走人以聰明殊𩔖異族皆以之存變化相背皆以之亡萬天殊狀水土異形習俗相違利害不同容貌詭謬意欲不通隂陽所不能及日月所不能明皆以之始皆以之終開口張目屈伸傾側俯仰之頃喘息之間神所經歴心意所存恩愛所加雌雄所化無所不導無所不為生之而不以為貲為之而不以有求長之而無以為有天下迷惑莫之能知或曰道徳天地之神明也天地道德之形容也何以明之道徳包萬天也荘子曰夫天地有𩔖而道徳無形有𩔖之徒莫不有數無形之物無有窮極以有數之物託於無窮若草木離土衆星離天不足以喻焉而謂之不然則是不通乎有無相包虚實相含猶𤓰瓠之瓣不覩區蔓之有隣也蟣虱藏於裘褐不知都邑之多人也是故宇宙之外營域之内拘以無禁束以無制安危消息無有中外同風共指和順仰制全活姣好靡有傷敗百祥萬福道為之葢功𤣥事冥不聞於世天下莫見為而不廢天下有始篇夫道之為物無形無状無心無意不忘不念無知無識無首無向無為無事虚無澹泊恍惚清静其為化也變於不變動於不動反以生覆覆以生反有以生無無以生有反覆相因自然是守無為為之萬物興矣無事事之萬物遂矣是故無為者道之身體而天地之始也無為微玅周以宻矣滑淖安静無不制矣生息聰明巧利察矣通逹萬方無不溉矣故曰有為之元萬事之母也聖人得之與物反矣故能逹道之心通天之理生為之元開事之戸因萬方之知窮衆口之辨盡異端之巧竭百家之伎王道人事與時化轉因之修之終而復始變化忽然通神使鬼形於無形事無不理窮於無窮極乎無有以能雕琢復反其母既覆又反為天下夲遊於𤣥冥終身不殆故能塞其聰明閉其天門關之以舌鍵之以心非時不動非和不然國家長乆終身無患夫何故哉不聽之聞與天同聰不視之見與天同明不言之化與天同德不為之事與天同功所守者要所然者詳道德之明不蔽而天地之慮逹通故能響應影隨照物不窮為福元始為化祖宗周流蔓延淪於大中身存物順天下不勤故力視損明力聽損聰疾言阻德功偽敗功是故口以大開耳目急張知故並起萬物孳蕃奮心揚慮顯遂功名名成功遂禍至福終動罹天網静陷地殃神明不能祐造化不能生庶人歿命國家以䘮是以聖人退為之為去事之事體道之心履徳之意統無窮之機秉自然之要翔於未元集於𤣥玅聰作未聞明作未見芽未動朕坼未判昭然獨覩無形之變通於無表逹於無境毫毛之惡不得生赫赫之患不得至為之行之絶言滅慮積柔體弱反於無識誅暴求寡與神同化無敵之不勝無事之不為知力不得加天下不得謀治人理物與隂陽配内用其光而外不違衣食耕穫桑織有餘福積禍消人給家贍心不載求賤不望貴貧不幸冨纎㣲尊儉内外不過奉上養下人道盡備復歸其内神明不耗槃積固畜不敢以為智如江海與天同慮絶滅三五害之以事填而塞之使不可識為瘖為聾與天地同為𤣥為黙與道窮極去㓙離咎違患廢賊浮徳載和無所不尅故人能入道道亦入人我道相入淪而為一守静致虚我為道室與物俱然混沌周宻反初歸始道為我襲行於大道篇道德不為智巧故能陶冶天地造化隂陽而天地不能欺也天地不為智巧故能含吐變化殺生羣𩔖而萬物不能逃也道釋自然而為智巧則心不能自存而何天地之所造隂陽之所能然也天地釋自然而為智巧則身不能自生而何變化之所包何萬物之所能全故虚無無為無知無欲者道德之心而天地之意也清静效象無為因應者道德之動而天地之化也何以明之荘子曰道之所生天之所興始始於不始生生於不生存存於不存亡亡於不亡凡此數者自然之驗變化之常也故人之動作不順於道者道不祐也不順於德者德不助也不順於天者天不覆也不順於地者地不載也夫道德之所不祐助天地之所不覆載此禍患之所不逺而福德之所不近也是以𤣥聖處世負逹抱通提聰挈明順道奉德棄知亡身厲志憂畏唯恐蹉跌故勉於巧不巧之巧務於明不明之眀信順柔弱躬耕而食常於止足歸乎無名戰戰慄慄恐失自然患至天地禍及人民是以吉祥之應福德之至如影之於形響之應聲非有期㑹動若俱生是故大道甚夷其化無形若逺而近若晦而明平夷而無要約而易行無為而功成無事而福盈天地由之萬物以生而民背之用其聰明任偽廢道反地逆天尊知䝿巧欺鬼侮神飾治邪淫歸偽去真創作改制起事遂功豐屋榮觀大戸高門飾以竒怪加以采文以知為凖以巧為繩詐為之斧偽為之斤秉術操數簡織賤耕田不脩莨莠並生田苖不起囷倉虚空衣重五采錦繡𤣥黄氷紈綺縠靡麗輝光利劍堅甲强弩勁弓輕車駿馬多俠㐫人權重名顯威勢流行伐殺鄉里臣役細民妬亷嫉讓疾忠毒信結邪連偽尚争貴武無不侵凌使通境外常議弑君食重五味殘賊羣生刳胎殺鷇逆天之心居常醉飽取求不取多藏金玉畜積如山所有珍寳擬於人君出入竒異榮盛光顯離衆絶俗超然獨存亂世高之稱為大人過衆惡大罪重禍深賢父不畜明主不臣道所不祐神所不在天所不覆萬物所怨有人若此䘮之受禍生之受患身茍不獲事及子孫善建篇天地之間廣大脩逺殊風異俗物𩔖衆巨變化無窮利害謬詭故能不能制而為不能為也我為天下而天下亦為我彼我相遇則彼衆而我寡以寡遇衆則衆寧而寡殆故以己知立則知奪之以己巧立則巧伐之以己力立則力威之唯無所為莫能敗之何以効其然也夫黙而求響響不我應託隂求影影不我從畏響而扣金響愈我應惡影而處陽影益我從由此觀之無為不能遁福有為不能逃患是以聖人去力去巧去知去賢建道抱德攝情畜神體和襲弱履地戴天空虚寂泊若亡若存中外俱黙變化於𤣥無為無事反朴歸真無法無度與變俱然抱小託大牧養萬民方圓先後常與身存體正神寧傳嗣子孫徳積化流洋溢無窮衰而復盛與天俱終故治之於身則性簡情易心逹志通逺所不逺明所不明重神愛氣輕物細名思慮不惑血氣和平筋骨便利耳目聰明肌膚潤澤靣理有光精神專固生生青青身體輕勁羙好難終治之於家則夫信婦貞父慈子孝兄順弟悌九族和親耕桑時得畜積殷殷六畜蕃殖事業修治常有餘財鄉邑願之治之於鄉則睹綱知紀動合中和名實正矣白黑分明曲直異理是非自得姦邪不起威嚴尊顯令行禁止奉上化下公若父子敬愛信嚮上下歡喜百性和集官無留負職修名榮稱為君子常有餘德沒身不殆治之於國則主明臣忠朝不壅賢士不妬功邪不蔽正讒不害公和睦順從上下無怨百官樂軄萬事自然逺人懐慕天下同風國富民實不伐而彊宗廟尊顯社稷永寧隂陽永合禍亂不生萬物豐熟境内大寧鄰家託命後世蕃昌道德有餘與天為常治之於天下則主隂臣陽主静臣動主員臣方主因臣唱主黙臣言正直公方和一大通平易無為寂泊無聲德馳相告神騁相傳運動無端變化若天不行而知不為而成功與道倫宇内反真無事無憂太平自興是故我身者彼身之尺寸也我家者彼家之權衡也我鄉者彼鄉之䂓矩也我國者彼國之凖繩也人主者天下之腹心也天下者人主之身形也故天下者與人主俱利俱病俱邪俱正人主相連茍能得已天下自然故可以知我者無所不知可以治我者無所不治便於我者無所不可利於我者無所不冝不可於我而可於彼者天下無之道徳指歸論卷三
