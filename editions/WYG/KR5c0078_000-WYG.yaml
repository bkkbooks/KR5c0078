front:
  text: 欽定四庫全書子部十四
  hash: sha256:59b6c5006a29a1c169640e5600631b30d9a17b0b2b0283c6e596da3e89cb6da6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0078_WYG_000-1a, image: WYG1055/WYG1055-0075a.png}
body:
  text: 道徳指歸論道家𩔖提要臣等謹案道徳指歸論六卷舊本題漢嚴遵撰隋志著録十一卷晁公武讀書志曰唐志有嚴遵指歸四十卷馮廓注指歸十三卷今考新舊唐書均載嚴遵老子指歸十四卷馮廓老子指歸十三卷無嚴遵書四十卷之説疑公武所記為傳寫誤倒其文也此本為胡震亨秘冊函所刋後以板歸毛晉編入津逮秘書止存六卷錢曽讀書敏求記云曽得錢叔寳鈔本自七卷至十三卷前有總序後有人之饑也至信言不實四章今皆失去又引谷神子序云道徳指歸論陳隋之間已逸其半今所存者止論徳篇近代嘉興刋本列卷一之卷六與序文大相逕庭云云此本亦題卷一之卷六然則震亨所刻即據嘉興本也曹學佺作元羽外編序稱近刻嚴君平道徳指歸論乃吳中所偽作今案通考引晁氏之言案此條通考所引與今本讀書志不同稱其章句頗與諸本不同如以曲則全章末十七字為次章首之𩔖則是書原有經文陸游集有是書跋稱為道徳經指歸古文亦以經文為言此本乃不載經文體例互異又谷神子注本晁氏尚著録十三卷不云佚闕此本載谷神子序乃云陳隋之間已逸其半今所存者止論徳篇因獵其訛舛定為六卷與晁氏所録亦顯相背觸且既云佚其上經何以説目一篇獨存至於所引莊子今本無者十六七不應遵之所取皆向郭之所棄此必遵書散佚好事者摭吴澄道徳經注跋中莊君平所傳章七十有二之語造為上經四十下經三十二之目又因漢志莊子五十二篇今本惟三十三篇遂多造莊子之語以影附於逸篇而偶未見晁公武説故谷神子偽序之中牴牾畢露也以是推求則學佺之説不為無據錢曽所辨殊逐末而遺其本矣以其言不悖於理猶能文之士所贋託故仍著於録備道家之一説焉乾隆四十五年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀道德指歸論原序老子書註者無慮數十家獨河上公最著然莫古於嚴君平矣君平生元成間與揚子雲同時葢隐於卜筮其術道髙藐才智淵蔚辨討微持論悠暢幾識洞變藏往知來與鬼神謀隂陽為使其為㫖與老氏無間故因其篇章以發歸趣以為道夲於無無無之無是生於無未始之始是為太始體既無矣不得不虚既未有始莫之端倪惟無倪也故能周遍虚之極也復何所窮故原物之生始惟至柔柔者生之端剛者生之魄也勢之充滿必始於虚柔為之夲不失其初故天道下降地道居卑川冲谷虚澤納藪萃王公執謙能下為貴以卑為髙以後為先去泰去矜知雄守雌以是為國以是為身禍之所去福之所存綿綿不絶為天下正重積蚤復惟怳與惚為於無為事於無事故天地遂成萬物兼作長養一世含利四海無舉大功而名號歸之無傷吾神而萬世為澤此君平之指而老氏之大要也人隨所慕以自為説故有以柔弱勝剛强而為兵權之譎者取彼險武附於詐謀有以芻狗萬物而為申韓之刻者絶聖去智以愚齊民有以清净無為而為葢公之言者慎守其常用以寧一則曹丞相輔漢一代之治是也有以谷神不死而為神仙長年之術者則推夲柱下原於道德關尹書之𩔖遂為𤣥談之宗然其所述皆老之支流非其全體老氏豈虞其至是哉即六藝固有盗以為亂階者莊叟固云古之博大真人哉而自著其道未嘗附之今欲與列荘為一顧且未可而况彼諸家者自為解也毫千里而何以訓詁為哉抑君平之書則大有𩔖司馬季主者矣葢皆懐道不仕敦賁丘園上述天道下紀地理中極人事究觀古覽窮後世旁盡物情包洞幽晦䜟記未形與能凡庶故宋忠賈聞其言也抑心消志伏軾無氣而嚴夫子端策正蓍抗論卜肆巨君之亂貞不絶俗清而不汙其為文也宏裕淹該含通標貫靡靡纚纚條縷判析首尾温粹即之也近充𩔖也逺不以才雄而鬱耀莫遏不以辭貴理勝故超若千里驥盤旋垤中塵不出軌馭不範而踐無遺地騁有餘巧若江海為物淹浸蕩沃滔陵汨陳漸潤而不知其益若造化付形隨所充具其新不窮而機不可測雖以釋訓為名故自為一家言其亡者已六卷即所存可以無恨其少矣劉鳯序余嘗讀君平座右銘曰疾行不能遁影大音不能掩響黙然託䕃則影響無因常體卑弱則禍患無萌歎其深得老氏之㫖後知君平有道德指歸探檢不得壬寅冬孝轅從趙元度得之為讀一過大抵旁該六合内究萬情測隂陽之用觀物𩔖之變以歸合于𤣥同披玩不能去手其為文往往以轉韻相叶似是從龜䇿傳來又若無義無仁六合之内和合天親無節無禮四海之内親為兄弟則又三句首尾叶矣至於名身孰親篇無名之名數句王輔嗣凖之以註睽之上九便稱妙解惜其前後殘缺使大寳不完亦道函一大䧟本序題谷神子不顯姓名晁公武以為唐人馮廓也繡水沈士龍識道徳指歸視河上公篇目直是下經然君平以四十篇為上經三十二篇為下經以今所存篇目校之尚多二篇又合反者道之動于得一篇治人事天子方而不割篇善為士于大似不肖篇復翦善復為妖巳上附之以正治國篇内讀之則語勢聫愜理亦諧暢惟民之飢已下七篇都缺因後先檢併其所合治人善為士二篇當自為學日益已下及所缺七篇始是君平下經而不出户已前九篇猶上經也更以河上三十七篇足之則君平上經又得四十六篇亦必有六篇合併始不肯説目耳至若隂八陽九之説雖林希逸謂非老氏本㫖似有獨㑹乃其濬决𤣥㫖演倡宗風則亦𤣥元之素位矣海鹽胡震亨識嚴君平者蜀郡成都人也姓莊氏故稱莊子東漢章和之間班固作漢書避明帝諱更之為嚴莊嚴亦古今之通語君平生西漢中葉王莽漢遂𨼆遁焬和葢上世之真人也其所著有道徳指歸論若干卷陳隋之際已其半今所存者止論徳篇因獵其訛舛定為六卷而以其説目冠於端庶存全篇之大義爾谷神子序
