body:
  text: 道德指歸論卷一漢嚴遵撰説目荘子曰昔者老子之作也變化所由道德爲母効經列首天地爲象上經配天下經配地隂道八陽道九以隂行陽故七十有二首以陽行隂故分爲上下以五行八故上經四十而更始以四行八故下經三十有二而終矣陽道竒隂道偶故上經先而下經後陽道大隂道小故上經衆而下經寡陽道左隂道右故上經覆來下經覆往反覆相過淪爲一形冥冥混沌道爲中主重符列驗以見端緒下經爲門上經爲戸智者見其經効則通乎天地之數隂陽之紀夫婦之配父子之親君臣之儀萬物敷矣上德不徳篇天地所由物𩔖所以道爲之元德爲之始神眀爲宗太和爲祖道有深㣲德有厚薄神有清濁和有髙下清者爲天濁者為地陽者爲男隂者爲女人物禀假受有多少性有精粗命有長短情有羙惡意有大小或為小人或爲君子變化分離剖判爲數等故有道人有德人有仁人有義人有禮人敢問彼人何行而名號殊謬以至於斯荘子曰虚無無爲開導萬物謂之道人清靜因應無所不為謂之德人兼愛萬物博施無窮謂之仁人理名正實處事之義謂之義人謙退辭讓敬以守和謂之禮人凡此五人皆樂長生尊厚德貴髙名任其聰明道其所長歸其所安趨騖舛馳或否或然變化殊方建號萬差德有優劣世有盛衰風離俗異民命不同故或有溟涬𤣥寥而無名或濛澒芒芒而稱皇或汪然汎而稱帝或廓然昭昭而稱王或逺通參差而稱伯此其可言者也然而伯非伯而王非王而帝非帝而皇非皇而有非有而無非無千變萬化不可為計重累億萬不可爲名何以明之夫易姓而王封於泰山禪於梁父者七十有二君其有形兆圻堮髣髴不可識者不可稱言此其性命不同功名不齊者耶非也是故上德之君體道而存神與化倫德動𤣥冥天下王之莫有見聞徳歸萬物皆曰自然下德之君體德而行神與化遊德配皇天天下王之或見或聞德流萬物復反其君夫何故哉上德之君性受道之纎妙命得一之精㣲性命同於自然情意體於神明動作倫於太和取舍合乎天心神無所思志無所慮聰明𤣥逺寂泊空虚動若無形靜若未生功若天地事如嬰兒遺形藏志與道相得溟涬濛洪天下莫知潼溶方外翺翔至逺隂陽爲使鬼神為謀身與道變上下無窮進退推移常與化俱故恬淡無為而德盈於𤣥域𤣥黙寂寥而化流於無極恩不可量厚不可測兼包大營澤及萬國知不足以倫其化言不足以𨗳其俗天下咮咮喁喁皆蒙其化而被其和若此者元無絶而不知爲之者何誰也下德之君性受道之正氣命得一之下中性命比於自然情意㡬於神明動作近於太和取舍體於至德託神於太虚隐根於𤣥冥動反柔弱靜歸和平戴䂓履矩鏡視太清變化恍惚因應無形希夷茫昩幾無諡號方地隨天與化為常德盛澤流洋溢萬方羙德未形天下童蒙四海為一蕩蕩𤣥黙與民俯仰與物相望當此之時大道未分醇德未剖六合之内一人獨處其務損而不益其事修而不作所為者寡所守者約民敦厚而忠信世和慎而寂泊水草為稸積裘褐為盛服巨木爲廊廟巖穴為室宅主如天地民如草木被道合德恬淡無欲隂陽和洽萬物蕃殖無有制令宇内賔伏嘉禾朱草勺藥並生神龍鳳凰與人相託甘露降而不霽祥風動而不息無義無仁六合之内和合天親無節無禮四海之内親為兄弟親而不和敬而不恭天地人物混沌𤣥通上仁之君性醇粹而清明皓白而博通心意虚靜神氣和順管領天地無不包裹覩㣲得要以有知無養生處德愛民如子昭物遭變響應影隨經天之分明地之理别人物之宜開知故之門生事起福以益萬民録内畧外𨗳之以親積思重厚以招殊方法禁平和號令寛柔舉措得時天下歡喜雷霆不暴作風雨不卒起草木不枯瘁人民不夭死跂行喙息皆樂其生蜎飛蝡動盡得其所老弱羣遊壮者耕桑人有𤣥孫黄髪兒齒君如父母民如嬰兒德流四海有而不取上義之君性和平正而逹通情察䆒利害辯智聰明心如規矩志如尺衡平靜如水正直如繩好舉大功以建鴻號樂爲福始惡為禍先秉權操變以度時世崇仁勵義以臨萬民因天地之理制萬物之宜事親如奉神履民如臨深兼聽萬國折之以中威而不暴和而不滛嚴而不酷察而不刻原始定終立勢御民進退與時流屈伸與化俱事與務變禮與俗化號令必信制分别明綱要而不踈法正而不滛萬事决於臣下權勢獨斷於君延正以慎道顯善以發姦作五刑刻肌膚敬元䝿始常與名俱因節而折循理而割權起勢張威震海内去已因彼便民不苛纎芥之惡貶秋毫之羙舉内施王室外及人物承弊通變存亡接絶扶㣲起㓜仁德復發有土傳嗣子孫不絶上禮之君性和而情柔心踈而志欲舉事則隂陽發號順四時紀綱百變網羅人心尊寵君父卑損臣子正上下明差等序長㓜别夫婦合人倫循交友歸奉條貫事有差品拘制者褒録不羈者削貶優㳺强梁包褁風俗𨗳以中行順心從欲以和節之迫情禁性防隄未萌牽世繫俗使不得滛絶人所不能已强人所不能行勞神傷性事衆費煩亂得以治危得以寧知故通逹醇慤消亡大道滅絶仁德不興天心不洽四位失常雷霆毁折萬物天傷父子有䘮而天不爲之和晝夜悽悽而世不為之化鐘磬喤喤而俗不為之變沈吟雅韻而風不為之移謙退辭讓天下不信守柔伏雌天下不親懸爵設賞賢人不下攘臂執圭君子不來夫何故哉辭豐貌羙而誠心不施故也是故帝王根夲道爲元始道失而德次之德失而仁次之仁失而義次之義失而禮次之禮失而亂次之凡此五者道之以一體而世主之所長短也故所為非其所欲也所求非其所得也不務自然而務小薄夫禮之為事也中外相違華盛而實毁末隆而夲衰禮薄於忠權輕於威信不及義德不逮仁為治之末爲亂之元詐偽所起忿争所因故制禮作樂改正易服進退威儀動有常節先識來事以明得失此道之華而德之末一時之法一隅之術也非所以當無窮之世通異方之俗者也是故禍亂之所由生愚惑之所由作也何以明之荘子曰夫天地之應因於事事應於變變無常時是以事不可預設變不可先圖猶痛不可先摩而痒不可先折五味不可以升斗和琴瑟不可以尺寸調也故至微之㣲微不可言而至玅之玅玅不可傳忠信之至非禮之所能餙而時和先後非數之所能存也故聰明博逹智慮四起覩隂之綱得陽之紀明鬼神之道通萬物之理仰則見天之表俯則見地之裏教民不休事至不止以此致平非所聞也比夫萬物之託君也猶神明之居身而井水之在庭也水不可以有為清也神不可以思慮寧也夫天地之間萬物並興不可以有事平也是以大丈夫之為化也體道抱德太虚通洞成而若缺有而若亡其靜無體動而無聲忠信敦慤不知為𤣥黙暗昧朴素為先損心棄意不見威儀無務無為若龍若蛇違禮廢義歸於無事因時應變不豫設然秉微統要與時推移取舍屈伸禍亂患咎求之於己百祥萬福無情於人得一萹一者道之子神明之母太和之宗天地之祖於神為無於道為有於神為大於道爲小故其為物也虚而實無而有圓而不䂓方而不矩繩繩忽忽無端無緒不浮不沈不行不止為於不為施於不與合囊變化負包分理無無之無始始之始無内無外混混沌沌芒芒汎汎可左可右虚無為常清静為主通達萬天流行億野萬物以然無有形兆窅然獨存𤣥妙獨處周宻無間平易不改混冥皓天無所不有陶冶神明不與之同造化天地不與之處禀而不損收而不聚不曲不直不先不後髙大無極深㣲不測上下不可𨼆議旁流不可揆度潢爾舒與皓然銲生銲生而不與之變化變化而不與之俱生不生也而物自生不為也而物自成天地之外毫之内禀氣不同殊形異𩔖皆得一之一以生盡得一之化以成故一者萬物之所𨗳而變化之至要也萬方之凖繩而百變之權量也一其名也德其號也無有其舍也無為其事也無形其度也反其大數也和其歸也弱其用也故能知一千變不窮萬輪不失不能知一時㓙時吉持國者亡守身者沒是故昔之得一者天之性得一之清而天之所為非清也無心無意無為無事以順其性𤣥𤣥黙黙無容無式以保其命是以隂陽自起變化自正故能剛健運動以致其髙清明大通皓白和正純粹真茂不與物糅然大易乾乾光耀萬物資始雲蒸雨施品物流行元首性命𤣥𤣥蒼蒼無不盡覆地之性得一之寧而地之所為非寧也無知無識無為無事以順其性無度無數無愛無利以保其命是以山川自起剛柔自正故能性順柔弱直方和正廣大無疆深厚清靜萬物資生無不成載神之性得一之靈而神之所為非也不思不慮無為無事以順其性無計無謀無嚮無首以保其命是以消息自起存亡自正故老能復壯死能復生困能復逹廢能復榮變化不極反覆不窮物𩔖託之不失其中谷之性得一之盈而谷之所為非盈也不欲不求無為無事以順其性不仁不義不與不施以保其命是以實虚自起盛衰自正故能蒸山流澤以為通德涓涓不息綿綿不絶皓皓洋洋脩逺無極以盈江海深大不測侯王之性得一之正而侯王之所為非正也去心去志無為無事以順其性去聰去明虚無自應以保其命是以和平自起萬物自正故能體道合德與天同則抱神履和包褁萬物聲飛化物盈溢六合德𨗳天地明照日月制世御俗宇内為一凡此五者得一行之興而不廢成而不缺流而不絶光而不滅夫何故哉性命自然動而由一也是故使天有為動不順一為髙得卑為清得裂隂陽謬戾綱弛紀絶和氣隔塞三光消滅雷霆妄作萬物皆失使地有為動不順一為直得枉為寧得發山川崩絶剛柔卷折氣化不通五行毁缺百榖枯槁羣生疾疫使神有為動不順一為達得困為靈得歇變化失序締滯消竭盛衰者亡弛張者殁使谷有為動不順一為有得亡為盈得竭虚實反覆流澤不入侯王有為動不順一為貴得賤為正得蹷亂擾迷惑事由己出百官失中䘮其名實萬民不歸天地是絶凡此五者性命淳羙變化窮極進退屈伸不離法式得一而存失一而没况乎非聖人而王萬民廢法式而任其心者哉是故天人之道物𩔖化變為寡者衆爲賤者貴為髙者卑為成者敗益之者捐利之者害處其反者得其覆為所求者失所欲是以賢君聖主勢在民上爵尊天下澤連萬物德懐四海道之所祐天之所助萬物所歸鬼神所與厲身起節自謂孤寡處卑守微躬渉勞苦損心挫志務設民下不為貴故擅民之命不為髙故常在民上不欲也故無所不有不為也故無所不宰萬物紛紜身無所與故能為之夲非獨王道萬事然矣夫工之造輿也為圓為方爲短為長為曲爲直爲縱為横終身揳揳卒不為輿故能成輿而令可行也夫玉之為物也微以寡而石之為物也巨以衆衆故賤寡故貴玉之與石俱生一𩔖寡之與衆或求或棄故貴賤在於多少成敗在於為否是以聖人為之以反守之以和與時俯仰因物變化不為石不為玉當在玉石之間不多不少不貴不賤一為綱紀道為楨幹故能專制天下而威不可勝全活萬物而德不可量貴而無憂賤而無患髙而無殆卑而愈安審於反覆歸於𤣥黙明於有無反於太初無以身為故神明不釋無以天下為故天下與之俱夫何故哉因道而動循一而行道之至數一之大方變化由反和纎為常起然於否為存於亡天地生於太和太和生於虚冥上士聞道篇道德天地各有所章物有髙下氣有短長各樂其所樂患其所患見其所見聞其所聞取舍殊謬畏喜殊方故鶉鷃髙飛終日馳騖而志在乎蒿苖鴻鵠高舉逕歴東西通千達萬而志在乎陂池鸞鳳翺翔萬仭之上優游太清之中而常以為卑延頸舒翼凌蒼雲薄日月髙翔逺逝曠時不食往來九州棲息八極乃得其宜三者殊便皆以為娛故無窮之原萬尋之泉神龍之所歸小魚之所去髙山大丘深林巨壑茂木暢枝鴻鳥虎豹之所喜而鷄狗之所惡悲夫三代之遺風儒墨之流文誦詩書脩禮節歌雅頌彈琴瑟崇仁義祖㓗白追觀往古通明術數變是定非已經得失身寧名榮鄉人傳業中士之所道上士之所廢也閒居幽思强識萬物設偽餙非虚言名實趨翔進退升降跪集治閨門之禮偶時俗之際傾側偃仰務合當世阿富順貴下衆耳目獲尊蒙寵流俗是則此下士之所履而中士之所棄故䂓矩不相害殊性孰相安賢聖不為匹愚智不為羣大人樂恬淡小人長於戚戚堂堂之業不喻於衆庶棲棲之事不悦於大丈夫鳥獸並興各有所趨羣士經世各有所歸是以捐聰明棄智慮反真歸朴遊於太素輕物傲世卓爾不汚喜怒不嬰於心利害不接於意貴賤同域存亡一度動於不為覽於𤣥玅精神平静無所章載抱德含和帥然反化大聖之所尚而上士之所務中士之所眩爚而下士之所大也是故中士所聞非至美也下士所見非至善也中士所眩下士所乃美善之美善者也夫陳大言舒至論表自然窮㣲玅則中士眩而下士浮言游説生息百變起福興利成功遂事則中士論而下士覺彼非喜㓙而惡吉貴禍而賤福也性與之逺情與之反若處黄泉聽視九天遼逺絶滅不能見聞而已矣故聖人建言曰有之有之者言道之難知惟柄自然之歸以統萬方之指者能有之非庸庸者之所能聞也夫何故哉聖人之道深㣲浩逺魁魁忽忽冥冥昭昭虚無寂泊萬物以往纎㣲髙大無有形象窮而極之則知不能存也要而約之則口不能言也推移離散則書不能傳也何則進道若退亡道若存欲治天下還反其身静為虚戸虚為道門泊為神夲寂爲和根嗇為氣容微為事工居無之後在有之前棄捐天下先有其身養神積和以治其心心為身主身爲國心天下應之若性自然是故夷道若纇使正𤣥起除其法物去其分理從民之心聽其所有滅其文章平其險阻折關破鍵使姦自止壊城散獄使民自守休卒偃兵為天下市萬方往之如川歸海徳如谿谷不施不與不愛不利不處不去無為而恩流不仁而澤厚長育羣生為天下母大白青青常如驚恐無制而勢隆無寄而權重德交造化與天下為友出白入黑不為羙好逐功逃名乃長昭昭盛德之人敦敦悾悾若似不足無形無容簡情易性化為童蒙無為無事若癡若聾身體居一神明千之變化不可見喜欲不可聞若閉若塞獨與道存建德若偷無所不成塗民耳目餙民神明絶民之欲以益民性滅民之樂以延民命損民服色使民無爭塞民心意使得安寧質真若渝為民𤣥則生之以道養之以德𨗳之以精神和之以法式居以天地照以日月變以隂陽食以水榖制以無形繫以無極天下喁喁靡不賔服宇内康寧萬物蕃殖若非其功而非其德大而似小醇而似薄大方不矩無所不包方於不方直於不直無圻無堮無法無式不方不直萬物自得不直不方天地自行在為之隂居否之陽和為中主分理自眀與天為一與地為常是故大器晚成無所不有變於無形化於無朕動而無聲為而無體威德不可見功業不可視禍生於冥冥福生於窅窅寂泊而然是謂至巧萬物生之莫知所以勉勉而成故能長乆是以大音希聲告以不言言於不言神明相傳黙然不動天下大通無聲而萬物駭無音而萬物唱天地人物無期俱和若響應聲大象無形大状無容進而萬物存退而萬物䘮天地與之俯仰隂陽與之屈伸效之象之若影隨形是知道盛無號德豐無諡功髙無量而天下不以為大徳彌四海而天下不以為貴光耀六合還反芒昧夫何故哉道之為化也始於無終於末存於不存貸而不貸動而萬物成静而天下遂也道徳指歸論卷一
