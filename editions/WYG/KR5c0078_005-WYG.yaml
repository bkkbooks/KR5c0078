body:
  text: 道德指歸論卷五漢嚴遵撰萬物之奥篇木之生也末因於條條因於枝枝因於莖莖因於本夲因於根根因於天地天地受之於無形華實生於有氣有氣生於四時四時生於隂陽隂陽生於天地天地受於無形吾是以知道以無有之形無狀之容開虚無導神通天地和隂陽寧調四時决萬方殊形異𩔖皆得以成變化終始以無為為常無所愛惡與物大同羣𩔖應之各得所行善人得之以翕以張清静柔弱黙黙沌沌仁宛和淖潤澤虚平大小周宻纎㣲無形𤣥逹萬事以歸無名終始反覆萬福自生動得所欲静失所患在人之上威德自明攻堅勝大莫與為䨇㐫人得之以發以張堅剛以疎實動以先驕溢以壯夭盛滿以强極廣脩大以無彊照察察以熒熒顯的的以彰彰彊大終小不禍自生動失所欲静得所傷心憂志削乃反正常神氣煩促趨翕去張鬱約而辭卑拘制而體降迫險而賔伏慘怛而忠信改容而易節與君子同罪定而言善臨死而愛身一奉天數變性易情安貧樂困卑賤為常尊天敬鬼視人如王上比牛馬下列犬羊天網以發自然不聽吁嗟痛哉為戒甚明二者殊途皆由道行在前在後或存或亡故言行者治身之獄也時和先後大命之所屬也是以君子之立身也如喑如聾若樸若質藏言於心常處𤣥黙當言深思發聲若哭和順時適成人之福應對辭讓直而不飾故言滿天下而不多振動四海而不速連接萬物而不有辭動天下各得所欲其經世也氣志窅冥而形容隱匿居如驚恐貌似不足偆偆漻漻消如氷釋遇時而伸遭世而伏與天同憂中心惻惻計畫不行隨時反側謙虚止足卑損自牧樂下如水乆而不忒下之又下之至於無極天下應之故能有國夫何故哉人之情性樂尊寵惡卑耻損之而怨益之而喜下之而悦止之而鄙古今之通道而人心之正理也賢者旣然小人尤甚是故尊羙言行事無患矣古之將民何棄之有桀紂之吏可令順信秦楚之卒可令順善故能得其心天下可有不得其意妻妾不使何以効其然也夫爵尊天下富有四海威勢無量專權擅柄人之所畏也去徒歩離卒伍鴻舉龍興起佐天子發道揚德施行所有恩流萬姓光顯祖考人之所利也以人之所畏求人之所利言不美行不敬雖執大璧操珍物而進之安車駟馬而載之則是賢者之心疑惑下否𤣥聖深隠君子不來言行修於内則神氣踰於外無有駟馬之勞寳璧之費海内之士響應風起俊雄英豪輻至蜂止聖人下之朝多君子古之所以貴此道者夫何故哉言順天地而不以行合人心而不恃名成而不顯功遂而不有情性自然不以為取將以順道不以為巳萬物歸之為天下宰為無為篇神明之數自然之道無不生無有不生有不無不有乃生無有由此觀之憂不生憂喜不生喜不憂不喜乃生憂喜故居禍者得福居福者得禍禍福之主在於無首為之無形聽之無聲無形聲則深逺故無功之功大而有功之功小有德之德薄而無德之德厚是以聖人不為有不為無不為死不為生游於無有之際處於生死之間變化因應自然為常故不視而明不聽而聰扶安天地飾道養神提挈萬物帝國治民解情釋意俱反始真不為生業不為起事不加以仁不施以利教以不能導以無識絶民所樂以順民情縱民所惡以得民意也出夭傷之戸入長生之路翺翔𤣥冥優游太素昧昧芒芒莫知其故敦若昬晦天下無事味之於無味察之於無形故能分同異之𩔖明是非之情為之未有定之未傾勇功不見智名不稱福不得起禍不得生無福之福興於無聲無禍之禍息於無名主安民樂天下太平故生患而憂之長福而求之戮君而死之辱父而讐之造難而折之作亂而滅之召㓂而殺之招逆而伐之勇功見而與天違智名興而與道反動而民悦者勞而徳小為而民喜者為而恩少是以忠信沮壊正事消亡自然伏竄知故翺翔竊功者顯偷權者彰暴亂者利邪偽者昌是非覆逆天下大傾物失其命家國以䘮故善除患者不若無患之大也起事致治者不若黙然者之貴也是以君子動未始之始静無無之無布道施德變化於𤣥怒於不怒言於不言攻於不敢守於無端威於不武報怨未萌圖難於易治其夲根絶之未兆使不得然事不秋毫功如太山為大於細治之緜緜敬而慎之若始若新不為所欲不求所便常與事反獨守其元與時俱益日進無彊雖欲不大事物自然是故大難之將生也猶風邪之中人未然之時慎之不來在於皮毛湯熨去之入於分理㣲箴取之在於藏府百藥除之入於骨髓天地不能憂而造化不能治夫大事之將興也猶水之出於山也始於潤濕見於漣漣綿綿涓涓流為溪谷汨汨湯湯濟舟漂石以成江海深大不測是以聖人之建功名也微故能顯幽故能明小故能大隐故能彰志在萬民之下故為君王威振宇内四海盡匡懸命受制莫有能當德與天地相參明與日月同光故言多諾者事衆而信不可然也心多所易者難積而變不可推也是以聖人心黙而不動口黙而不言目黙而不視耳黙而不聽動如天地静如鬼神不為而成不言而信進則無極退則不窮身無纎介之憂國無毛髪之患夫何故哉危於不危亡於不亡昭然獨見運於無形其安易持篇未疾之人易為醫也未危之國易為謀也萌牙之患易事也小弱之禍易憂也何以效之荘子曰任車未虧僮子行之及其傾覆也顛高隨谷千人不能安卵之未剖也一指麾之及其為蜚鴻也奮翼凌雲罾繳不能連也胎之新乳也一繩制之及其為牡也羅網不能禁也虎也執羣獸食牛馬劍㦸不能難也故漣滴之流乆乆而成江海小蛇不死化為神龍積微之善以至吉祥小惡不止乃至滅亡是故繼體之君無怨無惡將相和一百姓賔伏鄰國交市無有讒賊平易不動上下和集當此之時守之不用威持之不用力無為無事莫之能克及至國家將危萬民將殆患害將興萌而未兆當此之時安危在己不在於彼謀之不必聖人憂之不必力士正之於枕席而患禍已亡矣及至人君失道大臣怨懟鄰國不市百官衰廢禍患巳生小弱柔毳當此之時賢人深謀生事起勢未動而患危不加而禍碎及至人君失正大臣謀誤鄰國怨恨百姓猶豫患禍已起根夲末據姦雄將興未得人助或合而不結或結而不固當此之時尊賢下衆折肝膽聽微諫求過於巳患心不怨謀士底兵未發而㪚故禍福作於無名存亡生於微玅二者雲錯變動風號屈伸波渾進退殽亂聽之不可聞視之不可見機巧不能事智慧不能判是故聖人化之以道教之以身為之未有治之未然不置而物自安不養而物自全動與福同室静與禍異天窅窅冥冥莫覩其源治之未亂正之未傾禁奸之夲制偽之端閉邪之戸塞枉之門萌芽未動形兆未生絶之未見滅之未存教以無教道以無名知以無知狀以無形治不得起亂不得生天下無為性命自然夫太山之木夲據於隂末託於陽垂枝布葉華實靑青大而合抱高連百尋者生於無大成於不為九重之臺廣大擬於丘陵百仭之髙昭昭冥冥干於青霄者以為卑小不為高大也故為大者不大為小者不小為髙者不髙為卑者不卑不大不小乃生大小不高不卑乃生髙卑故為之者不為之跡也不為者為之塗也是以為成者敗為利者害為生者死為興者廢執所欲者所欲亡執所思者所思逝執其身者其身殁執其神者其神退故聖人無為為之以生萬物無執執之以制所欲猶工匠之造髙臺而天地之生巨木自然而已夫道德不嫉神明不賊和無不通大無不克存亡自從吉㐫自得人窮事敗者釋自然而任智力去其反而處其覆夫何故哉以求所求而欲所欲夫誠能慎終如始為所不欲守所不處動於未元反於未始為若不為有若不有雖若不成物自然也夫使神擾精濁聰明不逹動失所求静䘮所欲者貨與學也唯能鍊情易性變化心意安無欲之欲樂無事之事者道與德也是故想道如念親惡貨如失身思無思之思求無求之求明白四逹以學不知巧雕萬物以學不能反衆人之所務而歸乎虚無欲不欲而造虚𤣥學不學而窮玅極逹人之所不能通窮人之所不能測成人之所不能為有人之所不能得心志𤣥𤣥形容睦睦卧如死尸立如槁木不思不慮若無所識使物自然令事自事空虚寂泊身無所與萬物紛紛各如其處魁如阜褐澹如巨表舉措廢置常與物反萬物應之故能深逺天下大覆與神運轉輔天助地不敢生善善為道者篇道德神明清濁太和天地人物若末若根數者相隨氣化連通逆順昌衰同於吉㐫道德之意天地之心安生樂息憎惡殺傷故命聖人為萬物王利物受其福不利則獲其恐聖人大懼恐後有患深原所由莫善自然自然之福要在無形何以明之荘子曰夫天地不知道德之所為故可為然也萬物不覩天地之所以故可存也萬民不識主之所務故可安也四肢九竅不諭心之所導故可全也夫萬物之有君猶形體之有心也心之於身何後何先流行血脉無所不存上下表裏無所不然動與異事虚以含神中和外否故能俱全是以昔之帝王經道德紀神明總清濁領太和者非以生知起事開世導俗務以明民也將以塗民耳目塞民之心使民不得知歸之自然也是以立民於昭昭而身處乎混冥教以不知導以無形孝悌不顯仁義不彰君王無榮知者無名無教之教洽流四海無為之為通逹八方動與天地同節静與道德同容萬物並興各知其所名實俱起各知其當和氣流通宇宙童蒙無知無欲無事無功心如木土志如死灰不覩同異不見吉凶故民易治而世可平也是故安者民之所利也生者民之所歸也民之所以離安去生而難治者以其知也民知則欲生欲生則事始事始則功名作功名作則忿争起忿争起則大姦生大姦生則難治矣故以知為國則天下智巧詐偽滋生竒物並起嗜欲無窮奢淫不止邪枉纎纖豪特争起溪谷異名大禍興矣臣惑其主子亂其父以白為黒以亡為有名變實異刼殺生矣恍恍不可安易易不可全卷甲輕舉海内相攻死者無數血流成川悲痛怨恨氣感皇天星辰離散日月不光隂陽失序萬物盡傷山枯谷竭赤地數千天下窮困至於食人非天之辜上好智能而教萬民也廢棄智巧𤣥德淳朴獨知獨慮不見所欲因民之心塞民耳目不食五味不服五色主如天地民如草木巖居穴處安樂山谷飲水食草不求五知母識父不覩宗族沌沌偆偆不曉東西男女不相好父子不相戀不賤木石不貴金玉叢生雜處天下一心八極共㫖九州同風蠧蟲不作毒獸不生神龍與人處麟鳳游於庭翔風醴泉涓涓甘露漠漠朱草榮榮嘉禾豐茂萬物長生非天之福主知不知而名無名也是以覩知識愚與道同符知愚知智與道同㫖政教由之或病或利明於病利太平自至明於利病萬物自正是故愚智之識無所不免清天寧地為𩔖隂福衆庶莫見故曰𤣥德𤣥德深矣不可量測遠矣不可窮極與物反矣莫有能克𤣥德之淪罔蕩軼遁恍惚無形反物之務和道德導神明含萬國總無方六合之外毫之内靡不被德蒙仁以存性命命終天年保自然哉江海篇道德不生萬物而萬物自生焉天地不含羣𩔖而羣𩔖自託焉自然之物不求為王而物自王焉故天地億萬而道王之衆陽赫赫而天王之隂氣漻漻而地王之倮者穴處而聖人王之羽者翔虚而神鳳王之毛者蹠實而麒麟王之鱗者水居而神龍王之介者澤處而靈龜王之百川並流而江海王之凡此九者不為物主而物自歸焉無有海式而物自治焉不為仁義而物自附焉不任智力而物自畏焉夫何故哉體道合和無以物為而物自為之化是故江海之王也非積德政累仁愛流神明加恩恵以懐之又非崇禮義廣辭讓飾智故設巧能以悦之也又非出竒行變起權立勢奮武揚威重生累息百事以制之也清静處下虚以待之無為無求而百川自為來也百川非聞海之羙被其德化歸慕之也又非拘禁束教有界道畫東西而趨之也然而水之所以貫金觸石鑚崖潰山馳騁丘阜以赴隨江海無有還者形偶性合事物自然也由此觀之卑損之為道大矣百害不能傷知力不能取不戰而强不威而武黙然無為與萬物市夫溪谷為卑不為東西故能逹而不窮江海處下不為廣大故能王而不休是以明王聖主之欲尚民也以自然之性盛德之容恩卑辭敬比於庶人視身如地奉民若天昭然獨知而不可測卓爾獨能而不可源深察博逹而不可塞聰明並流而不可壅不以役物反以後民故民履之如地託之若神常在民上王土配天其欲先人處窮寵秉至尊長生乆視樂以無患則去志無身以安萬民身勞而民佚身後而民先在上而民以生在前而民以安民以生故戴之而不以為重民以安故後之而不以為患是以天下推而上之引而先之喜而不倦樂而不厭故聖人之王也非求民也民求之也非利民也民利之也非尚民也民尚之也非先民也民先之也故能極敝通變捄衰匡亂以至太平上配道德下及神明淪唐唐含冥冥馳天地騁隂陽夫何故哉以去心意而後其身也是故不争之德因人之力與道變化與神窮極唯棄知者能順其則故王事自然不得妄起得之全命持之有理聖知有性治之有道失其理則王事不成去其道則性情不則是以聖人信道不信身順道不順心動不為己先以為人無以天下為天下争為之臣天下謂我篇物有同而異有異而同有非而是有是而非此君子之所以無患而衆庶之所以憂悲也何以效之莊子曰夫日月之出入也同明人之死生也同形春秋之分也同利𤣥聖之與野人也同容通者之與閉塞也同事道士之與赤子也同功凡此數者中異而外同非有聖人莫之能明是以天下嫌疑炫耀結搆紛謬是非是以聖人似不肖夫何故哉得道之士外亡中存學以變情為以治巳實而若虚渾渾冥冥若無所以容䟽言訥貌樸而鄙情逹虚無性通無有寂泊無為若無所止遁名逃世與神臥起執道履和物無不理不合時俗與天地友衆人僣為以直為醜殊途異指謂之病矣夫小人則不然博學多識以釣智名異行顯功以疑仁賢詐世治俗飾辭盛容卑體阿順以揄愛恩先指承意以獲衆心朋黨相結多挾賊人勞鮮而祿重功寡而爵尊國貧而家富主㣲而身貴勤權生變竊乘盛勢名號隆盛震動境外憍奢暴逆縱恣不制順心而卑情忤而奪動䘮民命静生物穢張目而物傷開口而民害此時俗之所榮而世之所謂肖者也若然者道德所離神明所去天地所憎隂陽所惡物𩔖不比民人不附動無所不終静無所不得生為患害死為福喜衆俗迷妄漫以相導所患者微其日甚乆故得道之士則不然體虚積慈視物如巳檢形促容歸於纎微𤣥黙託後不為物先合和順理以應自然動静與衆反出入異門戸不以勇勇故不怒而天下恐不以廣廣故不施而天下往不以先先故不言而天下長是故出慈入勇出儉入廣釋後且先反和逆神動違自然福與之逺禍與之隣大命以絶神氣㪚分天地不能安道德不能存臨死不覺怨命尤天非命薄也非人賊也安憍樂勢廢道而尚力也夫慈之為行也甚和以真動得人力静合天心卑損弱小為萬物君匡世救俗和順天人戰不可敗守不可攻夫何故哉天地並生變化無窮方戰之日地為之動天為之震天降變怪地出風盲鬼神並見為敵起殃祐我將相助我萬民怒我士卒以至羣生牛絶其紖馬絶其糧飛禽拊翼獸下而行虎兕可戰攫鳥可將敵人驚恐伏甲受兵故賢佐聖將之立身也不强不大不堅不剛柔弱畏武敵即消亡戰則損心外意崇體和平辭小託後動静應天不以愠起怒不以武興兵其欲勝敵常以反行計運無形以收敵神動因彼之所有變因彼之所為反之覆之以處其竒故使彼邪我正彼言我聽彼怒我喜彼動我静開其所利以利其命用人則下之以言示之以利陳之以誠使之自至是以不争不求以得民意以順民心秉其要忌彼人離㪚而我順比敵欲不亡而不能我欲不存而不得當此之時道為之無德為之始神明為經太和為紀清濁為家萬物為子三光為佐四時為輔静為物根動為化首物𩔖託之無有患咎德與天齊乆而不殆自今及古聖智之道變化終始自天而王皆由此矣道德指歸論卷五
