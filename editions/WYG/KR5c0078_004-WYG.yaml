body:
  text: 道德指歸論卷四漢嚴遵撰含德之厚篇道德虚無神明寂泊清静深㣲太和滑淖聽之寂寞視之虚易上下不窮東西無極天不能裹地不能囊䂓不能員矩不能方度不能度而量不能量金玉不能障蔽水火不能壅落萬物莫之能領禍患莫之能作沈浮翺翔渾沌磅礴心無所棲形無區宅陶冶禀授萬天以作羣物得之滋滋啞啞知慮不能得有為不能獲思之愈逺為之益薄執之不我擒縱之不我釋唯無欲者身為之宅藏之於心故曰含德夫德之在人猶父母之於身也其於萬物猶珠玉之與瓦鉛也是以含德之士重身而輕天下猶慈父孝子不以其有易其鄰大身而細物者猶良賈察商不以珠玉易瓦鉛也其無欲也非惡貨而好亷也天下之物莫能悦其心也其為虚也非好靜而惡擾也天下之事莫足為也夫何故哉所有重而天下輕也明於輕重之稱通於利害之變故萬物不能役而天下不能徭也故不為虚而虚自起不為靜而静自生不休神而神自定不和氣而氣自平是以不聽而聞無聲之聲不視而見無形之形不思而領是非之意不慮而逹同異之鄉神淪天地德遵隂陽不請福而天地祐之不辭禍而患害去之不殺戮而天下畏之不施與而天下愛之鼓腹而樂俯仰而娛食草而美飲水而甘喬木之下精神得全巖穴之中心意常欣貧樂其業賤忘其卑窮而恬死困而忘危功與地配德與天齊反愚歸昧比於嬰兒是故建身為國誠以赤子為容則是天下尊道貴德各重其身名勢為垢萬物為塵貪夫逃爵殘賊反仁積柔集弱唯德是修而作福生亂者有何由然悲夫天地之道深以逺玅以㣲能誠之者寡行之者希智慧不能得唯赤子為體之夫赤子之為物也知而未發通而未逹能而未動巧而居拙生而若死新而若弊為於不為與道周宻生不生之生身無身之身用無用之用聞無聞之聞無為無事無意無心不求道德不積精神既不思慮又無障截神氣不作聰明無識桑弱虚静魂魄無事樂無樂之樂安無欲之欲生不枉神死不幽志故能被道含德與天地同則蜂蠆蟲蛇無心施其毒螫攫鳥猛獸無意加其攫搏骨弱筋柔握持堅固不睹牝牡隂陽以化精神充實人物並歸啼號不嗄可謂志和為之行之與道為常執之守之時曰聰明自然生息動合百祥心意互作氣順堅强無所為故無所不克無所欲故動無所作自然通逹衆羙萌生天地愛祐禍亂素亡夫何故哉以含德和神而體童蒙也及其有知也去一而之二去晦而之明身日飾而德日消智逾多而迷益深故重天下而輕其神貴名勢而賤其身深思逺慮離㪚精神背柔棄弱力進堅剛陷於欲得溺於求生開於危殆塞於萬全故福如天地視而不能見禍若雷霆聽而不能聞出無入有日造禍殃動而之窮為而之亡脩身愛國為國不祥祭燎而天地是伐禱祀而鬼神是䘮非命之罪事物自當也知者不言篇道無常術德無常方神無常體和無常容視之不能見聽之不能聞旣不可望又不可捫故逹於道者獨見獨聞獨為獨存父不能以授子臣不能以授君猶母之識其子嬰兒之識其親也夫子母相識有以自然也其所以然者知不能陳也五味在口五音在耳如甘非甘如苦未苦如商非商如羽非羽而易牙師曠有以别之其所以别之者口不能言也故無状之狀可視而不可見也無象之象可效而不可宣也無為之為可則而不可陳也無用之用可行而不可傳也故得道之人見之如子之識親履之如地戴之如天被之服之體之如身為之行之與之浮沈與之臥起與之屈伸神與化游志與德運聰明内作外若聾盲思慮互起狀若癡狂故口不能言而意不能明也譬猶夢為君王履危臨深憂喜相反中心獨然覺而道之不能以喻其鄰也失道之人則不然見其外不覩其内識其流不獲其源秉其末不窮其根然其所以然不然其所不然故道在於外不在於身中主不定守不固堅心狐志疑情與物連聰明眩耀以偽為真若是若非若亡若存和氣易動若病在人陽泄神越惡黙好言方言之時心有所慮志有所思聰明並外精神去之音聲内竭外實有餘道德離散日日逺之言之益疾而已愈不見造之益衆而已愈不知是故言者逆道之要也而距德之數也反天之匠覆地之具也是故得道之士損聰棄明不視不聽若無見聞閉口結舌若不知言挫其鋭釋其所之意無所守廓似無身解其所思散其所慮奄若不知匿若獨存滅禍無首反於太素容貌不異服色不詭因循天地與俗變化深入大道與德徘徊無言以言言無為以為為清静以治已平和以應時與世渾沌與俗𤣥同要物之夲秉事之根獨與衆異天下莫聞遊於親疎之戸翺翔利害之門浮於貴賤之野固守我之精神遁隱無形之境放佚荒蕩之鄉貧賤不以為辱冨貴不以為榮欲隐而隱欲彰而彰隂陽不能損益人主不能蔽明魁然獨立卓爾無䨇聲色不能悦五味不能甘萬物不能與之争知力不能與之訟無取無與無得無去閉門杜戸絶端滅緒神明為制道為中主動與化隣静與然交和順時得故能長乆佚蕩無常莫能先後故好之不能近惡之不能逺賞與不能加賦税不能取爵禄不能高貧賤不能下無柰萬物何故萬物不能役無以天下為故天下不能有也以正治國篇道德之情正信為常變化動静一有一亡覆載天地經緯隂陽紀綱日月育養羣生逆之者死順之者昌故天地之道一隂一陽陽氣主徳隂氣主刑刑德相反和在中央春生夏長秋收冬藏終而復始廢而復興陽終反隂隂終反陽隂陽相反以至無窮故王道人事一柔一剛一文一武中正為經剛柔相反兵與德連兵終反德德終反兵兵德相保法在中央法數相叅故能大通是以明王聖主損欲以虚心虚心以平神平神以知道得道以正心正心以正身正身以正家正家以正法正法以正名正名以正國正國綱紀分明察理元元夲本牽左連右參伍前後物如其所正名以覈實審實以督名一名一實平和周宻方員曲直不得相失賞罰施行不嬴不縮名之與實若月若日一名正而國家昌一名竒而國家役養國之宻無有所常屈伸取與與時俱行繼亂任法遭遂任兵守平以道體德為常大小相遇以正相望失正則化之不從則禁之不止則制之不伏則伐之若夫小國迫於大國之間遭無道之君以正事之不可則去之去之不可則割地而予之予之不可則率衆而避之避之不可則杖䇿而遁之遁之不可則患及萬民禍將及我故奮計而圖之是争之所為起而兵之所為生也吾欲𨕖將練士砥礪甲兵積糧高壘營而自守百姓糜弊國家空虚是戰之所為作也而正之所為興也吾欲以正入則我寡而彼衆我弱而彼强如卵投石為敵受殃三軍必敗士卒死傷天心不得宗廟滅亡下悲萬民之命上畏天地之心是權之所為動也而竒之所為運也故建往反之計招覆來之事開萬民之心生諸侯之謀明我道德之祐開我天地之助以渾四海之心同萬國之意百姓應我若響鄰國隨我若影飛鳥走獸與我俱往是計之所為用而竒之所為行也上順道德之意下合天地之心危寧利害視民若身體無形之形處太隂之隂發無為之為揚無聲之聲異彼滅化之罪明彼逆天之功顯天之所降見地之所生有名無實有實無名名實相違或正或傾縱横反覆合於冥冥天災自起妖孽自生離其父子絶其弟兄殺其雄將戮其忠臣天下怨恨莫與同心魁然獨立受天之兵戰勝大喜四海安寧此用竒之上也慉天下之怒積能竒之人飛耳游目延聰益明游士四逹結友合親生息變怪因道應姦餙權養勢以實其民飛言儛事以惑敵人卑辭降下以閉其君輕使重利以開其臣君臣有隙因制其神變作於隂權動於㣲懸其死命因其樞機使敵狂惑不得有為隨時進退無有常儀不攻而敵自詘不戰而敵自危尅其君不及其臣誅其將不及其師戰勝民喜諸侯畏之此用竒之次也制其地形御其君臣卑體重賞以順其外隂謀雲布以亂所親姦從彼來道從此興數城而封將連國以予姦姦來如鬼謀計如神方畧不測竒變不窮分彼之力疑彼之心如出於地若生於天離其左右㪚其相連起權生變以制其死阻其計謀使不得信折其强輔以孤其志因形立勝如環無端乘時而發和之為恒動攻其害静絶其糧禠而奪之飢而渴之重而累之水而火之勞而苦之凍而暍之利而誘之狂而惑之卒而迫之窘而薄之從高擊下以衆制寡堅校部曲官隊相伍上護其下下求其上三軍相保親如父子竒陣分合隱伏叅處營前經後凌左敗右耀以旌旗惑以金鼓進如波騰退如風雨發如崩潰合戰如虎守不可攻攻不可守戰勝威行天下大恐此用竒之下也禍亂旣夷萬物豐寧天心大得宇内欣欣藏竒損智忠信為務清静簡易退事止言夫何故哉道德變化無所不生物有高下指嚮不同趨舍殊謬或西或東各推其性以活其身吉人以善足㐫人以惡傳誠人以信顯邪人以偽容各効其知以避禍㐫求而不贍智者詐生勞而不息忠者起姦拘迫慘怛信者馳謾窮困不已賢者不仁故主好智則民偽主好利則民禍主好賞則民困主好罰則民怨何則事由於主行之在臣賞出於主財出於民法出於主受之在臣主有所欲天下嚮風故用心思公不若無心之大同也有欲禁過不若無求之得忠也喜怒時節不若無為之有功也思慮和徳不若無事之大通也明於俞跗之術岐鵲之數以治之不若使世無病之德豐也挾黄帝太公之慮秉孫吳氏之要以勝之不若使天下不事智力之不營也故道徳之所生愛不能利也天地之所成為不能致也唯無愛者能利之唯無為者能遂之是故明王聖主無欲無求不創不作無為無事無載無章反初歸朴海内自寧何以明之荘子曰夫起福生利成功遂事傋物致用使人大冨天下奢僣財貨不足民人愈醜福滿山澤金玉成積國愈不安民益少利飾智相愚以詐相要防隄邪淫姦偽之路宻分别同異是非之變衆則國家昬而政事衰作方遂伎雕琢文彩竒變異怪以褒有德以别尊卑巧故滋起俊出愈竒令速賞深罰峻刑嚴鑿肌膚斷四肢䟽逺不隱親近不和罪至夷滅賞至封侯天地振慄盗賊愈多故聖人之言云我無為而民自化夫何故哉主者天下之心也氣感而體應心動而身隨聲響相應形影相隨不足以為喻是故人主誠為無為之為則天下之心皆無所之被道含德無思無求無令無法萬民自化人主誠能事無事之事則天下無效無象無知無識不賞不與萬民自冨人主誠能安無静之静樂無清之清則天下不學不問無聞無見無刑無罰萬民自正人主誠能欲不欲之欲則天下心虚志平大身細物動而反正静而歸足不拘不制萬民自朴故人主之政不孝不仁不施不予閔閔縵縵萬民恩輓墨墨偆偆好惡不别是非不分故得所欲性命以全人主之政布德施利明目察察萬民昭昭皆知禍福孝悌仁義萬事差别偟偟知偽缺缺故失所安性命夭絶福生於禍禍生於福福之與禍同營異域俱亡俱存異情同服相隨出入同來異極非有聖人莫能獨得故去福則無禍無禍則無福無福之福至㣲𤣥黙天下好智莫能窮極唯無為者能順其則正在禍福之間無所不剋失正則竒生竒生而民惑善人為妖是非反覆天下大迷而不復也方而不割篇道無不有而不施與故萬物以存無所不能而無所為故萬物以然何以明之夫道體虚無而萬物有形無有状貌而萬物方圓寂然無音而萬物有聲由此觀之道不施不與而萬物以存不為不宰而萬物以然然生於不然存生於不存亦明矣故王者興師動利則民欲民欲而以方方則割以割為方則邪者進而方者退忠臣蒙其毒萬民受其害貴貨則民求民求而以亷亷則劌以劌為亷則貪者顯而廉者敝忠臣蒙其咎而萬民受其敗開争則民曲民曲而以直直則肆以肆為直則枉者翺翔直者深伏忠臣蒙其禍萬民受其敗上好名則民偽民偽而以光光則耀以耀為光則大德隠而小惠章忠臣蒙其死而萬民受其殃數者以施貨流情通所以謂方者不方亷者不亷直者不直光者不光名繆實易正失德亡人主獨立臣下雙身養主之意阿主之心塞主之聽蔽主之明此國之所以危而宗廟之所以䘮也是以明王聖主獨有而不與也獨知而不教也獨能而不使也方於巳而不以也亷於物而不有也直秉天心而不恃也德光四海而不怙也夫何故哉去福以方使下自公割於不割使民不訟事情自逹萬物以通莫為之吉莫為之㐫天下蕩蕩莫云其常非不割也割剥伐撃誅驕制暴而無瘢創也去貨以亷使下自平劌於不劌使人無争貪叨者息潔白自生莫之為濁莫之為清名不虚諡實不倚傾非不劌也善亷羙讓章含顯盗而辨無藏也去争以直使下自剋肆於不肆使民自伏匡邪振亂化滛矯俗莫之為禍莫之為福天下荒荒萬物自得非不肆也舉正揚直表過章惡貶邪削枉明人之失天下盡正而動無聲也去名以光使下自當耀於不耀使民自明莫之為照莫之為冥天下渾渾萬物資生德與天比化與道同非不耀也德光四海照萬物而化無形也上下相象中表相應出入無朕往來無間若影之與形響之與聲故治國之道生民之夲嗇為祖宗是故明王聖主損形容卑宫室絶五味滅聲色智以居愚明以語黙建無狀之容立無象之式恐彼知我藏於不測故未動而天下應未命而萬民集未戰而素勝之未攻而天下服是以不勤勞而民有功不分争而得其職不刑戮而萬民畏不㣲玅而得天福禍亂不生羣祥並集無為而無不成不争而無不剋故萬物𤣥同天下和洽浮沈軋軮與道相得若終而始若亂而紀虚而實無而有䟽而宻遲而疾無形影無根朕彷彿渾沌莫知所以獨知獨見獨為獨不變化無常畜積無府隂陽離合屈伸張弛冥冥窅窅芒昧𤣥黙魁如天地不可窮極自修有餘故能有國治人理物子孫不絶夫何故哉以其嗇也為嗇之道不施不予儉愛㣲玅盈若無有誠通其意可以長乆形小神大至於萬倍一以載萬故能輕舉一以物然與天同道根深蔕固與神明處真人所體聖人所保也治大國篇日昃隂生燥至風起谿谷小動海波大興高以相臨差以百尋者以其形大故也千之岸萬丈之崖物𩔖登之崖隤下顛蚊䖟螻蟻適足以游翔而犀象虎豹之糜骸者以其形重也飄風隆盛發屋折木石鐵飛揚山陵崩弛而人血脉不為之傷者以其暴大也隙宂之風不動眉及其中人也生百病而成死亡者以其纎芥也夫大國者江海犀象之徒也而德化者飄風隙穴之𩔖也故其福不可大生也其利不可暴興也其善不可大處也其惡不可大䘮也大生之則大亡暴興之則暴傾大處之則大去大䘮之則大至何以明之荘子曰夫飢而倍食渴而大飲熱而投水寒而入火所苦雖除其身必死胷中有瘕不可鑿喉中有疾不可剥也蟁䖟著面不可射也蟣虱着膚不可斫也何則欲除小患而生大賊也是以明王聖主之治大國也若柄纎㣲若通小水若察秋毫如聽無有若亡若存若非若是如行如畱如為如休為在為不為之域化在有無有之野福㣲利鮮言希禁寡動於無形功流四海夫何故哉以道為父以德為母神明為師太和為友清静為常平易為主天地為法隂陽為象日月為儀萬物為表因應為元誠信為首殊分異職繩繩𤣥黙引總紀綱舉大要而求之於己是以民如胎鷇主如赤子智偽無因而生巧故無由而起萬物齊均莫有盈損和洽順從萬物豐茂鬼神與人合而俱市動於自然各施所有寂如無君泊如無鬼萬物盡生民人盡壽終其天年莫有傷夭主若不仁鬼若不神主非不仁也兼施博愛德運六合而無阿憐也鬼非不神浮於恍惚載於纎㣲經歴萬方與時變化神全萬物不以傷人也非不傷人聖人在上與天相叅人物順比大化流行知故不作竒物不生莫之為滿莫之為盈天下喁喁萬物齊均既不起高又不造深不攻金石不壅水泉人不逺徙食不煞生世皆可賞莫之可刑草木黄而後落人化盡而後終是故天之所胞地之所函太一之所生天一之所將四時所歸五行所監羣臣毒害變化運行各有分部不得相干周流萬物莫之可傷是故鬼神治隂聖人治陽治隂者殺偶治陽者殺竒虚無清静鬼神養之纎㣲寡鮮鬼神輔之盛壮有餘鬼神害之盈滿亢極鬼神殺之不屬其𩔖聖人奉之忠信順善聖人與之雄俊豪特聖人察之作變生竒聖人殺之故動於隂者鬼神周之動於陽者聖人制之唯無所動者莫能敗之聖人在上竒不得起詐不得生故鬼以其神養物於隂聖人以其道養物於陽福因隂始德因陽終鬼神降其澤聖人流其恩交歸萬物若性自然流道沈德洽和同真大國篇天地並起隂陽俱生四時共夲五行同根憂喜共戸禍福同門故所以為寧者所以為危者也而所以為危者所以為寧者也所以為存者所以為亡者也而所以為亡者所以為存者也何以明之夫虎豹以其形容脩廣爪牙堅强肌膚盛大毛物豐文章明故執百獸而制於人榮華香草以其所有光曜芬香故悦於衆俗而傷其根大國之君以其地廣民衆勢尊形寵威隆名顯故張其鄰國而危其身有道則固於盤石寧於太山失道則危於累卵輕於鴻毛俱弱則先困俱亂則先亡是故大國者霸王之梯而亡滅之階也是以大國之君獨立無偶名山四塞三面成阻鴻川並流萬物浮下為諸侯轂膏之府强大之尸權勢之主偕不測之固要阨狹之口肥饒廣易方數千里珍寳竒怪無所不有民鮮徭役牛馬從處舟輿萬數兵食陵衆居者安樂過者留止人如草木畜滿山野耕桑田獵得獲深倍故天下之所欲歸將相之所欲附車騎奮擊帶甲百萬處易守險形便地利順天而攻順地而守懸人之命制人之死與之則有勢背之則失宗廟故諸侯之所欲交天下之所畏也施道足以并兼尊寵足以發號伐之足以崇仁治之足以明義兼之足以廣地得之足以為富故諸侯之所好而將相之利也是故自古及今天下之牝以静勝牡千世不易萬世不變夫何故哉以虚受實以無應有不以為大務以為小不以為髙常以為卑也是故明王聖主之處大國也施而不以置下而不以求地裹諸侯之國而無所不畏德包諸侯之力而無所不事折節下之以附人意忠亷誠信以先士吏割地東西以招賢俊疾耕力織以裒畜積結縱連横以戒不虞發倉庾散財幣養耆老食孤寡振窮逹困顯巖穴之士受而不取授而不予柔弱簡易無為而處諸侯雖有貪鄙殘賊驕矜恃力不好順從欲圖逆者猶以文武之勢威德之重静而下之則彼修身慎行改過自新割地獻寳歸命殺身請為子弟之國藩牆之臣其處小弱也因道而動修理而行冨以舟輿實以甲兵忠順誠素尚朴貴耕耕織有分不取民有上下和集親如父子君如腹心民如形體國專和一可與俱死上下順從可與鄰市大國之君雖負衆强上權右勢左德下仁心如飢虎怒如湧泉不好施予常欲吞人猶以得天之心獲民之意將相誠信鄰人之助發源泉之敵揚不測之威辱身厚體竭誠懸命欵欵惓惓事以清静彼神感精喻心釋意壊怒移禍徙與我為妖上而取人者形大勢豐德博權重人之所利也下而取於人者地狹民少權重德鮮人之所易也故不戰而壊人之邑不攻而降人之城地廣號尊宗廟顯功德流是大國之所期也友於大國接和結親歳有災害則大國憂之鄰國難至則大國求之屈一人之下伸萬人之上社稷尊宗廟顯國富兵强人物全濟延於無窮小國之所願也故接地鄰境懸權不動先下先得卑者制倨静者勝躁處大之勢小下大得夫何故哉自然之道不可强制水動流下人動趨利釋下任事衆弱為一出於不意此强大之所以亡也故大冝下之道德指歸論卷四
