body:
  text: 道德指歸論卷六漢嚴遵撰用兵篇道無不有有無不為體和服弱括囊大威生育羣𩔖莫有能違無有形象為萬物師得之者安失之者危天地體之乆而不衰何以效之莊子曰夫隂而不陽萬物不生陽而不隂萬物不成由此觀之有威無德民不可治有德無威宗廟必傾無德無威謂之引殃遭運時變身死國亡故人主者國之腹心也兵者國之威神也夫天地之間萬國並興小大愚智皆願為君智盡而服力屈乃窮非有餘力而屈樂為人臣也是以明王聖主放道效天清静為首和順為常因應為始誠信為元名實為紀賞罰為綱左德右威以應不祥天下仰制莫能毁傷故國可保而民可全也夫德之與兵若天之與地隂之與陽威德文武表裏相當隱之𤣥域不得已而後行故人君失道好戰自損正事不修邪事作起强大憍奢紀滅綱弛雕琢宫室盈飾狗馬高臺大囿聲色在後刳屠忠諫尊寵姣好簡傲宗廟欺侮諸父殘賊暴虐孤人稚子反逆天地刑戮隂陽黥劓道德破碎神明和順潰濁變化不通冬雷夏霜萬物大傷縱横擊摶謀圖不祥大國驚怖小國奔亡老弱離散啼哭而行天下憤怨萬民思兵相率而起我為後行夫何故哉唯彼先祖皆有神明之德通於天地聖智之勞加於萬民故剖符丹書受土賜姓列為君王光顯祖考業流子孫是天地之心萬載之功而繼體者不務屈身厲節摩精鍊神修道行德以奉其先乃忽小善而易小惡日以消息月以陵遲宗廟崩弛國為丘墟族𩔖離㪚長無所依鬼神孤魂無所棲息乎嗟夫豈不哀哉是以喻我豪俊説我士卒卷甲釋兵且令休息激役心移幸於反覆改過自新變容易則遂往不反為天下賊百姓窮極財殫力屈海内之憂日以長息蒼天降應禍集其國雖欲未誅自然不得天人同心我不能剋故事為而神否身往而志還形反我志事逆我身悲彼先聖傷彼萬民無罪於天遇此何辜雖曰忽然民命在兵發號申令效以信誠先服者賞後服者傷小下者利大下者昌壊邑者爵降城者封城邑不下未剋勿䘮有罪者免有能者官老弱得養死者得塟德澤洽潤恩愛流行慈惠和結衆情發揚黙然為之神氣相通彼三軍與我同心姦為我使盗為我工教我以其計慮告我以其地形因彼所有竒變乃通法律不苛險阻虚空天人相得勝出若神前無留敵計謀不䘮敵雖衆多與我搆因兩軍相距前若無人我雖萬全敵不可易易敵生姦亡時失利福去禍來為天所疾是故雖獲天祐得人之助猶守之以憂持之以畏出險乘虚宿舍有備休息處便必依水草填隙塞惡與敵相距變運無形竒出無朕錯勝無窮攻戰無有深㣲窅窅變化無始自我親近不知我之所為彼之知力何得於巳故在家者晏然而樂在師者欣然而喜人懐至誠若為其子去家越境若衆趨市疾耕力織暮休早起竒入模列不敢獨有以供師徒如奉父母懸權争勝敵人不起未戰而海内正不攻而諸侯下天地所覆載日月所照覩皇皇莫莫各安其土夫何故哉慈哀發動因天之心不敢由於我也言甚易知篇夫無形無聲而使物自然者道與神也有形有聲而使物自然者地與天也神道蕩蕩而化天地黙黙而告蕩而無所不化黙而無所不告神氣相傳感動相報反淪虚無甚㣲以玅歸於自然無所不導故言言之言者自然之賊也為為之為者䘮真之數也無為無言者成功之至而長存之要也是以聖人言不言之言為不為之為言以絶言為以止為絶言之道去心與意止為之術去人與智為愚為慧無知無欲無欲則静静則虚虚則實實則神動歸太素静歸自然保身存國富貴無患羣生得志以至長存此言之易知而事之易行者也而天下莫能知莫能行也夫何故哉世主好知務順其心不覩大道不識自然以為為為以言言言息知生事以趣所安䆮以為俗終世被患性變情易深惑逺迷精濁神擾外實内虚强黙生咎强静生患故視之而不見告之而不聞非以自嫉以為不然夫聖人之言宗於自然祖於神明常處其反在黙言之間甚微以玅歸於自然明若無見聽若無聞通而似塞逹而似窮其事始於自然流於神明常處其和在為否之間清静柔弱動作纎微間易退損歸於無為虚無以合道恬泊以處生時和以固國𤣥教以畜民養以無欲導以自然贈以天地賜以山川富以年歳貴以有身虞以無憂寧以無患無欲之不得無樂之不存民若無主主若無民忘於智力依道倚天萬國和順并為一君是事之盛而業以隆者也而天下謂之不然夫世之莫我知者非我道小而不足以知也又非我之事薄而不足為也又非世之好敗惡成喜禍樂患而故不我從也天性於我反情欲與我智陷於情欲終世溺於所聞神氣不我我而心意不我然故其明不我能見聰不我能聞是以深言反而受謗大行逺而得毁獨見之明不用於世獨聞之聰見羞於民事順神明者不合於俗功配天地者不悦於衆夫至論大言者總百變要萬方剖判毫之内明顯虚無恍惚之外周宻無間歸於昧此乃小節之士所不能聞而隅曲之人所不能逮也夫鴻鵠髙飛終日馳騖而不知宇宙之外制法之人拘教之士累年學問終日談論而不知道德之大也且神明有所不能領天地有所不能理况乎守衆庶之論不覩大要之所由不亦宜乎是故衆俗之所薄賤而得道者之所獨遵也是以聖人知而弗為能而不任仁義而不以為號通逹而不以為名堅强而不以為顯髙大而不以為榮言不可聞動不可形心若江海志若蒼天廢為以立道損善以益性寂然蕩蕩莫之能明皎然昭昭莫覩其情頽然黙黙魁然獨存薄外厚内賤已卑名去衆離俗與道為常知不知篇道德之教自然是也自然之驗影響是也凡事有形聲取舍有影響非獨萬物而已也夫形動不生形而生影聲動不生聲而生響無不生無而生有覆不生覆而生反故道者以無為為治而知者以多事為擾嬰兒以不知益髙年以多事損由此觀之愚為智巧之形也智巧為愚之影也無為遂事之聲也遂事為無之響也智巧擾亂之羅也有為敗事之綱也故萬物不可和也天地不可適也和之則失和適之則失適弗和也而後能和之弗適也而後能適之故安世不知危亂世不知治若影隨形無所逃之也不動求響無所得之也故知而絶知不困於知不知用知亦不困於知其所以不困則異矣而於為不困則一是故聖人操通逹之性遊於𤣥黙之野處無能之鄉託不知之體寂若虚空奄忽如死心無所圖志無所治聰明運動光耀四海塗民耳目示以無有庖㕑不形聲色不起知故不生禍亂息矣不言而宇内治無為而天下已民俯而無放仰而無效敦慤中正各守醇性惘惘洋洋皆終天命死者無諡生者無號若此相繼億萬無量其次情無所樂性無所喜心無所安志無所利疾不知孝病不知弟旣不睹仁又不識義無有典禮守其真幹一如麋鹿一如鴻鴈不在憂喜亦不離亂若盲若聾無所聞見主無宫室民無城郭國無制令世無耻辱病故不病與道相託不言不為威德自作天地和順渾沌磅礴溷若濁流煥若儼客人物皆愚歸於寂寞動無形矕静無圻堮生民俱昌天下啞啞亡於小利而享大福黙而治者計不能計而度不能度何以效之夫道德廢淳朴亡竒物並作知故流行禮節起分度明萬物有條貫百事有紀綱封疆畫界治邑屋州鄉里國有忠臣家有孝子録内畧外䨇身為友損彼益此務以相厚疆大重壘小弱亡有郊祀天地名山大水封於太山禪於梁父流漸相承或然或否斷獄萬數黥人滿道臣殺其君子殺其父亡國破家不可勝數天下享其知故之利獲其死亡之咎由此觀之絶知為福好智為賊亦明矣故使有德之君變志易心生息萬事以教民禱祝請福以至大治者自然不聽也使彼亡國之君廢智去欲絶為止事修道行德棄其心意而欲死亡者形亦不從也是故趨舍廢置王道之形聲也吉㐫存亡趨舍之影響也夫聖人所以能動與天和静與道合既能保身又能全國翺翔乎有為之外優游乎無事之内取福於纎玅之中而舒之於四海之外䘮明者之目杜知者之口窒聰者之耳斬巧者之手與時相隨與和俯仰不為而自成不教而民治恩加走獸澤及飛鳥者以其損聰棄智廢為而任道也是以順情從欲窮極心意動導天地静陶萬事神靈在已不察不燎身不降席而萬國自備雖欲不亡自然不置也民不畏威篇道德之㫖神明之務太和之心天地之意禍莫甚乎亡福莫甚乎存非獨天道人物亦然故存身之道莫急乎養神養神之要莫甚乎素然常體憂畏慄慄震震失神之術夲於縱恣䘮神之數在於自專故太上畏道其次畏天其次畏地其次畏人其次畏身昌衰吉㐫皆由巳出不畏於㣲必畏於章患大禍深以至滅亡憂畏元始至於無形戒慎未兆其道大光動得所欲静得所安福禄㣲論於無方正言若反明而若昬遼逺潢洋莫之能聞伺命在我何求於天至福似禍大吉若㐫天下醉飽莫之能明是以世俗見近聞淺不識窅冥之道蔽於微玅之常塞於神明之理察於毫毛之利不覩丘山之禍肆情行態無所畏忌言順所然行順所善力能而取心順妄與憍奢恣睢自專損巳忠信所愛欺殆父母侵凌天地簡傲其主將順情欲以逹天道故起巧立名以代其身施惠流恩以獲大咎遁福天外追患四海福德求之不能得矣患奔禍馳無所逃矣大威以至乃始為善當此之時道德不能求天地不能解非天之罪也樂髙喜大負威任勢忘憂失畏不求於己也故憂於身者不恐於人畏於己者不制於彼順於小者不懼於大誠於近者不悔於逺是以不小其位而居之以敏不薄所處而厚脩其禮不苦卑微而革其大始不厭困危而絶其所以樂窮如逹安死如壽雖欲且留亦不得乆何以明之荘子曰天地之道始必有終終必有始陽氣安於濳龍故能鑠金隂氣寧於履霜故能凝氷木善秋毫故能百尋水樂涓涓故能成海飛禽於卵鷇故能髙翔羣獸預於胎䍮故能逺走是以聖人智逹無窮能與天連變化運動洞於大常猶以積德重厚釋心意隱聰明憂於溷輓畏於無形竄端匿迹遁𩔖逃情反於虚無歸於𤣥㝠身重天地而不自高德大隂陽而不自彰託微處寡後下萬民飲食無味衣服無文方於自飾志不敢淫秉道操德與物浮沈養民如子遇衆若君德歸之天功移於人天下辭讓恩厚固深故禍不能禍而患不能患福不能逃而德不能遁非道有私而天地偏也戒始慎㣲和弱忠信奉道順天與物相參憂畏得意安樂困窮成敗存亡求之於身勇敢篇天地之道生殺之理無去無就無奪無與無為為之自然而已正直若䋲平易如水因應効象與物俱起損益取舍與事終始深淺輕重萬物自取殊形異𩔖各反其所生為殺元殺為生首二者相形吉㐫著矣故知生而不知殺者逆天之道也知殺而不知生者反地之要也故喜怒有分生殺有節受天之殃得地之罰當怒不怒子為豺狼弟為兕虎當鬬不鬬妻為敵國妾為大㓂當殺不殺受天之害為物所制當喜不喜蒙天之災獲地之咎當生不生人君失國庶人沒命故君子殺民如殺身活人如活巳執德體正不得巳而後然存身寧國在於生殺之間生殺得理天地佑之喜怒之節萬物歸之故剛柔質直操擊深酷疾邪養正勇敢先失逹於守戰明于開塞長忿羙快安静樂殺便國利民不避彊大威振百蠻權傾境外得善之半也柔弱畏敬恐情損言深思逺慮臨正討怨務長寡和博厚積恩利而不害以明其善與而不奪以顯其名賞而不罰以立其惠生而不殺以成其仁得善之半凡此二功勇敵敢均計策椉馳射身相非與天異意與地異心奮情舒志各肆所安或以千椉變為亡虜或以匹夫化為君王故物或生之而為福或生之而為禍或殺之而為福或殺之而為賊二者深微莫能窮測故生之而為福者天下之所佑生之而為禍者天下之所惡也養天下之所惡者傷天下之所佑養天下之所佑者傷天下之所惡一反一覆或為𤣥德一覆一反或為𤣥賊父事天地子孫是得故長養而後世昌者生當生也生物而後亡者生當亡也殺戮而福至者殺當亡也䘮物而禍來者殺當生也天之所惡不敢活也天之所佑不敢殺也天之所損不敢與也天之所益不敢奪也是故敢於不敢者之敢動與天同符静與地同極天心所惡莫之能辨夫天地之道一隂一陽分為四時離為五行流為萬物精為三光陽氣主德隂氣主刑覆載羣𩔖含吐異方𤣥黙無和正直以公不以生為巧不以殺為工因應萬物不敢獨行吉與之吉凶與之凶損損益益殺殺生生為善者自賞為惡者自刑故無為而物自生無為而物自亡影與之交響與之通不求而物自得不拘而物自從無察而物自顯無問而物自情故不争而無所不勝不言而無所不應不召而無所不來寂然蕩蕩無所不圖惚恍之羅設而無状之網施汎淫潢漠遼逺留遲宻察無間與物推移故在前而不可逺在後而不可先静作而不可聞進退而不可見終始禍福吉㐫自反非出天外莫之能遁也民不畏死篇人之情性不知而忠信有知而誕謾得意而安寧失意而圖非窮困而輕死安寧而愛身何以明之莊子曰夫嬰兒未知而忠信於仇讐及其壯大有識欺殆兄嫂三軍失意則下亡虜窮谿之獸不避兕虎其性非易事理然也由此觀之民心不得性命不全則號令不能動也憂愁慘怛樂非輕死則刑罰不能恐也是故好知之君憂世勞民祭燎天地除禍去患招善請福禱祝鬼神變化萬事動以悦民家知戸辨里有仁賢違天之象專任人心以所見為明以所論為當廢名實背事情道理塞而非譽興天下大擾百姓遑遑勞苦疲極困窮生姦敢敗者榮而有功輕死者肥而安寧積善者瘦而多憂畏法者飢而多患寡弱者苦而思死衆强者樂而君王是以天下趨名争勢不計是非析毫剖芒視死如歸乃始告以峻法嚴刑則是禁以所易而制以所輕也故刑戮並作姦邪不止賞禄施行而大臣不使萬民不附諸侯不市國非其國身非其身也是以聖人之牧民也人主無為而民無望民無獲而主無䘮也其業易得而難失也其化難犯而易行也其衣易成而難敝也其食易足而難窮也故天下除嗜廢欲樂生惡死者皆重其神而愛其身故刑可制而勢可禁也是以俊雄英豪逹道之人不敢作福不敢起威故法立而不用賞設而不施夫何故哉身重天地物輕鴻毛法峻嚴刑知不敢淫也是故帝王之道無事無為目無所見耳無所聽心無所圖口無所言前後左右各有所任因應以督安其成功授以所懐歸以所行爵加明主禄施進賢作福者身死竊威者宗亡百官趨職主無與焉釋臣任主則䟽逺隱匿親近尊顯君道隔塞政事亡矣威嚴両立邪偽並起陪臣陞進君子得咎君之威勢滅而不揚姦雄豪特令行禁止百姓寃結萬方失理忠臣悲憂佞巧大喜名實失當賞罰妄舉是猶使屍起哭而代大匠斵也夫死人無為而子弟悲者以為死而不為哭也不與方圓而處大堂者任大匠而身無作也使屍起哭則哭者亡主人代匠斵則功不成是以明王聖主正身以及天謀臣以及民法出於臣秉之在君令出於君飾之在臣臣之所名君之所覆臣之所事君之所謀也臣名不正自䘮大命故君道在隂臣道在陽君主專制臣主定名君臣隔塞萬物自明故人君有分羣臣有軄審分明職不可相代各守其圓大道乃得萬事自明寂然無事無所不尅臣行君道則滅其身君行臣事則傷其國道德指歸論卷六
