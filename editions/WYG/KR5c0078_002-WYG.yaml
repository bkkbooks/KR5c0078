body:
  text: 道德指歸論卷二漢嚴遵撰道生一篇有虚之虚者開導禀受無然然者而然不能然也有虚者陶冶變化始生生者而生不能生也有無之無者神明不能改造存存者而存不能存也有無者纎㣲𤣥玅動成成者而成不能成也故虚之虚者生虚虚者無之無者生無無者無者生有形者故諸有形之徒皆屬於物𩔖物有所宗𩔖有所祖天地物之大者人次之矣夫天之生人也形因於氣氣因於和和因於神明神明因於道徳道德因於自然萬物以存故使天為天者非天也使人為人者非人也何以明之荘子曰夫人形腐何所取之聰明感應何所得之變化終始孰者為之由此觀之有生於無實生於虚亦以明矣是故無無無始不可存在無形無聲不可聽視禀無授有不可言道無無無之無始未始之始萬物所由性命所以無有所名者謂之道道虚之虚故能生一有物混沌恍惚居起輕而不發重而不止陽而無表隂而無裏旣無上下又無左右通達無境為道綱紀懐襄空虚包褁未有無形無名芒芒澒澒混混沌沌冥冥不可稽之亡於聲色莫之與比指之無嚮搏之無有浩浩無窮不可論諭潢然大同無終無始萬物之廬為太初者故謂之一一以虚故能生二二物並興玅玅纎微生生存存因物變化滑淖無形生息不衰光耀𤣥冥無嚮無存包褁天地莫覩其元不可逐以聲不可逃以形謂之神明存物物存去物物亡智力不能接而威德不能運者謂之二二以無之無故能生三三物俱生渾渾芒芒視之不見其形聽之不聞其聲摶之不得其緒望之不覩其門不可揆度不可測量冥冥窅窅潢洋堂堂一清一濁與和俱行天人所始未有形朕圻堮根繫於一受命於神者謂之三三以無故能生萬物清濁以分髙卑以陳隂陽始别和氣流行三光運羣𩔖生有形臠可因循者有聲色可見聞者謂之萬物萬物之生也皆元於虚始於無背隂向陽歸柔去剛清靜不動心意不作而形容修廣性命通逹者以含和柔弱而道無形也是故虚無無形㣲寡柔弱者天地之所由興而萬物之所因生也衆人之所惡而侯王之所自名也萬物之原泉成功之本根也故賢君聖主以至尊之位强大之勢處孤寡居不逐所來逃所欲去大為小安卑樂損出無迹入無朕動於福先静於禍始無為無事天下自巳不視不聽抱和以静神明生息形容自正進退有常不變其行德化凌風理於蒸庶天地是祐萬物是歸衆人則不然見聞知病見聞知病合於成事不覩未然之變故貴堅剛大權造勢衆務不制深度柔弱逺絶㣲寡動與道舛静與天迕神明潰濁衆事並興思慮迷惑妄喜妄怒福禧出門妖㜸入戸天綱以發不可解之也滂然禍生愴爾覺悟屈約而言卑將死而辭善雖欲改過為新反於㣲寡自然不釋與生路逺破國亡家禍及子孫故衆人之教變愚為智化弱為强去㣲歸顯背隱為彰暴寵争逐死於榮名聖人之教則反之愚之以智辱之以榮㣲之以顯隐之以彰寡之以衆弱之以强去心釋意務於無名無知無識歸於𤣥冥殊塗異指或存或亡是以强秦大楚專制而滅神漢龍興和順而昌故强者離道梁者去神生主以退安得長存不求於己怨命尤天聖人悲之以為教先書之竹帛明示後人終世反之故罹其患至柔篇道德至靈而神明賔神眀至無而太和臣清濁太和至柔無形包裹天地含囊隂陽經紀萬物無不維綱或在宇外或處天内人物借之而生莫有見聞毳不足以為號弱不足以為名聖人以意存之物也故字曰至柔名曰無形是以無形之物不以堅堅不以壯壮故能敝天地銷銅鐵風馳電騁經極日月周流上下過飄歴忽安固翺翔淪於無物何以効其然也夫響以無聲不可窮影以無形不可極水以淖弱貫金石沈萬物地以柔順成大功勝草木舌耳無患角齒傷折由此觀之柔者敝堅虚者馳實非有為之自然之物也是以地狹民少兵寡食鮮意妙欲微神明是守與天相參視物如子德盛化隆恩深澤厚吏忠卒信主憂將恐累柔積弱常在民後被羞蒙辱國為雌下諸侯信之比於赤子天下往之若歸父母人物同欲威勢自起强者不能凌智者不能取終始反覆强弱變化天地為助神明為輔時至不制為天下主夫何故哉以道柔弱而體微寡也故地廣民衆國富兵强吏勇卒悍主能將嚴賞重罰峻削直刻深百官戰慄若在君前勢便地利為海内雄輕敵樂戰易動師衆合變生竒凌天侮地諸侯執服靡不懸命威震境外常為梟俊人憂物恐威動天地道德不載神明是離衆弱同心萬民不附身死國亡族𩔖流㪚夫何故哉體堅剛而積憍吝也夫道以無有之有通無間遊無理光耀有為之室澄清無為之府出入無外而無圻經歴珠玉而無朕何以効其然也夫有形鎌利不入無理神明在身出無間入無孔俯仰之頃經數千里由此言之有為之為有廢無功無為之為成遂無窮天地是造人物是興有聲之聲聞於百里無聲之聲動於天外震於四海言之所言異類不通不言之言隂陽化天地感且道德無為而天地成天地不言而四時行凡此二者神明之符自然之驗也是以聖人虚心以原道德靜氣以存神明損聰以聽無音棄明以視無形覽天地之變動觀萬物之自然以覩有為亂之首也無為治之元也言者禍之戸也不言者福之門也是故絶聖棄智除仁去義發道之心揚徳之意順神養和任天事地隂陽奉職四時馳騖亂原以絶物安其處世主恬淡萬民無事教以不言之言化以不化之化示以無象之象而歸乎𤣥玅奄民情欲順其性命使民無知長生乆視故我無言而天地無為天地無為而道德無為三者並興總進相乘和氣洋溢太平滋生人物集處宇内混同禍門以閉天下蒙童世無耻辱不覩吉㓙知故窒塞自然大通家獲神明之福人有聖智之功當此之時主如天地民如嬰兒飲主之德食主之和陽出隂入與道卷舒君父在上若有若無天下惘惘咮咮喁喁不知若鷇無為若雛生而不喜死而不憂閔閔輓輓性命有餘莫有求之萬福自來夫何故哉人主不言而道無為也無為之關不言之機在於精玅處於神微神㣲之始精玅之宗生無根蔕出入無門常於為否之間時和之元故可聞而不可顯也可見而不可闡也可得而不可傳也可用而不可言也柄而推之要而歸之易為智者陳難為淺聞者言也何則廣大深逺而衆久莫能及也上而若反而衆人莫能入也淡淡濫濫而世人莫能聞也窅窅冥冥而俗主莫能行也名身孰親篇我性之所禀而為我者道德也其所假而生者神明也其所因而成者太和也其所託而形者天地也凡此數者然我而我不能然也故法象莫崇乎道德稽式莫髙乎神明表儀莫廣乎太和著明莫大乎天地道德神明常生不死清濁太和變化無窮天地之道存而難亡隂陽之事動而難終由此觀之禍極於死福極於生是以聖人上原道德之意下揆天地之心崇髙顯榮吉祥盛德深閎浩大尊寵窮極莫大乎生萬物陳列竒怪珍寳金玉珠璧利深得巨莫大乎身禍世之匠亂國之工絶逆天地傷害我身莫大乎名生憍長溢困民貧國擾濁精神使心多欲叛天違道争為盜賊天下不親世多兵革一人為之傷敗萬國主死民亡物蒙其毒莫大乎貨故得之與亡或病或利得名得貨道德不居神明不留大命以絶天不能救失名失貨道徳是祐神明是助名顯自然富配天地故細身大名未可與論至道也輕身重國未可與圖利也夫無名之名生我之宅也有名之名䘮我之橐也無貨之貨養我之福也有貨之貨䘮我之賊也是故甚愛其身至建榮名為之行之力之勞之强迫性情以損其神多積貨財日以憍盈憍亡之道貨名俱終故神明不能活天地不能全也夫何故哉道德之化天地之數一隂一陽分為四時離為五形綸為羅網設為無間萬物之性各有分度不得相干造化之心和正以公自然一槩正直平均無所愛惡與物通同劑長續短損盈益虚不足者養有餘者䘮貪叨多積自遺禍殃不足不止利心常起智以詐愚强以大取自然均之名利歸主失之而憂得之而喜一喜一憂魂魄浮㳺一憂一喜神明去矣身死名滅禍及子孫故名利與身若炭與氷形性相反勢不俱然名終體極身存世昌者天下無之是故擾心猾意用情事神夙夜趨務餙容治辭憂懐衆庶創事立功勵身起節以顯榮名是損所以有身而益所以亡身也竭筋力忍飢渴犯寒暑踐危狹薄衣惡食不適口腹迎朝送夜被耻蒙辱精奔神馳汲汲不止逆道干榮多入為有危身以寧貨積神亡禍患自來憍亡俱至則是為福以亡福求利以去利故成敗之事在為與否存亡之道在去與來是以知足之人體道同德絶名除利立我於無身養物而不自生與物而不自存信順之間足以存神室家之業足以終年常自然故不可殺處虚無故不可中細名輕物故不可汚欲不欲故能長榮知止之人貴為天子不以枉志貧處巖穴不以幽神進而不以為顯退而不以為窮無禍無福無得無䘮不為有罪不為有功不求不辭若海若江㳺揚𤣥域神明是通動順天地故不可危殊利異害故能常然是以精藏而不㧞神固而不脱魁如天地照如日月既精且神以保其身知足而止故能長存此謂遁名而名我隨逃利而利我追者也大成若缺篇道徳無為而神明然矣神明無為而太和自起太和無為而萬物自理或無根而生或無足而走或無耳而聼或無口而鳴殊類異倫皆與之市母愛其子子愛其母男女相兼物尊其主巢生而啄胎生而乳鳥驚而㪚獸驚而聚隂物宂居陽物巢處火動炎上水動潤下萬物青靑春生夏長秋成冬熟皆歸於土非有政教物自然也由此觀之為不生為否不生否明不生明晦不生晦不為不否不明不晦乃得其紀故大道坦坦不出門戸其出彌逺其知彌寡道在於身不在於野化自於我不由於彼萬物常治智慧不起是以聖人柄和履正治之無形遊於虚廓以鏡太清遺魂亡魄休精息神無為而然𤣥黙而信窅然蕩蕩昭曠獨存髣髴輓逮其事素真其用不弊莫之見聞夫何故哉微玅周宻清靜以真未有形聲變化其元開導如陽閉塞如隂堤埽如地運動如天文武𤣥作盛德自分是以盈而若冲實而若虚不顯仁義不見表儀不建法式不事有為上欲不欲天下自化敦厚樸素民如嬰兒蒙蒙不知所求茫茫不知所之其用不窮流而不衰不耕自有食不織自有衣暑則靜於裸寒則躁於裘無有忌諱與麋鹿居被髮含哺相隨而遊主有餘徳民有餘財化襲萬物無所不為光景不見獨𤣥有竒天地人物與之俱化乘空載虚與道徘徊厲度四海周流六虚浩洋無窮棲息至無夫何故哉直而若屈正而若枉世主為聲天下為響世主為形天下為影故不郊祀而天心和不降席而正四海故曰大巧若拙天道自卑無律厯而隂陽和無正朔而四時節無法度而天下賔無賞罰而名實得隱武藏威無所不勝棄捐戰伐無所不克無號令而民自正無文章而海内自明無符璽而天下自信無度數而萬物自均是以嬴而若詘得之若䘮無鐘鼓而民娛樂無五味而民食甘無服色而民羙好無畜積而民多盈夫何故哉因道任天不事知故使民自然也天地之道一進一退而萬物成遂變化不可閉塞屈伸不可障蔽故隂之至也地裂而氷凝清風飂冽霜雪嚴凝魚鱉蟄伏萬物宛拳當此之時處温室臨罏火重狐貉襲毳綿猶不能禦也及至定神安精動體勞形則是理泄汗流捐衣出室暖有餘身矣陽之至也煎砂爛石飛鳥絶水蟲疾萬物枯槁江湖消竭當此之時入沈清泉出衣絺綌燕髙䑓服寒石猶不能任也及至解心釋意託神清静形捐四海之外游志無有之内心平氣和涼有餘矣夫知故之為術也治人事育羣形德延天地功配隂陽及其生亂也發於無形起於無聲與政卷舒與化推移得人如濕逮人若隂猶響應言影不離形為之愈亂治之益煩明智不能領嚴刑不能禁是無為者有為之君而成功之主也政教之元而變化之母也其餘禍亂猶躁之勝寒而静之勝暑也是以聖人去智去慮虚心專氣清静因應則天之心順地之意政舉化流如日之光禍亂消滅若雲之除天下象之無所不為萬物師之無所不事天下有道篇人之生懸命於君君之立懸命於民君得道也則萬民昌君失道也則萬民䘮萬民昌則宗廟顯萬民䘮則宗廟傾故君者民之源也民者君之根也根傷則華實不生源衰則流沫不盈上下相保故能長乆是以世主得道宇内不擾諸侯賔服百蠻雍喜四海同風兵革不起徼悍之人無所効其言果壮之士無所施其功聰明辨智隨澤而耕騏驥驊騮嬰輿而作天下宴閒各樂其業世惇俗厚民人專一總織而衣總耕而食天心和洽萬物豐熟嘉祥屢臻吉符並集非天降福世主道德也天子失道諸侯不朝谿異谷别法制舛殊四方背叛力政相凌舉兵争權弱者為鹵强者為君是以天下𨕖将簡士砥礪甲兵懸烽烈火四面相望深姦大詐謀於廟堂作變生竒結縱連横輕車梟騎興敵相當士馬生郊歴年不還化髙詐力政當首功當此之時飾養戎馬不遑親戚奔郊先至常食菽粟貪夫坐而為宰庸僕之徒畜而為賊百姓罷極財殫力倦長徭兵役乆而不息時念歸家悽愴慷慨想親罷老涕泣於外慈父惠母憂愁傷心肝膽氣志摧折於内士卒椎頭結踵骸骨暴露流離於中野者不可勝計道路憧憧皆為孤子思慕號呼踊泣而起何罪蒼天遭罹此咎牝者無夫幼稚無父怨慟悲痛不期而聚大者為率中者為宰上下相䕶中外相保非有血脉親如兄弟總苖為旌穿地為鼓操兵便械趨行案伍常集戰鬬意議其主至精相感氣化相動是以天地鈐結隂陽隔閉星辰㪚亂日月鬬蝕詐逆萌生災變並發非天降禍世主無道夫遭天之鴻命繼先聖之後貴為天子富有四海爵尊寵極莫與比列布衣麤裘而天下以為好蔬食藜羮而天下謂之美變世化俗猶風之靡草民之從化猶魚之赴水不務崇道廣德修身正已憂勞元元以承祭祀光顯祖考業傳子孫徳與神明争流名與天地相保反以驕奢取名求勢不止逆天迕地無不凌侮是以不訾之士相矯而起輕舉深入先到為右敵人逺至莫與之交黨離朋絶中外不恃身死國亡宗廟崩弛可欲之故非天下之罪也是故威勢尊寵窮極民上名號顯榮覆葢天下而不知足者獵禍之具而危亡之大數也夫道德神明陶冶變化已得為人保合精神而有大形動作便利耳目聰明遊於昭曠之域聽眡天地之間上觀自然之法式下察古將之得失鑿井而飲耕田而食長妻生子與命相極是足之足者也何况乎萬乘之主千乘之君或其可足亦明矣故不在於道也利心常起貪人壤土欲人財寳兼并不休増加不已者追患之大數而得咎之至要也自今及古飛鳥走獸含氣有類之屬未有不欲得而全其性命者也故居君者為鹵居虎者為䑕名在青雲之上身處黄泉之下居牛馬之位者無牛馬之患託犬羊之列者無犬羊之咎是以得道之士建心於足游志於止辭威讓勢孤特獨處捐棄萬物唯神是秉身存名榮乆而不殆天下歸之無有不制不出戸篇道德變化陶冶元禀受性命乎太虚之域𤣥冥之中而萬物混沌始焉神明交清濁分太和行乎蕩蕩之野纎玅之中而萬物生焉天圓地方人縱獸横草木種根魚沈鳥翔物以族别𩔖以羣分尊卑定矣而吉㐫生焉由此觀之天地人物皆同元始共一宗祖六合之内宇宙之表連屬一體氣化分離縱横上下剖而為二判而為五或為白黒或為水火或為酸鹹或為徴羽人物同𩔖或為牝牡凡此數者親為兄弟殊形别鄉利害相背萬物不同不可勝道合於喜怒反於死生情性同生心意同理何以言之荘子曰一人之身俱生父母四支九竅其職不同五臓六腑各有所受上下不相知中外不相覩頭足為天地肘為四海肝膽為胡越睂目為齊楚若不同生異軀殊體動不相因静不相待九天之上黄泉之下未足以喻之然而頭有疾則足不能行胸中有病則口不能言心得所安則耳目聰明屈伸調利百節輕便者以同形也人生動於邇則人物應於逺人物動於此則天地應於彼彼我相應出入無門往來無戸天地之間虚廓之中遼逺廣大物𩔖相應不失毫者同體故也是以聖人不出戸上原父母下擦子孫危寧利害反於死生之説察於是非之理通於利害之元逹於治亂之夲以巳知家以家知彼事得其綱物得其紀動知所之静知所守道德為父神明為母清静為師太和為友天下為家萬物為體視彼如己視己如彼心不敢生志不敢舉棄捐知故絶滅三五因而不作巖居宂處不殺羣𩔖不食生草未成不服未終不采天地人物各保其有夫原我未兆之時性命所以精神所由血氣所始身體所基以知實生於虚有生於無小無不入大無不包也夲我之生在於道徳孕而未育所以成形至於出冥以知深㣲纎玅和弱潤滑之大通也無知無識無為無事之有大功也視我之為嬰兒至於壮大有知以覩柔之生剛弱之生强小之生大短之生長愚之生智晦之生明也察我呼吸屈伸以知損為益首益為損元進為退夲退為進根福為禍始禍為福先也上陵仰阪歴阻過險形疲喘悸勞而静處則神平氣和中外相保以知清静虚無無為變化之大功也四肢九竅趨務舛馳異能殊形皆原一心以知百方萬物利害之變皆生於主稽之天地驗之古今動不相違以知天地之道畢於我也故家者知人之夲根也身者知天之淵泉也觀天不由身觀人不由家小近大逺小知大迷去家出戸不見天下去身窺牖不知天道其出愈逺其知益少周流四海其迷益甚求之益大功名益小不視不聽求之於巳天人之際大道畢矣故聖人不見一家之好惡而命萬家之事無有千里之行而命九州之變足不上天而知九天之心身不入地而知九地之變隂陽進退四時變化深㣲隱匿窅冥之事無所遁之何則審内以知外原小以知大因我以然彼明近以喻逺也故聖人之為君也猶心之於我我之於身也不知以因道不欲以應天無為以道世無事以養民𤣥𤣥黙黙使化自得上與神明同異下與萬物同心動與之反静與之存空虚寂泊使物自然道徳指歸論卷二
