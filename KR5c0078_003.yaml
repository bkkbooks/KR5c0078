front:
  text: 道德真經指歸卷之九能七
  hash: sha256:4782e3637701d8090d843a84a89b305e7603313a8bd418f84732c49d21d33c6c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0078_HFL_003-001a, image: hfl/0377/0377-063.png}
body:
  text: 蜀郡嚴遵字君平撰谷神子注為學日益益民知也為道日損損民知也損之又損之使不知也至於無為使無事也而無以為無不事也將欲取天下者和平之也常以無事道無職也及其有事窮知能也不足以取天下終不得也指歸道德之化變動虛玄蕩蕩默默泛泛無形潢漭慌忽渾沌無端視之不見聽之不聞開導禀授無所不存功成遂事無所不然無為之為萬物之根由此觀之不知之知知之祖也不教之教教之宗也無為之為為之始也無事之事事之元也不教之教無為之為皆至道至極神妙之動無形心成不可言名故謂之元始祖宗之大也凡此數者神明所因天地所歸玄聖所道處士所傳也逮至仁義淺薄性命不真不覩大道動順其心陷溺知故漸漬憂恩情意多欲神與物連深謀逆耳大論忤心非道崇知上功貴名是以作術治數集辭著文載之篇籍以教萬民綱紀天地經緯陰陽剖判人事離散祖宗淳朴變化設僞萬方轉移風俗傾正敗常改正易服萬事盡彰鐘鼓琴瑟間以竽笙升降進退飾象趨翔禮儀三百威儀三千分舛並爭興事儛文以辨相詘以巧相勝毫舉毛起益以無窮為學日益是以天下背本去根嚮末歸文博學深問家知户賢甚者擬聖以立君臣同意者無能而官異心者功大而亡儒者兼愛而成黨故同於己者不善而善之不同於己者雖善不善也是以天下騷騷不遑其親追習纖纖務順其君故和五味以養其口肥香甘脆不顧羣生變五色以養其目玄黃纖妙不計民貧調五音以養其耳極鍾律之巧不憂世淫高臺榭廣宫室以養其意不懼民窮馳騁田獵以養其志多獲其上不順天心役人命以善己身損人財以為己利不憂時俗之窮窶唯取己之有餘皆非仁愛之心是違天地之意也凡此數者非以為善務也以悅其君也天下相放養僞飾姦消滅和睦長暴之原浸以為俗巧利為賢損民大命以增民勞傷人美性以益民煩當此之時溪谷異君四海各王尊名貴勢强大為右忿爭相踰力正任武强者拘弱衆者制寡以乳代治以非圖是臣弒其君子弒其父爭之愈大莫之能守求者甚衆得之者寡道路悲憂盡言軍旅訩訩謷謷至相烹煮夫何故哉飾文益事務以相序也為學日益之過是以聖人釋仁去義歸於大道絶智廢教求之於己所言日微所為日寡為道日損者也消而滅之日夜不止包以大冥使民無恥滅文喪事天下自已損之損之使知不起損之又損也遁名亡身保我精神秉道德之要固存亡之機不為事主不為知師寂若無人至於無為以至於無天地自作羣美相隨萬物自象百蠻自和萬民蚩疑不知所之隨明出人託於四時優游精神不外心志意中空虛如木之浮如壤之休不識仁義不達禮儀心不知欲志不知為行步蹎蹎瞻視顚顚蹎蹎直實也顚顚高達也語言默默意氣玄玄外似禽獸中獨異焉寂而不為若無君臣不為而治敦厚忠慤至於大安神休精息性命自全萬物相襲與道德鄰無為而無不為者也夫何故哉主無教令而民無聞也是以將取天下常於無事不言為術無為為教無欲為寶不知為要能行以道無不開導取天下常以無事也釋虛反實以極為事上知天高下知地厚明陰陽之分知萬物之數晝見星於天夜見魚於淵耳比八風之調目領羣獸之毛此思慮之極也無益於存力什烏獲勢百孟賁勇千夏育威執三軍進若光景退若浮雲擊如雷霆不動若陰此强之極無益於勝使日下之民皆執禮易通詩書明律比知詔令家一吏里一令鄉一倉亭一庫明察折中强武求盜天下重足而立側目而視父子不相隱兄弟不相容此事之極無益於治是故以知知與天相離以為為與天相奇以事事失天之意為國日益百殘盡備為而不成求而不得天下相驅歸之於亂所謂及其有事不足以取天下故亂也聖人無常心心無形也以百姓心為心與人同也善者吾善之長其明也不善者吾亦善之變其性也得善矣自和正也信者吾信之長其誠也不信者吾亦信之變其情也得信矣自和平矣聖人在天下謂帝王也惵惵乎心虛空也為天下渾心包萬方也百姓皆注其耳目以為容也聖人皆駭之唯道從也指歸道德無形而王萬天者無心之心存也天地無為而萬類順之者無慮之慮運也由此觀之無心之心心之主也不用之用用之母也何以明之莊子曰我之所以為我者豈我也哉我猶為身者非身我猶似於我而我非身也身之所以為身者以我存也以我有分别稱之為身不自稱也而我之所以為我者以有神也神之所以留我者道使然也道生神神生身身神共合稱於我也我不自我由身故我身不自身由神故身身神同道不有而有即無心之心存託道之術留神之方清靜為本虛無為常非心意之所能致非思慮之所能然也故知者之居也耳目視聽心意思慮飲食時節窮適志欲聰明並作不釋晝夜經歷百方籌策萬事定安危之始明去就之路將以全身體而延大命也若然則精神為之損血氣為之敗魂魄離散大命傷夭本為其身而生思慮不知生思慮以損其身及其寐也心意不用聰明閉塞不思不慮不飲不食精神和順血氣生息心得所安身無百疾遭離凶害大瘡以瘳斷骨以續百節九竅皆得所欲但以寢寐之頃尚得安寧况體道忘懷故常適夫以一人之身去心則危者復寧用心則安者將亡而况乎奉道德順神明承天心養群生者哉善羣生彌須無心以寧也是以聖人建無身之身懷無心之心有無有之有託無存之存上含道德之化下包萬民之心聖人無心以百姓心為心者也無惡無好無愛無憎不與凶人為讎不與吉人為親不與誠人為媾不與詐人為怨載之如地覆之如天明之如日化之如神夫人之迷也其日固久乍令不善者豈造次而易哉必先優之柔之使自求之浸之潤之使自得之然後始可長其明而成其信悅其意而變其心故云載之如地覆之如天明之如日化之如神物無小大視之如身為之未有治之未然絶禍之首起福之元杜漸防萌遏惡揚善也去我情欲取民所安去我智慮歸之自然自然令物得安使百姓日用不知也動之以和導之以冲上含道德之意下得神明之心光動天地德連萬民民無賦役主無職負俱得其性皆有其神視無所見聽無所聞遺精忘志以主為心主能體道以道覆人人得主恩若自其心心從主後若子歸母俯仰卧起皆與為市者也與之俯仰與之浮沉隨之卧起放之屈伸不言而天下應不為而萬物存四海之內無有號令皆變其心善者至於大善日深以明惡者性變浸以平和所謂不善者吾亦善之所以得善也信者大信至於無私僞者情變日以至誠不信者吾亦信之得信也殘賊反善邪僞反真善惡信否皆歸自然夫指歸所以屢歸指於自然者明至道之體湛然獨立自古固存其能然於衆物而衆物不能然之故謂之自然非言蟲鳥之分以為至極夫有體此自然之道者則能同光塵不立圭角使物自化悉歸於善進其獨志若性自然所謂聖人不言而飲人以和當此之時溷沉太虛霑溺至和民忘心意芒洋浮游失其所惡而獲其所求與天進退與道周流非迫禁而去惡非拘教而後移也無為為之而變化不自知也夫何故哉世主之化虛無寂寞容如枯槁心如橐籥志如江海施如溪谷不别東西不異南北不辨甘苦不嫌白黑不正方圓不定曲直詳於玄妙務自隱匿所謂聖人惵惵為天下皆渾其心也與物無治浮游無極廢我之所欲為裹天之所欲得萬物紛紛皆注其耳目所謂百姓皆注耳目世主無為涣如儼容天地為爐太和為橐神明為風萬物為鐵德為大匠道為工作天下青青靡不潤澤聖人含如此之功用所以能利物無窮矣故能陶冶民心變化時俗上無不包下無不克成遂萬物無不斟酌感動群生振駭八極天下芒芒不識美惡玄效昧象自成法式聖人皆駭動萬物以歸於道隨其所宜而成法式也出生人死去無為也生之徒十有三虛無和也死之徒十有三實有過也而民生有其生也動之死地為利名也十有三趨堅强也夫何故以其生生之厚亡其生也蓋聞善攝生者畜神明也陸行不避兕虎虎不傷也入軍不被甲兵兵不喪也兕無所投其角柔弱象也虎無所措其爪體和平也兵無所容其刃害亡中也夫何故哉類相應也以無死地無亡形也指歸道德神明清濁太和渾同淪而為體萬物以形形之所託英英榮榮不覩其字號之曰生生之為物不陰不陽不可揆度不可測量深微不足以為稱玄妙不足以為名光耀恍惚無有形聲無狀無象動靜無方游於虛寂之野處於無有之鄉得之者存失之者亡道氣所傳陰陽相和凝結成識名之為生而又非形非象非陰非陽故云不陰不陽處無有之鄉也夫生之於形也神為之蒂精為之根營爽為宫室九竅為户門聰明為候使情意為乘輿魂魄為左右血氣為卒徒進與道推移退與德卷舒不離道德而非道德翶翔柔弱棲息虛無屈伸俯仰與時和俱輕死與之反欲生與之仇無以為利則不可去有以為用則不可留無為則生自生故不去有為欲生之則死矣故不留故無為生之宅有為死之家也夫立則遺其身坐則忘其心淡如赤子泊如無形不視不聽不為不言變化消息動靜無常與道俯仰與德浮沉與神合體與和屈伸不賤為物不貴為人與王侯異利與萬姓殊患死生為一故不别存亡此治身之無為也春生夏長秋收冬藏奉主之法順天之命內慈父母外絶名利不思不慮不與不求獨往獨來體和襲順辭讓於入不與時爭此治家之無為也尊天敬地不敢亡先修身正法去己任人審實定名順物和神參伍左右前後相連隨時循理曲因其當萬物並作歸之自然此治國之無為也冠無有被無形抱空虛履太清載道德浮神明秉太和驅天地馳陰陽騁五行從羣物涉玄冥游乎無功歸乎無名此治天下之無為也凡無為者皆生之徒貪生利壽唯恐不得强藏心意閉塞耳目導引翔步動搖百節吐故納新吹煦呼吸被服五星飲食日月形神並作未嘗休息此治身之有為也廢釋天時獨任人事賤强求貴貧强求富飢名渴勢心常載求衣食奢泰事過其務此治家之有為也富國兼壤輕戰樂兵底威起節名顯勢隆刑嚴罰峻峭直刻深法察網周操毒少恩諸侯畏忌常為俊雄公强求伯伯强求王此治國之有為也祖孝悌宗仁義修禮節教民知飾修治色味以順民心鐘鼓琴瑟以和民志主言臣聽主動臣隨表功厲行開以恩厚號令聲華使民親附諸事任己百方仰朝此治天下之有為凡有為者皆死之徒是故虛無清靜微寡柔弱卑損時和嗇凡此十三生之徒此十三者是集道之端養神之宅故云生之徒實有濁擾顯衆剛强高滿過泰費此十三者死之徒也此十三者與道相違與神相反故云死之徒也夫何故哉聖人之道動有所因靜有所應四支九竅凡此十三死生之外具也虛實之事剛柔之變死生之內數也故以十三言諸以內有十三生徒外成四支九竅故以言內外也夫虛生充實無生常存清則聰達靜則內明微生章顯寡則生衆柔生剛健弱生堅强卑則生高損則生益時則通達和則得中嗇則有餘是謂益生能行此道與天地同為身者久為國者長雖欲不然造化不聽夫虛無清靜既將道合能生諸有與造化同故雖欲不然而造化不許也實生空虛有生消亡濁則聽塞擾則失明顯則生微衆則生寡剛生柔韏强生弱殃高生卑賤滿生損空過則閉塞泰則困窮費則招禍是俱不祥有行此道動而之窮此十三者是形有之纍生禍之元故動而之窮為身不久為國不平雖欲不然天地不從有為必敗理數自然故天地不從也而民皆有其生而益之不止皆有其身而愛之不已動歸有為智慮常起人之生動之死地也故去虛就實絶無依有出清入濁背靜治擾變微為顯化寡為衆離柔反剛廢弱興强損卑歸高棄損取盈縱時造過釋和作泰將以有為除嗇施費夫何故哉大有其身而忘生之道也所謂死之徒也是故攝生之士超然大度卓爾遠逝不拘於俗不繫於世損形於無境浮神於無內不以生為利不以死為害兼施無窮物無細大視之如身無所憎愛精神隆盛福德並會道為中主光見於外自然之變感而應之天地人物莫之能敗陸行則兕虎不能傷入軍則五兵不能害非加之而不能克投之而不能制也神氣相通傷害之心素自為廢夫善攝生者之為行既無愛僧於萬物視物常若於己身故物亦感而相應還自親而無惡理數必爾若影隨形非以法術加形而揣據夫何故哉聲響相應物從其類兕虎不加無形而五兵不繫無質攝生之士賊害之心亡於中而死傷之形亦亡於外也所謂虎無所措其爪兵無所容其刃以其無死地信不虛焉道生之禀物性也德畜之授物命也物形之品萬方也勢成之遂物形也是以萬物得以生也尊道而貴德視宗正也道尊德貴高大盛也夫莫之爵無以名也而常自然以為性也道生之無不存也德畜之無不今也長之無不益也育之無不寧也成之無不終也熟之無不然也養之無不利也覆之無不藏也生而不有不以資也為而不恃無所為也長而不宰無以為也是謂玄德德不知也指歸聖知之術不自天下不由地出內在於身外在於物督以自然無所不通因循效象無所不竭故道虛德無不失其心天尊地卑不違其節何則以有知無由人識物物類之無者生有虛者生實見微知著觀始覩卒非有巧能自然之物聖人因之與天周密是故知道以大虛之虛無所不禀禀物性也知德以至無之無無所不授授物命也道以無為之為品於萬方而無首為而不有德以無設之設遂萬物之形而無事成功不居故能陶性命治情意造志欲化萬事何謂性命情意志欲問六者之差也所禀於道而成形體萬方殊類人物男女聖慮勇怯小大修短仁廉貪酷强弱輕重聲色狀貌精粗高下謂之性此皆禀於道由中而出終焉不變也所授於德富貴貧賤夭壽苦樂有宜不宜謂之天命皆受於德自外而來進退由我遭遇君父天地之動逆順昌衰存亡及我謂之遭命偶然所遇非常定也萬物陳列吾將有事舉錯廢置取舍去就吉凶來禍福至謂之隨命隨我所為而得因性而動接物感寤愛惡好憎驚恐喜怒悲樂憂恚進退取與謂之情自性而來不覺而至因命而動生思慮定計謀决安危通萬事明是非别同異謂之意緣命而動由我所為因於情意動而之外與物相連常有所悅招麾禍福功名所遂謂之志性命之動情意己出因而自强謂之志也順性命適情意牽於殊類繫於萬事結而難解謂之欲欲雖出乎情意而侈於性命不可縱凡此六者皆原道德千變萬化無有窮極唯聞道德者能順其則道則是其本得本者進退自由不為情欲之所使也性精命高可變可易性粗命下可損可益若得根本不滯有無是故天地人物含心包核有類之屬得道以生而道不有其德道生之而未有得一而成而一不求其福萬物尊而貴之親而憂之而無報其德得至一之所成而一無所謝所謂理至則迭滅者也夫何故哉道高德大深不可言物不能富爵不能尊無為為物無以物為非有所迫而性常自然無為自為於物不為物而故為理數必自如然非有物使之然故道之為物窺之無户察之無門捪之無體象之無容意不能盡而言不能通萬物以生不為之損物皆歸之不為之盈上下不窮廣大無涯消息嬴詘不可度訾遊於秋毫不以為少包裹萬天不以為多青紫光耀不為易志幽冥枯槁不為變化所謂常也運行無施無所愛好禀授性命無所不為德流萬物而不可復恩結澤締而不可歸道德善貸且生若橐籥之出聲氣氣出無窮不可歸復也瞻足天下而不費成功遂事而不衰其於萬物也豈直生之而已哉生之形之設而成之品而流之停而就之終而始之先而後之若水之於魚生成終始不可斯須離既託其後又在其前神明以處太和以存清以上積濁以下凝天以之圓地以之方陰得以陰陽得以陽日月以照星辰以行四時以變化五行以相勝火以之熱水以之寒草木以柔金石以剛味以甘苦色以玄黃音以高下變以縱橫山陵以滯風雨以行鱗者以游羽者以翔獸以之走人以聰明殊類異族皆以之存變化相背皆以之亡萬天殊狀水土異形習俗相違利害不同容貌詭謬意欲不通陰陽所不能及日月所不能明皆以之始皆以之終開口張目屈伸傾側俯仰之頃喘息之間神所經歷心意所存恩愛所加雌雄所化無所不導無所不為生之而不以為資為之而不以有求長之而無以為有天下迷惑莫之能知窅冥寂寞無有形質又能生成不等太虛人迷既久故不知也或曰道德天地之神明也天地道德之形容也或謂道德是天地之用天地是道德之體此甕中蠛蠓之見衣中機虱之知不可以語於道也何以明之道德包萬天也莊子曰夫天地有類而道德無形有類之徒莫不有數無形之物無有窮極以有數之物託於無窮若草木離土衆星離天不足以喻焉而謂之不然則是不通乎有無相包虛實相含猶瓜瓠之瓣不覩區蔓之有鄰也蟣虱藏於裘褐不知都邑之多人也是故宇宙之外營域之內拘以無禁束以無制安危消息無有中外同風共指和順仰制全活姣好靡有傷敗百祥萬福道為之蓋功玄事冥不開於世天下莫見為而不廢隨迎莫見見即非真言常不及非常所識所謂玄德德濟無窮天下有始無為身也以為天下母萬物根也既得其母秉自然也以知其子生事無也既知其子無不間也復守其母反其先也沒身不殆終安寧也塞其兊耳目冥也閉其門口不言也終身不勤不勞難也開其兊事聰明也濟其事顯功名也終身不救不可生也見小曰明覩未萌也守柔曰强和為恆也用其光神外動也復歸其明反其內也無遺身殃不為大也是謂襲常服道制也指歸夫道之為物無形無狀無心無意不忘不念無知無識無首無向無為無事虛無淡泊恍惚清靜其為化也變於不變動於不動反以生覆覆以生反有以生無無以生有反覆相因自然是守無為為之萬物興矣無事事之萬物遂矣是故無為者道之身體而天地之始也所謂天下有始無為微妙周以密矣滑淖安靜無不制矣生息聰明巧利察矣通達萬方無不溉矣故曰有為之元萬事之母也以為天下母也聖人得之與物反矣既得其子故能達道之心通天之理生為之元開事之户因萬方之知窮衆口之辨盡異端之巧竭百家之伎萬方之知百家之伎皆從道生故稱子也夫得道圓通不唯獨善隨機應感妙用無方無方之用運物歸道故云既知其子復守其母且道人事與時化轉因之修之終而復始變化忽然通神使鬼形於無形事無不理窮於無窮極乎無有以能雕琢復反其母復守其母既覆又反為天下本遊於玄冥終身不殆沒身不殆故能塞其聰明閉其天門關之以舌鍵之以心非時不動非和不然國家長久終身無患塞其兊閉其門也夫何故哉不聽之聞與天同聰不視之見與天同明不言之化與天同德不為之事與天同功所守者要所然者詳道德之明不蔽而天地之慮達通故能響應影隨照物不窮為福元始為化祖宗周流蔓延淪於大中身存物順天下不勤得道之用用未常用若影響之於形聲故終身不勤故力視損明力聽損聰疾言沮德巧僞敗功是故口以大開耳目急張知故並起萬物孳蕃奮心揚慮顯遂功名名成功遂禍至福終動羅天網靜陷地殃神明不能祐造化不能生庶人沒命國家以喪開其兊濟其事不體道而有為故終身不救是以聖人退為之為去事之事體道之心履德之意統無窮之機秉自然之要翔於未元集於玄妙聰作未聞明作未見萌芽未動朕圻未判昭然獨覩無形之變通於無表達於無境毫毛之惡不得生赫赫之患不得至見小曰明故惡止善行也為之行之絶言滅慮積柔體弱反於無識誅暴救寡與神同化無敵之不勝無事之不為知力不得加天下不能謀守柔曰强也治人理物與陰陽配內用其光而外不違衣食耕穫桑織有餘福積禍消人給家贍心不載求賤不望貴貧不幸富纖微尊儉內外不過奉上養下人道盡備用其外光復歸內明復歸其內神明不耗槃積固畜不敢以為智如江海與天同慮絶滅三五害之以事填而塞之使不可識為瘴為聾與天地同為玄為默與道窮極去凶離咎違患廢賊浮德載和無所不尅無遺身殃故也故人能入道道亦入人我道相入淪而為一守靜致虛我為道室與物俱然渾沌周密反初歸始道為我襲襲重纍也與常道合德若纍衣於身故云道為我襲是為襲常者也使我介然有知操有明也行於大道修正常也唯施是畏恐蹉跌也大道甚夷廣易平也而民好徑樂妄行也朝甚除宅美大也田甚蕪生衆穢也倉甚虛農業廢也服文采五色會也帶利劍任伐殺也厭飲食常飽醉也財貨有餘貨殖實也是謂盜誇暴藏外也非道哉與天戾也指歸道德不為智巧故能陶冶天地造化陰陽而天地不能欺也天地不為知巧故能含吐變化殺生群類而萬物不能逃也道釋自然而為知巧則身不能自存而何天地之所能造陰陽之所能然也天地釋自然而為知巧則身不能自生而何變化之所包何萬物之所能全此所謂自然者如水自然潤下火自然炎上性分之內亦非有為故虛無無為無知無欲者道德之心而天地之意也清靜效象無為因應者道德之動而天地之化也道德因應天地動化若像中之象空中之響不足為難也何以明之莊子曰道之所生天之所興始始於不始生生於不生存存於不存亡亡於不亡不始不生不存不亡者道德之元也凡此數者自然之驗變化之常也故人之動作不順於道者道不祐也不順於德者德不助也不順於天者天不覆也不順於地者地不載也夫道德之所不祐助天地之所不覆載此患禍之所不遠而福德之所不近也人禀氣乎道德成形乎天地舉措不順道自然無與安故福德日遠禍患日近是以玄聖處士負達抱通提聰挈明順道奉德棄知亡身厲志憂畏唯恐蹉跌故勉於巧不巧之巧務於明不明之明信順柔弱躬耕而食常於止足歸乎無名戰戰栗栗恐失自然患至天地禍及人民挈然有知行於大道者唯施是畏也是以吉祥之應福德之至如影之與形響之應聲非有期會動若俱生是故大道甚夷其化無形若遠而近若晦而明平夷而無穢要約而易行無為而功成無事而福盈天地由之萬物以生大道甚夷平也而民背之用其聰明任僞廢道反地逆天尊知貴巧欺鬼侮神飾治邪淫歸僞去真創作改制起事遂功人好徑也豐屋榮觀大户高門飾以奇怪加以采文以知為準以巧為繩朝甚除也詐為之斧僞為之斤秉術操數簡織賤耕田穢不修節莠並生田苗不起囷倉虛空田甚蕪倉甚虛衣重五采錦繡玄黃冰紈綺縠靡鹿光輝服文采也利劍堅甲强弩徑弓輕車駿馬多俠凶人權重名顯威勢流行伐殺絶里臣役細民妬廉嫉讓疾忠毒信結邪連僞與善為怨尚爭貴武無不侵凌使通境外常議弒君帶利劍也食重五味殘賊群生刳胎殺鷇逆天之心居常醉飽取求不厭厭飲食也多藏金玉畜積如山所有珍寶擬於人君貨財有餘出入奇異榮盛光顯離衆絶俗超然獨存亂世高之稱為大人是謂盜夸過衆惡大罪重禍深賢父不畜眀主不臣道所不祐神所不在天所不覆萬物所怨有人若此喪之受禍生之受患身苟不獲事及子孫以非道故善建者不拔以道立也善抱者不脫抱以德也子孫祭祀不輟世無極也修之於身治生息也修之於家治慈畜也其德有餘流相成也修之於鄉治分職也其德乃長無不克也修之於國治法則也其德乃豐無讒賊也修之於天下治表式也其德乃普宇內服也故以身觀身知彼身也以家觀家知彼家也以鄉觀鄉知彼鄉也以國觀國知彼國也以天下觀天下近知遠也吾何以知其然哉以此求之身也指歸天地之間廣大修遠殊風異俗物類衆巨變化無窮利害謬詭故能不能制而為不能為也我為天下而天下亦為我彼我相遇則彼衆而我寡以寡遇衆則衆寧而寡殆故以己知立則知奪之以己巧立則巧伐之以己力立則力威之唯無所為莫能敗之何以效其然也夫默而求響響不我應託陰求影影不我從畏響而扣金響愈我應惡影而處陽影益我從由此觀之無為不能遁福有為不能逃患是以聖人去力去巧去知去賢建道抱德攝精畜神體和襲弱履地戴天善建不拔者也空虛寂泊若亡若存中外俱默變化於玄無為無事反朴歸真無法無度與變俱然善抱不脫抱小託大牧養萬民方圓先後常與身存體正神寧傳嗣子孫子孫祭祀不絶德積化流洋溢無窮衰而復盛與天俱終故治之於身則性簡情易心達志通遠所不遠明所不明重神愛氣輕物細名思慮不惑血氣和平筋骨便利耳目聰明肌膚潤澤面理有光精神專固生生青青身體輕徑美好難終修之身其德乃真也治之於家則夫信婦貞父慈子孝兄順弟悌九族和親耕桑時得畜積殷殷六畜蕃殖事業修治常有餘財鄉邑願之修之於家其德有餘治之於鄉則覩綱知紀動合中和名實正矣白黑分明曲直異理是非自得姦邪不起威嚴尊顯令行禁止奉上化下公若父子敬愛信嚮上下歡喜百姓和集官無留負職修名榮稱為君子常有餘德沒身不殆修之於鄉其德乃長治之於國則主明臣忠朝不壅賢士不妬功邪不蔽正讒不害公和睦順從上下無怨百官樂職萬事自然遠人懷慕天下同風國富民實不伐而疆宗廟尊顯社稷永寧陰陽永合禍亂不生萬物豐熟境內大寧鄰家託命後世蕃昌道德有餘與天為常修之於國其德乃隆治之於天下則主陰臣陽主靜臣動主圓臣方主因臣唱主默臣言正直公方和一大通平易無為寂泊無聲德馳相告神騁相傳運動無端變化若天不行而知不為而成功與道倫宇內反真無事無憂太平自興修之天下其德乃普也是故我身者彼身之尺寸也我家者彼家之權衡也我鄉者彼鄉之規矩也我國者彼國之準繩也所謂以身觀身以家觀家以國觀國以天下觀天下也人主者天下之腹心也天下者人主之身形也故天下者與人主俱利俱病俱邪俱正主民俱全天下俱然家國相保人主相連苟能得己天下自然故可以知我者無所不知可以治我者無所不治便於我者無所不可利於我者無所不宜不可於我而可於彼者天下無之所謂一言可以終身行者其殆恕乎吾何以知天下謂之然哉其以此也道德真經指歸卷之九
