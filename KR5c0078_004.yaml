  text: 道德眞經指歸卷之十能八
  hash: sha256:5ffabb8f8fc8258cfa3d57296b1883f624d4289789c85934a696158a3e12c380
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0078_HFL_004-001a, image: hfl/0377/0377-115.png}
body:
  text: 蜀郡嚴遵字君平撰谷神子註含德之厚體道元比於赤子柔弱虚毒蟲不螫毒不施攫鳥不搏害不摩猛獸不據威不加骨弱筋柔脆以危而握固據難開未知牝牡之合不相化而䘒作無爲爲精之至神明多終日嘷而嗌不嗄音聲和和之至體道行知和曰常與道同知常曰明日以聰益生曰祥日廣長心使氣曰强日堅强物壯則老衰堅强謂之非道體禍殃不道早已大命喪指歸道德虚無神明寂泊清靜深微太和滑淖聽之寂寥視之虚易上下不窮東西無極天不能裹地不能囊規不能圓矩不能方度不能度而量不能量金玉不能障蔽水火不能壅落萬物莫之能領患禍莫之能作沉浮翶翔渾沌磅礴心無所棲形無區宅陶冶禀授萬天以作群物得之滋滋啞啞知慮不能得有爲不能獲思之逾遠爲之益薄執之不我擒縱之不我釋唯無欲者身爲之宅藏之於心故曰含德同於德德亦得之體德容深含德之厚夫德之在人猶父母之於身也其於萬物猶珠玉之與瓦鈆也父母生我不可易珠玉潤我不可擲是以含德之士重身而輕天下猶慈父孝子不以其有易其鄰大身而細物者猶良賈察啇不以珠玉易瓦鈆也其無欲也非惡貨而好廉也天下之物莫能悦其心也其爲虚也非好靜而惡擾也天下之事莫足爲也夫何故哉所有重而天下輕也眀於輕重之稱通於利害之變故萬物不能役而天下不能傜也故不爲虚而虚自起不爲靜而靜自生不休神而神自定不和氣而氣自平是以不聽而聞無聲之聲不視而見無形之形不思而領是非之意不慮而達同異之鄉神淪天地德遵陰陽不請福而天地祐之不辭禍而患害去之不殺戮而天下畏之不施與而天下愛之鼔腹而樂俯仰而娛食草而美飲水而甘喬木之下精神得全巖穴之中心意常歡欣貧樂其業賤忘其卑窮而恬死困而忘危功與地配德與天齊反愚歸朴比於嬰兒含德之厚比於赤子是故建身爲國誠以赤子爲容則是天下尊道貴德各重其身名勢爲垢萬物爲塵貪夫逃爵殘賊反仁積柔集弱唯德是修而作福生亂者有何由然自然同德無由生也悲夫天地之道深以遠妙以微能識之者寡行之者希智惠不能得唯赤子爲體之赤子體似於德夫赤子之爲物也知而未發通而未達能而未動巧而居掘生而若死新而若弊爲於不爲與道周密生不生之生身無身之身用無用之用聞無聞之聞無爲無事無意無心不求道德不積精神旣不思慮又無障截神氣不作聰明無識柔弱虚靜魂魄無事樂無樂之樂安無欲之欲生不枉神死不幽志故能被道含德與天地同則蜂蠆蟲蛇無心施其毒螫攫鳥猛獸無意加其攫搏毒蟲不螫攫鳥不搏者以無死地也骨弱筋柔握持堅固不覩牝牡陰陽以化精神充實人物並歸啼號不嗄可謂志和爲之行之與道爲常知和曰常執之守之時曰聰明知常曰明自然生息動合百祥益生曰祥心意玄作氣順堅强心使氣曰强也無所爲故無所不克無所欲故動無所喪自然通達衆美萌生天地愛祐禍亂素亡夫何故哉以含德和神而體童蒙也及其有知也去一而之二去晦而之明身日飾而德日消智逾多而迷益深故重天下而輕其神貴名勢而賤其身深思遠慮離散精神背柔棄弱力進堅剛陷於欲得溺於求生開於危殆塞於萬全物壯則老故福如天地視而不能見禍若雷霆聽而不能聞出無入有日造禍殃謂之非道動而之窮爲而之亡修身愛國爲國不祥祭燎而天地是伐禱祀而鬼神是喪非命之罪事物自當也身旣違道禍則自來非天命有所與奪故云非道早已知者不言不能專言者不知道亡身塞其兊耳目冥閉其門口不言挫其銳志所之解其忿心所思和其光容不奇同其塵服不詭是謂玄同與俗化不可得而親愛不來不可得而疏退不離不可得而利益不喪不可得而害敗不危不可得而貴爵不高不可得而賤損不卑爲天下貴尊寵奇指歸道無常術德無常方神無常體和無常容視之不能見聽之不能聞旣不可望又不可捫故達於道者獨見獨聞獨爲獨存父不能以授子臣不能以授君猶母之識其子嬰兒之識其親也夫子母相識有以自然也其所以然者知不能陳也五味在口五音在耳如甘非甘如苦非苦如啇非啇如羽非羽而易牙師曠有以别之其所以别之者而口不能言也所謂言者不知知者不言也故無狀之狀可視而不可見也無象之象可效而不可宣也無爲之爲可則而不可陳也無用之用可行而不可傳也是故得道之人見之如子之識親履之如地戴之若天被之服之體之如身爲之行之與之浮沉與之卧起與之屈伸神與化游志與德運聰明内作外若聾盲思慮玄起狀若癡狂故口不能言而意不能明也譬猶夢爲君王履危臨深憂喜相反中心獨然覺而道之不能以喻其鄰也失道之人則不然見其外不覩其內識其流不獲其源秉其末不窮其根然其所以然不然其所不然凡事之末是然之所然至理之本非然之所能然也故道在於外不在於身中主不定守不固堅心狐志疑情與物連聰明眩燿以僞爲眞若是若非若亡若存和氣易動若病在人陽泄神越惡默好言方言之時心有所慮志有所思聰明並外精神去之音聲内竭外實有餘道德離散日日遠之言之益疾而己愈不見造之益衆而己愈不知是故言者逆道之要也而距德之數也反天之匠覆地之具也是故得道之士損聰棄明不視不聽若無見聞閉口結舌若不知言塞其兊閉其門挫其銳釋其所之意無所守廓似無身解其所思散其所慮奄若不知匿若獨存挫其銳解其忿滅禍無首反於太素容貌不異服色不詭因循天地與俗變化深入大道與德徘徊無言以言言無爲以爲爲清靜以治己平和以應時與世渾沌與俗玄同和其光同其塵要物之本秉事之根獨與衆異天下莫聞游於親疏之户翶翔利害之門浮於貴賤之野固守我之精神遁隱無形之境放佚荒蕩之鄉貧賤不以爲辱富貴不以爲榮欲隱而隱欲彰而彰陰陽不能損益人主不能蔽明是謂玄同故不可得親不可得踈也魁然獨立卓爾無雙聲色不能悦五味不能甘萬物不能與之爭知力不能與之訟無取無與無得無去閉門杜户絶端滅緒神明爲制道爲中主動與化鄰靜與然交和順時得故能長乆佚蕩無常莫能先後故好之不能近惡之不能遠賞與不能加賦税不能取爵禄不能高貧賤不能下無奈萬物何故萬物不能役無以天下爲故天下不能有也以爲使天下貴以正治國體忠信以奇用兵設詐權以無事取天下任自然吾何以知其然哉謂我身天下多忌諱羞薄醜而民彌貧貲益少民多利器智惠巧國家滋昏動愈晦人多伎巧飾雕琢奇物滋起無窮極法令滋彰網深密盜賊多有益暴逆聖人之言云傳國式我無爲主不得而民自化世和集我無事主不作而民自富無所欲我好靜主虛寂而民自正分理得我無欲主止足而民自樸不作飾其政悶悶無福德其民偆偆順忠慤其政察察福德明其民缺缺知孳萌禍兮福之所倚以福倚福兮禍之所伏以成禍孰知其極無緒端其無正忠信亡正覆爲奇智詐行善復爲妖受妖祥人之迷失正常其日固乆矣所由長指歸道德之情正信爲常變化動靜一有一亡覆載天地經緯陰陽紀綱日月育養群生逆之者死順之者昌故天地之道一陰一陽陽氣主德陰氣主刑刑德相反和在中央春生夏長秋收冬藏終而復始廢而又興陽終反陰陰終反陽陰陽相反以至無窮故王道人事一柔一剛一文一武中正爲經剛柔相反兵與德連兵終反德德終反兵兵德相保法在中央法數相參故能大通是以明王聖主損欲以虚心虚心以平神平神以知道得道以正心正心以正身正身以正家正家以正法正法以正名正名以正國以正治國也正國綱紀分明察理元元本本牽左連右參伍前後物如其所正名以覆實審實以督名一名一實平和周密方圓曲直不得相失賞罰施行不羸不縮名之與實若月若日一名正而國家昌一名奇而國家役養國之密無有所常屈伸取與與時俱行繼亂任法遭逆任兵守平以道體德爲常大小相遇以正相望失正則化之不從則禁之不止則制之不伏則伐之明大國之協小國不敢輕用於兵故先以化禁不從然後始制伐行者也若夫小國迫於大國之間遭無道之君以正事之不可則去之去之不可則割地而予之予之不可則率衆而避之避之不可則杖策而遁之遁之不可則患及萬民禍將及我故奮計而圖之是爭之所爲起而兵之所爲生也吾欲選將練士砥礪甲兵積糧高壘營而自守百姓糜弊國家虚空是戰之所爲作也而正之所爲興也吾欲以正入則我寡而彼衆我弱而彼强如卵投石爲敵受殃三軍必敗士卒死傷天心不得宗廟滅亡下悲萬民之命上畏天地之心是權之所爲動也而奇之所爲運也故建反往之計招覆來之事開萬民之心生諸侯之謀明我道德之祐闡我天地之助以渾四海之心同萬國之意百姓應我若響鄰國隨我若影飛鳥走獸與我俱往是計之所爲用而奇之所爲行也奇即權也言小國迫於大國之間事與避遁即俱不可兵戰權奇所以爲作明夫兵者不祥之器不得已而用也故乃動設計謀以順人望天地鳥獸助我爲城故云以奇用兵者也上順道德之意下合天地之心危寧利害視民若身體無形之形處太陰之陰發無爲之爲揚無聲之聲異彼滅化之罪明彼逆天之功顯天之所降見地之所生有名無實有實無名名實相違或正或傾縱横反覆合於冥冥明此道德之功顯彼勃逆之過或以名實相反而縱橫合道者也天灾自起妖孽自生離其父子絶其弟兄殺其雄將戮其忠臣天下怨恨莫與同心魁然獨立受天之兵戰勝大喜四海安寧此用奇之上也先用以道不從然後其灾自起所以爲上慉天下之怒積能奇之人飛耳游目延聰益明游士四達結友合親生息變怪因道應姦飾權養勢以實其民飛言儛事以惑敵人卑辭降下以閉其君輕使重利以開其臣君臣有隙因制其神變作於陰權動於微懸其死命因其樞機使敵狂惑不得有爲隨時進退無有常儀不攻而敵自詘不戰而敵自危剋其君不及其臣誅其將不及其師戰勝民喜諸侯畏之此用奇之次也初設計策後得其死所以爲次制其地形御其君臣卑體重賞以順其外陰謀雲布以亂所親姦從彼來道從此興數城而封將連國以予姦姦來如鬼謀計如神方略不測奇變不窮分彼之力疑彼之心如出於地若生於天離其左右散其所連起權生變以制其死阻其計謀使不得信折其强輔以孤其志因形立勝如環無端乗時而發和爲之恒動攻其害靜絶其糧褫而奪之飢而渴之重而累之水而火之勞而苦之凍而暍之利而誘之狂而惑之卒而迫之窘而薄之從高擊下以衆制寡堅校部曲官隊相伍上護其下下救其上三軍相保親如父子竒陣分合隱伏參處營前經後陵左敗右燿以旌旗惑以金鼔進如波騰退如風雨發如崩潰合戰如虎守不可攻攻不可守戰勝威行天下大恐此用奇之下也以先用兵方制其死所以爲下也禍亂旣夷萬物豐寧天心大得宇内欣欣藏奇損智忠信爲務清靜簡易退事止言能用奇勝不明道德恐事流變生𣻏淳散朴所以止言者也夫何故哉道德變化無所不生物有高下指嚮不同趨舍殊繆或西或東各推其性以活其身吉人以善足凶人以惡傳誠人以信顯邪人以僞容各效其知以避禍凶求而不贍智者詐生勞而不息忠者起姦拘迫慘怛信者馳謾窮困不已賢者不仁故主好知則民僞主好利則民禍主好賞則民困主好罰則民怨何則事由於主行之在臣賞出於主財出於民法出於主受之在臣主有所欲天下嚮風事皆由主主爲化元主不藏用以歸於道雖巧智用不若忘智者也故用心思公不若無心之大同也有欲禁過不若無求之得忠也喜怒時節不若無爲之有功也思慮和德不若無事之大通也明於俞附之術岐鵲之數以治之不若使世無病之德豐也挾黃帝太公之慮秉孫吴氏之要以勝之不若使天下不事智力之不營也故道德之所生愛不能利也天地之所成爲不能致也善爲愛利之小終乖天道之大唯無愛者能利之唯無爲者能遂之是故明王聖主無欲無求不創不作無爲無事無載無章反初歸朴海内自寧以無事取天下何以明之莊子曰夫起福生利成功遂事備物致用使人大富天下奢僣財貨不足民人愈醜福滿山澤金玉成積國愈不安民益少利飾智相愚以詐相要防隄邪淫姦僞之路密分别同異是非之變衆則國家昏而政事衰天下忌諱人而彌貧人多利器國家滋昏者也作方遂伎雕琢文彩竒變異怪以褒有德以别尊卑巧故滋起俊出愈奇令速賞深罰峻刑嚴鑿肌膚斷四支疏遠不隱親近不和罪至夷滅賞至封侯天地振慄盜賊愈多人多奇巧奇物滋起法令滋章盜賊多有故聖人之言云我無爲而民自化夫何故哉主者天下之心也氣感而體應心動而身隨聲響相應形影相隨不足以爲喻是故人主誠爲無爲之爲則天下之心皆無所之被道含德無思無求無令無法萬民自化我無爲人自化者也人主誠能事無事之事則天下無效無象無知無識不賞不與萬民自富我無事人自富者也人主誠能安無靜之靜樂無清之清則天下不學不問無聞無見無刑無罰萬民自正我好靜人自正人主誠能欲不欲之欲則天下心虚志平大身細物動而反止靜而歸足不拘不制萬民自朴我無欲人自朴者也故人主之正不孝不仁不施不予閔閔縵縵萬民慁輓墨墨偆偆好惡不别是非不分故得所欲性命以全其政悶悶其人偆偆者也人主之政布德施利明目察察萬民昭昭皆知禍福孝悌仁義萬事差别偟偟知僞缺缺其政察察其人缺缺者也故失所安性命天絶福生於禍禍生於福福之與禍同營異域俱亡俱存異情同服相隨出入同來異極非有聖人莫能獨得禍福之所倚福禍之所伏者也故去福則無禍無禍則無福無福之福至微玄默天下好知莫能窮極孰知其極者也唯無爲者能順其則正在禍福之間無所不剋正在於此非無正也失正則竒生竒生而民惑善人爲妖是非反覆正復爲奇善復爲妖者也天下大迷而不復也道甚易行人迷固乆所以不可復也方而不割無傷害廉而不劌無毁敗直而不肆無枉廢光而不耀無覆蓋治人事天爲生活莫如嗇施不行夫唯嗇是以蚤服無禁令重積德昧妙微則無不剋無不勝莫知其極化唐唐可以爲國爲侯王有國之母嗇爲常可以長乆動難終深根固蒂精神藏長生乆視身常存指歸道無不有而不施與故萬物以存無所不能而無所不爲故萬物以然何以明之夫道體虚無而萬物有形無有狀貌而萬物方圓寂然無音而萬物有聲由此觀之道不施不與而萬物以存不爲不宰而萬物以然然生於不然存生於不存亦明矣言道能存於不存然於不然者也或云道無形無聲又不施不與豈能然於不然存於不存哉明物各自然物各存其道者也此謂識形聲不識其影響夫日雖不爲形造影而影必因日光空雖不爲聲造響而響必因空谷若空日有心爲影響則有時而廢安能周瞻而然存必有道能然存於物而道未始有心者也故王者興師動利則民欲民欲而以方方則割以割爲方則邪者進而方者退忠臣蒙其毒萬民受其害欲者以欲爲方則以方爲邪故方者被割而萬民受害也貴貨則民求民求而以廉廉則劌以劌爲廉則貪者顯而廉者弊忠臣蒙其咎而萬民受其敗求者以求爲廉則以廉爲貪故廉者被劌劌利傷也開爭則民曲民曲而以直直則肆以肆爲直則枉者翶翔直者深伏忠臣蒙其禍萬民受其敗上好名則民僞民僞而以光光則耀以耀爲光則大德隱而小惠章忠臣蒙其死而萬民受其殃僞者以僞爲光則以光爲闇故光者被殃者也數者以施貨流情通所以謂方者不方廉者不廉直者不直光者不光名繆實易正失德亡時旣無道則以邪貪枉僞爲方廉直光故云直者不直方者不方是正失德亡者也人主獨立臣下雙身養主之意阿主之心塞主之聽蔽主之明此國之所以危而宗廟之所以喪也是以明王聖主獨有而不與也獨知而不教也獨能而不使也方於己而不以也廉於萬物而不有也直秉天心而不恃也德光四海而不怙也夫何故哉去福以方使下自公割於不割使民不訟事情自達萬物自通莫之爲吉莫之爲凶天下蕩蕩莫之其常以道爲懷公然大方令物自得莫知其極雖不割於物而物皆得正斯不割之割非割之所能及也非不割也割剥伐擊誅驕制暴而無瘢創也隨時合度應天順人人天是同雖割非創者也去貨以廉使天下自平劌於不劌使人無爭貪叨者息潔白自生莫之爲濁莫之爲清名不虚謚實不倚傾非不劌也善廉美讓章含顯盜而辯無藏也去貨任眞謙讓當理善惡自别故無所藏去爭以直使下自剋肆於不肆使民自伏匡邪振亂化淫矯俗莫之爲禍莫之爲福天下荒荒萬物自得非不肆也舉正揚直表過章惡貶邪削枉明人之失天下盡正而動無聲也依理折衷與道合宜雖直無過固非肆也去名以光使下自當耀於不耀使民自明莫之爲照莫之爲冥天下渾渾萬物滋生德與天比化與道同非不耀也德光四海照萬物而化無形也道以爲光無所不被物各自得莫識其名上下相象中表相應出入無朕往來無間若影之與形響之與聲故治國之道生民之本嗇爲祖宗治人事天莫若嗇也嗇檢藏之謂也是故明王聖主損形容卑官室絶五味滅聲色智以居愚明以語默建無狀之容立無象之式恐彼知我藏於不測故未動而天下應未命而萬民集未戰而素勝之未攻而天下服是以不勤勞而民有功不分爭而得其職不刑戮而萬民畏不微妙而得天福禍亂不生群祥並集無爲而無不成不爭而無不剋所謂重積德故無不剋也故萬物玄同天下和洽浮沉軋軮與道相得若終而始若亂而紀虚而實無而有疏而密遲而疾無形影無根朕彷彿渾沌莫知所以獨知獨見獨爲獨不變化無常畜積無府陰陽離合屈伸張弛冥冥窅窅芒昧玄默魁如天地不可窮極莫知其極自修有餘故能有國治人理物子孫不絶可以有國者也夫何故哉以其嗇也爲嗇之道不施不予儉愛微妙盈若無有誠通其意可以長乆形小神大至於萬倍一以載萬故能輕舉一以物然與天同道根深蒂固與神明處眞人所體聖人所保也所謂有國之母深根固蒂長生乆視者也治大國者謂其君若烹小鮮動綿綿以道莅天下臨以眞其鬼不神不害人非其鬼不神其神存其神不傷人助自然非其神不傷人物齊均聖人亦不傷人萬物淳兩不相傷道相全德交歸焉加萬民指歸日昃陰生燥至風起谿谷小動海波大興高下相臨差以百尋者以其形大故也千仞之岸萬丈之崖物類登之崖隤下顚蚊虻螻蟻適足以游翔而犀象虎豹之糜骸者以其形重也飄風隆盛發屋折木石飛鐵揚山陵崩弛而人血脉不爲之傷者以其暴大也隙穴之風不動鬢眉及其中人也生百病而成死亡者以其纖介也夫大國者江海犀象之徒也而德化者飄風隙穴之類也故其福不可大生也其利不可暴興也其善不可大處也其惡不可大喪也大生之則大亡暴興之則暴傾大處之則大去大喪之則大至夫處尊之位秉天下之機威權之重早己大矣更大動之則所失者多故治大國若烹小鮮施教令如風隙穴猶恐眉過半額絲出如綸况乎縱情欲輕四海大有爲殘百姓則若虎豹之糜體飄風之折屋不亦宜乎何以明之莊子曰夫飢而倍食渴而大飲熱而投水寒而入火所苦雖除其身必死胸中有瘕不可鑿喉中有疾不可剥也蟁虻著面不可射也蟣虱著身不可斫也何則欲除小患而生大賊也是以明王聖主之治大國也若柄纖微若通小水若察秋毫如聽無有若亡若存若非若是如行如留如爲如休爲在爲不爲之域化在有無有之野福微利鮮言希禁寡動於無形功流四海夫得其要者動少而益多失其機者爲多而益少故知機微萬夫之望如無如有不可示人也夫何故哉以道爲父以德爲母神明爲師太和爲友清靜爲常平易爲主天地爲法陰陽爲象日月爲儀萬物爲表因應爲元誠信爲首殊分異職繩繩玄默引總紀綱舉大要而求之於己是以民如胎鷇主如赤子智僞無因而生巧故無由而起萬物齊均莫有盈損和洽順從萬物豐茂鬼神與人合而俱市動於自然各施所有寂如無君怕如無鬼萬物盡生民人盡壽終其天年莫有傷天所謂以道莅天下其鬼不神也主若不仁鬼若不神主非不仁也兼施博愛德運六合而無阿憐也鬼非不神浮於惚恍載於纖微經歷萬方與時變化神全萬物不以傷人也非其鬼不神其神不傷人非不傷人聖人在上與天相叅人物順比大化流行智故不作奇物不生莫之爲滿莫之爲盈天下喁喁萬物齊均旣不起高又不造深不攻金石不壅水泉人不遠徙食不煞生世皆可賞莫之可形草木黃而後落人化盡而後終是以聖人亦不傷人是故天之所胞地之所函太一之所主天一之所將四時所歸五行所監群臣毒害變化運行各有分部不得相干周流萬物莫之可傷兩不相傷是故鬼神治陰聖人治陽治陰者殺偶治陽者殺奇虚無清靜鬼神養之纖微寡鮮鬼神輔之盛壯有餘鬼神害之盈滿亢極鬼神殺之不屬其類聖人奉之忠信順善聖人與之雄俊豪特聖人察之作變生奇聖人殺之故動於陰者鬼神周之動於陽者聖人制之唯無所爲者莫能敗之聖人在上奇不得起詐不得生故鬼以其神養物於陰聖人以其道養物於陽福因陰始德因陽終鬼神降其澤聖人流其恩交歸萬物若性自然流道沉德洽和同眞所謂兩不相傷故德交歸焉也大國者地廣民衆天下之所流人所歸天下之所交所親比天下之牝所貪利牝以靜勝牡勝有爲牝以靜爲下靜以卑故大國以下小國靜順之則取小國自爲來小國以下大國靜卑之則取大國得所依故或下而取之勢胞人或下而取於人形勢禁夫大國不過欲兼畜人爲之君小國不過欲入事人結和親夫皆得其所欲交以存大者宜爲下易以然指歸天地並起陰陽俱生四時共本五行同根憂喜共户禍福同門故所以爲寧者所以爲危者也而所以爲危者所以爲寧者也所以爲存者所以爲亡者也而所以爲亡者所以爲存者也安不忘亡者存存而忘亡者危何以明之夫虎豹以其形容脩廣爪牙堅强肌膚盛大毛物豐文章眀故執百獸而制於人榮華香草以其所有光曜芬香故悦於衆谷而傷其根大國之君以其地廣民衆勢尊形寵威隆名顯故張其鄰國而危其身有道則固於磐石寧於太山失道則危於累卵輕於鴻毛俱弱則先困俱亂則先亡是故大國者霸王之梯而亡滅之階也是以大國之君獨立無偶名山四塞三面成阻鴻川並流萬物浮下爲諸侯轂膏腴之府强大之尸權勢之主偕不測之固要阨狹之口肥饒廣易方數千里珍寳奇怪無所不有民鮮傜役馬牛從處舟輿萬數兵食陵聚居者安樂過者留止人如草木畜滿山野耕桑田獵得獲深倍故天下之所欲歸將相之所欲附車騎奮擊帶甲百萬處易守險形便地利順天而攻順地而守懸人之命制人之死與之則有勢背之則失宗廟故諸侯之所欲交天下之所畏也所謂大國者天下之流天下之交也施道足以並兼尊寵足以發號伐之足以崇仁治之足以明義兼之足以廣地得之足以爲富故諸侯之所好而將相之所利也是故自古及今天下之牝以靜勝牡千世不易萬世不變夫何故哉以虚受實以無應有不以爲大務以爲小不以爲高常以爲卑也牝以雌柔守牡以雄而求之故牝常以靜勝牡亢常以盈致悔故大國宜爲下是故明王聖主之處大國也施而不以置下而不以求地裹諸侯之國而無所不畏德包諸侯之力而無所不事折節下之以附人意忠廉誠信以先士吏割地東西以招賢俊疾耕力織以裒畜積結縱連横以戒不虞發倉庾散財幣養耆老食孤弱振窮達困顯巖穴之士受而不取授而不予柔弱簡易無爲而處諸侯雖有貪鄙殘賊驕矜恃力不好順從欲圖逆者猶以文武之勢威德之重靜而下之則彼修身愼行改過自新割地獻寳歸命殺身請爲子弟之國藩墻之臣所謂大國以下小國則取小國者也其處小弱也因道而動修理而行富以舟輿實以甲兵忠順誠素尚朴貴耕耕織有分不取民有上下和集親如父子君如腹心民如形體國專和一可與俱死上下順從可與鄰市大國之君雖負衆强上權右勢左德下仁心如飢虎怒如涌泉不好施予常欲吞人猶以得天之心獲民之意將相誠信鄰人之助發源泉之敵揚不測之威辱身厚體竭誠懸命欵欵惓惓事以清靜則彼神感精喻心釋意壞怒移禍徙與我爲妖小國以下大國則取大國取大國者取得所依者也上而取人者形大勢豐德博權重人之所利也大國無爲鎮有斯利但常兼下自取得人下而取於人者地狹民少權輕德鮮人之所易也小國旣輕常被人易爲其所取不得不廉故不戰而壞人之邑不攻而降人之城地廣號尊宗廟顯功德流是大國之所期也大國但能守雌自期有此之益交於大國接和結親歲有灾害則大國憂之鄰國難至則大國救之屈一人之下伸萬人之上社稷尊宗廟顯國富兵强人物全濟延於無窮小國之所願也小國下事人人自憂之所以獲全者也故接地鄰境懸權不動先下先得卑者制倨靜者勝躁處大之勢小下大得夫何故哉自然之道不可强致水動下流人動趨利釋下任事衆弱爲一出於不意此强大之所以亡也故大宜下之大凌小必獲天灾小謙退必蒙衆助故大者宜爲下道德眞經指歸卷之十
