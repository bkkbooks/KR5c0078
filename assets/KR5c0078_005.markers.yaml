  - {type: variant, offset: 6234, length: 263, content: 與我名也大似不肖象无形也夫唯大德隆盛也故似不肖反類病也若肖衆所榮也乆其小矣逆天行也我有三寳道之用也持而保之心所從也一曰慈悲初傷也二曰儉愼微己也三曰不敢爲天下先託後行也慈故能勇弱生强也儉故能廣儉生長也不敢爲天下先任自然也故能成器長後生先也今釋慈且勇爲堅剛也釋儉且廣爲大彰也釋後且先爲物唱也則死矣大命喪也夫慈以戰則勝民用情也以守則固得民誠也天將救之與敵殃也以慈衛之苞以生也善爲士者不武去强梁也善戰者不怒忠威暴也善勝敵者不與反爲常也善用人者得其心也爲之下言行尊也是謂不爭之德福自萌也用人之力獲其功也是謂配天與天同也古之極聖道窮也指歸, WYG: 篇}
