  - {type: variant, offset: 64, length: 0, content: '', WYG: 三十}
  - {type: variant, offset: 66, length: 2, content: 叙天, WYG: 為下經以今所存篇目校}
  - {type: substitution, offset: 66, original: 叙, replacement: 敘, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16962}}
  - {type: variant, offset: 69, length: 3, content: 意見地, WYG: 尚多二篇又合反者道}
  - {type: variant, offset: 73, length: 91, content: 心將以爲國善物生民章有表裏不得易位章成體備若本與根文辭相踐不可上下廣被道德若龍與麟增一字即成疣贅損一文即成瘢瘡自大陳小爲之上紀道論德謂之經始焉上德不德化由於道而道不爲之主故授之以昔之, WYG: 動于}
