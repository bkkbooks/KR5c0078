  - {type: variant, offset: 626, length: 470, content: 亡故授之以大國大國形便天下願之靜下見歸躁上多兵故授之以道物道物之鑿鑿得之者通寳之者存保之者玄故授之以爲無爲爲無爲則運變無形不見所治而萬物滋生故授之以其安易持未兆易謀持以若愚不見所事而百禍自亡萬福自來故授之以古之爲道古之爲道以愚萬民絶端滅緒冥塞知門故授之以江海江海不知虚靜處下以至百谷故授之以天下謂我大似不肖不肖之道獨合天心興師動衆無敵無勝故授之以用兵用兵之理因天應人自本而起不由我心故授之以吾言易知吾言易知無識無明無言無務使事自然故授之以知不知知不知去心去意生而若死存而若亡廢我巧態以逐禍患故授之以民不畏威民不畏威輕禁易入身陷於司大命絶天故授之以勇於敢勇於敢動其賊心殺生失理法廢滅亡故授之以民不畏死民不畏死多欲不禁適情順意以至困窮故授之以人之飢也人之飢也重税多賦好徵營營堅强躁實以伐其生故授之以人之生也人之生也柔弱畏敬和淖纖微聰明日益其死也堅强故授之以天之道天之道損滿益空養柔順弱敗堅破剛故授之以天下莫柔弱於水柔弱於水以至堅强安微樂小危以爲寧故授之以小國小國之君形虛勢弱懸命於鄰故授之以信者信者萬民之所助而將相之所存天地之所祐而道德之所助也, WYG: ''}
