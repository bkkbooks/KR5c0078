  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書子部十四}
  - {type: page-break, offset: 0, content: '', id: KR5c0078_WYG_000-1a, image: WYG1055/WYG1055-0075a.png}
  - {type: page-break, offset: 0, content: '', id: KR5c0078_SJB_000-120341b, image: sjb/12/120341b.png}
  - {type: variant, offset: 1, length: 2, content: 德眞, WYG: 徳指歸論道家𩔖提要臣等謹案道徳指歸論六卷舊本題漢嚴遵撰隋志著録十一卷晁公武讀書志曰唐志有嚴遵指歸四十卷馮廓注指歸十三卷今考新舊唐書均載嚴遵老子指歸十四卷馮廓老子指歸十三卷無嚴遵書四十卷之説疑公武所記為傳寫誤倒其文也此本為胡震亨秘冊函所刋後以板歸毛晉編入津逮秘書止存六卷錢曽讀書敏求記云曽得錢叔寳鈔本自七卷至十三卷前有總序後有人之饑也至信言不實四章今皆失去又引谷神子序云道徳指歸論陳隋之間已逸其半今所存者止論徳篇近代嘉興刋本列卷一之卷六與序文大相逕庭云云此本亦題卷一之卷六然則震亨所刻即據嘉興本也曹學佺作元羽外編序稱近刻嚴君平道徳指歸論乃吳中所偽作今案通考引晁氏之言案此條通考所引與今本讀書志不同稱其章句頗與諸本不同如以曲則全章末十七字為次章首之𩔖則是書原有經文陸游集有是書跋稱為道徳}
  - {type: page-break, offset: 1, content: '', id: KR5c0078_WYG_000-1b, image: WYG1055/WYG1055-0075b.png}
  - {type: page-break, offset: 1, content: '', id: KR5c0078_WYG_000-2a, image: WYG1055/WYG1055-0076a.png}
  - {type: substitution, offset: 2, original: 眞, replacement: 真, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19545}}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 古文亦以經文為言此本乃不載經文體例互異又谷神子注本晁氏尚著録十三卷不云佚闕此本載谷神子序乃云陳隋之間已逸其半今所存者止論徳篇因獵其訛舛定為六卷與晁氏所録亦顯相背觸且既云佚其上經何以説目一篇獨存至於所引莊子今本無者十六七不應遵之所取皆向郭之所棄此必遵書散佚好事者摭吴澄道徳經注跋中莊君平所傳章七十有二之語造為上經四十下經三十二之目又因漢志莊子五十二篇今本惟三十三篇遂多造莊子之語以影附於逸篇而偶未見晁公武説故谷神子偽序之中牴牾畢露也以是推求則學佺之説不為無據錢曽所辨殊逐末而遺其本矣以其言不悖於理猶}
  - {type: page-break, offset: 6, content: '', id: KR5c0078_WYG_000-2b, image: WYG1055/WYG1055-0076b.png}
  - {type: page-break, offset: 6, content: '', id: KR5c0078_WYG_000-3a, image: WYG1055/WYG1055-0076c.png}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 文之士所贋託故仍著於録備道家之一説焉乾隆四十}
  - {type: variant, offset: 8, length: 2, content: 昔者, WYG: 年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀道德指歸論原序}
  - {type: page-break, offset: 8, content: '', id: KR5c0078_WYG_000-3b, image: WYG1055/WYG1055-0076d.png}
  - {type: page-break, offset: 8, content: '', id: KR5c0078_WYG_000-4a, image: WYG1055/WYG1055-0077a.png}
  body:
  - {type: 'kr:newline', offset: 0, content: '

      ', id: KR5c0078_krp_000-bkkkrnewl1}
  - {type: line-break, offset: 0, content: '', id: KR5c0078_HFL_000-001a02}
  - {type: indent, offset: 0, content: 　, id: KR5c0078_krp_000-bkkind1}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 書註者無慮數十家獨河上公最著然莫古於嚴君平矣君平生元成間與揚子雲同時葢隐於卜筮其術道髙藐才智淵蔚辨討微持論悠暢幾識洞變藏往知來與鬼神謀隂陽為使其為㫖與老氏無間故因其篇章以發歸趣以為道夲於無無無}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 無是生於無未始之始是為太始體既無矣不得不虚既未有始莫之端倪惟無倪也故能周遍虚之極也復何所窮故原物之生始惟至柔柔者生之端剛者生之魄也勢之充滿必始於虚柔為之夲不失其初故天道下降地道居卑川冲谷虚澤納藪萃王公執謙能下為貴以卑為髙以後為先去泰去矜知雄守雌以是為國以是為身禍之所去福之所存綿綿不絶為天下正重積蚤復惟怳與惚為於無為事於無事故天地遂成萬物兼}
  - {type: page-break, offset: 5, content: '', id: KR5c0078_WYG_000-4b, image: WYG1055/WYG1055-0077b.png}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 長養一世含利四海無舉大功而名號歸之無傷吾神而萬世為澤此君平之指而老氏之大要也人隨所慕以自為説故有以柔弱勝剛强而為兵權之譎者取彼險武附於詐謀有以芻狗萬物而為申韓之刻者絶聖去智以愚齊民有以清净無為而為葢公之言者慎守其常用以寧一則曹丞相輔漢一代之治是也有以谷神不死而為神仙長年之術者則推夲柱下原於}
  - {type: page-break, offset: 6, content: '', id: KR5c0078_WYG_000-5a, image: WYG1055/WYG1055-0077c.png}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 關尹書之𩔖遂為𤣥談之宗然其所述皆老之支流非其全體老氏豈虞其至是哉即六藝固有盗以為亂階者莊叟固云古之博大真人哉而自著其道未嘗附之今欲與列荘為一顧且未可而况彼諸家者自為解也毫千里而何以訓詁為哉抑君平之書則大有𩔖司馬季主者矣葢皆懐道不仕敦賁丘園上述天道下紀地理中極人事究觀古覽窮後世旁盡物情包洞幽晦䜟記未形與能凡庶故宋忠賈聞其言也抑心消志伏軾無氣而嚴夫子端策正蓍抗論卜肆巨君之亂貞不絶俗清而不汙其為文也宏裕淹該含通標貫靡靡纚纚條縷判析首尾温粹即之也近充𩔖也逺不以才雄而鬱耀莫遏不以辭貴理勝故超若千里驥盤旋垤中塵不出軌馭不範而踐無遺地騁有餘巧若江海為物淹浸蕩沃滔陵汨陳漸潤而不知其益若造化付形隨所充具其新不窮而機不可測雖以釋訓為名故自為一家言其亡者已六卷即所存可以無恨其少矣劉鳯序余嘗讀君平座右銘曰疾行不能遁影大音不能掩響黙然託䕃則影響無因常體卑弱則禍患無萌歎其深得老氏之㫖後知君平有道德指歸探檢不得壬寅冬孝轅從趙元度得之為讀一過大抵旁該六合内究萬情測隂陽之用觀物𩔖之變以歸合于𤣥同披玩不能去手其為文往往以轉韻相叶似是從龜䇿傳來又若無義無仁六合之内和合天親無節無禮四海之内親為兄弟則又三句首尾叶矣至於名身孰親篇無名之名數句王輔嗣凖之以註睽之上九便稱妙解惜其前後殘缺使大寳不完亦道函一大䧟本序題谷神子不顯姓名晁公武以為唐人馮廓也繡水沈士龍識道徳指歸視河上公篇目直是下}
  - {type: page-break, offset: 8, content: '', id: KR5c0078_WYG_000-5b, image: WYG1055/WYG1055-0077d.png}
