  - {type: variant, offset: 166, length: 1, content: 昔, WYG: 篇治人事天子方而不割篇善為士于大似不肖篇復翦善復為妖巳上附}
  - {type: variant, offset: 168, length: 392, content: 得一動由反行非有性莫之能聞故授之以上士上士性高聰明深遠獨聞傲世輕物唯道是荷故授之以道生一道生一至虚無名禀受混冥造化清濁陶冶太和故授之以天下至柔天下至柔纖妙無形貫堅穿遠無所不勝故授之以身有名貨身有名貨則强大强大則禍生故授之以大成大成若虛空無名貨萬物類通故授之以天下有道天下有道在於人君人君無欲萬物以存故授之以不出户不出户以知萬民之性命順受樂安故授之以爲學日益爲學日益文生事起傷神害民故授之以聖人無心聖人無心合民之神愼民性命歸之素眞故授之以出生入死出生入死動損精神去無歸有不得長存故授之以道生之道生之以虛無無所不存寂泊不動無所不然故授之以天下有始天下有始無爲是宗以通萬事無所不明故授之以使我有知使我有知道修而行恐失自然禍及子孫故授之以善建善建以德與物相連澤及後世流末繁昌故授之以含德之士含德之士體道履神比於赤子若無見聞故授之以知者不言知者不言陰陽玄化内以正身身以及家家以及人故授之以政治國, WYG: ''}
