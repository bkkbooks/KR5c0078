  - {type: variant, offset: 15, length: 246, content: 德其德玄也是以有德德不還也下德不失德德可聞也是以無德德反身也上德無爲物自然也而無不爲功歸天也下德爲之枉精神也而有以爲功歸人也上仁爲之加恩愛也而無以爲禪聖賢也上義爲之制有民也而有以爲傳子孫也上禮爲之節事原也而莫之應失人心也則攘臂而仍之强和親也故失道而後德名始萌也失德而後仁愛和形也失仁而後義分職明也失義而後禮玉帛行也禮者忠信之薄實衰亡也而亂之首巧僞門也前職者預設然也道之華化未聞也而愚之始惑亂根也是以大丈夫體道君也處其厚含忠信也不處其薄去禮云也處其實動有因也不處其華不前識也去彼取此求諸身也指歸, WYG: 徳篇}
