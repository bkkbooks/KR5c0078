front:
  text: 道德眞經指歸能五
  hash: sha256:6982c7efaf6c75afdcbd550a75a1f4e3e803b2632ffa6db55358d9f66d77fb98
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0078_HFL_000-001a, image: hfl/0376/0376-118.png}
body:
  text: 昔者老子之作道德經也原本形氣以至神明性命所始情意所萌進退感應呼吸屈伸叅以天地稽以陰陽變化終始人物所安窮微極妙以覩自然演要伸類著經二篇叙天之意見地之心將以爲國善物生民章有表裏不得易位章成體備若本與根文辭相踐不可上下廣被道德若龍與麟增一字即成疣贅損一文即成瘢瘡自大陳小爲之上紀道論德謂之經始焉上德不德化由於道而道不爲之主故授之以昔之得一昔之得一動由反行非有性莫之能聞故授之以上士上士性高聰明深遠獨聞傲世輕物唯道是荷故授之以道生一道生一至虚無名禀受混冥造化清濁陶冶太和故授之以天下至柔天下至柔纖妙無形貫堅穿遠無所不勝故授之以身有名貨身有名貨則强大强大則禍生故授之以大成大成若虛空無名貨萬物類通故授之以天下有道天下有道在於人君人君無欲萬物以存故授之以不出户不出户以知萬民之性命順受樂安故授之以爲學日益爲學日益文生事起傷神害民故授之以聖人無心聖人無心合民之神愼民性命歸之素眞故授之以出生入死出生入死動損精神去無歸有不得長存故授之以道生之道生之以虛無無所不存寂泊不動無所不然故授之以天下有始天下有始無爲是宗以通萬事無所不明故授之以使我有知使我有知道修而行恐失自然禍及子孫故授之以善建善建以德與物相連澤及後世流末繁昌故授之以含德之士含德之士體道履神比於赤子若無見聞故授之以知者不言知者不言陰陽玄化内以正身身以及家家以及人故授之以政治國以正治國無令而行外方異俗不制自賔故授之以方而不割方而不割萬物以全無所不克天道大光故授之以治大國治大國者不可大作大爲大作大爲大亂大動則亡故授之以大國大國形便天下願之靜下見歸躁上多兵故授之以道物道物之鑿鑿得之者通寳之者存保之者玄故授之以爲無爲爲無爲則運變無形不見所治而萬物滋生故授之以其安易持未兆易謀持以若愚不見所事而百禍自亡萬福自來故授之以古之爲道古之爲道以愚萬民絶端滅緒冥塞知門故授之以江海江海不知虚靜處下以至百谷故授之以天下謂我大似不肖不肖之道獨合天心興師動衆無敵無勝故授之以用兵用兵之理因天應人自本而起不由我心故授之以吾言易知吾言易知無識無明無言無務使事自然故授之以知不知知不知去心去意生而若死存而若亡廢我巧態以逐禍患故授之以民不畏威民不畏威輕禁易入身陷於司大命絶天故授之以勇於敢勇於敢動其賊心殺生失理法廢滅亡故授之以民不畏死民不畏死多欲不禁適情順意以至困窮故授之以人之飢也人之飢也重税多賦好徵營營堅强躁實以伐其生故授之以人之生也人之生也柔弱畏敬和淖纖微聰明日益其死也堅强故授之以天之道天之道損滿益空養柔順弱敗堅破剛故授之以天下莫柔弱於水柔弱於水以至堅强安微樂小危以爲寧故授之以小國小國之君形虛勢弱懸命於鄰故授之以信者信者萬民之所助而將相之所存天地之所祐而道德之所助也君平說二經目莊子曰昔者老子之作也變化所由道德爲母效經列首天地爲象上經配天下經配地陰道八陽道九以陰行陽故七十有二首以陽行陰故分爲上下以五行八故上經四十而更始以四行八故下經三十有二而終矣陽道奇陰道偶故上經先而下經後陽道大陰道小故上經衆而下經寡陽道左陰道右故上經覆來下經反往反覆相過淪爲一形冥冥混沌道爲中主重符列驗以見端緒下經爲門上經爲户智者見其經效則通乎天地之數陰陽之紀夫婦之配父子之親君臣之儀萬物敷矣嚴君平者蜀郡成都人也姓莊氏故稱莊子東漢章和之間班固作漢書避明帝諱更之爲嚴莊嚴亦古今之通語君平生西漢中葉王莽簒治遂隱遁煬和蓋上世之眞人也
